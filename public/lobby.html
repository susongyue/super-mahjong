<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>大厅 - 超能力立直麻将</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { padding-top: 70px; }

    .room-item {
      background: var(--card-secondary);
      border-radius: 10px;
      padding: 14px 18px;
      margin: 8px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      border: 1.5px solid var(--border);
      transition: box-shadow .2s;
    }
    .room-item:hover { box-shadow: var(--shadow); }
    .room-item .room-id {
      color: var(--gold);
      font-weight: 700;
      font-size: 16px;
    }
    .room-item .room-meta {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 4px;
    }
    .room-item .btn-join-room {
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a class="logo" href="/lobby.html">🀄 超能力立直麻将</a>
  <div class="nav-links">
    <a href="/lobby.html" class="active">大厅</a>
    <a href="#" id="navGame" style="display:none">我的对局</a>
  </div>
  <span class="nav-user" id="navUser"></span>
</nav>

<div class="container">
  <div class="section">
    <h2>开始游戏</h2>
    <div class="form-row">
      <button class="btn btn-primary" onclick="createRoom()">🏠 创建对局房间</button>
    </div>
    <div class="form-row" style="margin-top:12px">
      <input class="input" id="roomId" placeholder="输入房间号">
      <button class="btn btn-cyan" onclick="joinRoom()">🚪 加入房间</button>
    </div>
  </div>

  <div class="section">
    <h2>活跃对局</h2>
    <div id="roomList">
      <div class="no-data">加载中...</div>
    </div>
  </div>
</div>

<script>
const user = localStorage.user;
if (!user) location.href = '/login.html';
document.getElementById('navUser').innerText = '👤 ' + user;

const savedRoomId = localStorage.roomId;
if (savedRoomId) {
  const navGame = document.getElementById('navGame');
  navGame.style.display = 'inline';
  navGame.onclick = () => location.href = '/index.html';
}

async function createRoom() {
  const r = await fetch('/api/create-room', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username: user })
  }).then(x => x.json());
  localStorage.roomId = r.roomId;
  location.href = '/index.html';
}

async function joinRoom(roomId) {
  const id = roomId || document.getElementById('roomId').value.trim();
  if (!id) return alert('请输入房间号');
  const r = await fetch('/api/join-room', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username: user, roomId: id })
  }).then(x => x.json());
  if (r.success) { localStorage.roomId = id; location.href = '/index.html'; }
  else alert(r.msg);
}

async function loadRooms() {
  const list = await fetch('/api/rooms').then(r => r.json());
  const box = document.getElementById('roomList');
  if (list.length === 0) {
    box.innerHTML = '<div class="no-data">暂无活跃对局，快来创建一个吧！</div>';
    return;
  }
  box.innerHTML = list.map(room => {
    const status = room.playing
      ? '<span class="status-badge status-playing">对局中</span>'
      : room.allReady
        ? '<span class="status-badge status-ready">已全员准备</span>'
        : '<span class="status-badge status-waiting">等待中</span>';
    return `<div class="room-item">
      <div class="room-info">
        <span class="room-id">房间 ${room.roomId}</span>${status}
        <div class="room-meta">${room.players.join('、')}</div>
      </div>
      <button class="btn btn-cyan btn-join-room" onclick="joinRoom('${room.roomId}')"
        ${room.playing ? 'disabled' : ''}>${room.playing ? '对局中' : '加入'}</button>
    </div>`;
  }).join('');
}

loadRooms();
setInterval(loadRooms, 5000);
</script>
</body>
</html>
