<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>大厅 - 超能力立直麻将</title>
  <style>
    :root {
      --bg: #f0f4f8;
      --card: #ffffff;
      --text: #2c3e50;
      --text-secondary: #7f8c8d;
      --accent: #e74c3c;
      --accent-hover: #c0392b;
      --gold: #d4a017;
      --green: #27ae60;
      --cyan: #2980b9;
      --cyan-hover: #1f6f9f;
      --border: #e8ecf1;
      --shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    *{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif}
    body{background:var(--bg);color:var(--text);min-height:100vh;padding-top:70px}

    /* 导航栏 */
    .navbar{position:fixed;top:0;left:0;right:0;background:var(--card);padding:0 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);box-shadow:0 1px 4px rgba(0,0,0,0.04);z-index:100;height:56px}
    .navbar .logo{color:var(--gold);font-size:18px;font-weight:bold;text-decoration:none;letter-spacing:0.5px}
    .navbar .nav-links{display:flex;gap:8px}
    .navbar .nav-links a{color:var(--text-secondary);text-decoration:none;font-size:14px;padding:6px 14px;border-radius:8px;transition:all .2s;font-weight:500}
    .navbar .nav-links a:hover,.navbar .nav-links a.active{color:var(--accent);background:rgba(231,76,60,0.08)}
    .navbar .nav-user{color:var(--accent);font-size:14px;font-weight:600}

    .container{max-width:700px;margin:0 auto;padding:24px 20px 40px}
    .section{background:var(--card);border-radius:14px;padding:24px;margin-bottom:18px;box-shadow:var(--shadow)}
    .section h2{color:var(--gold);font-size:18px;margin-bottom:16px;font-weight:700}

    /* 创建/加入 */
    .form-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .form-row input{padding:11px 14px;background:#f8f9fa;color:var(--text);border:1.5px solid #dce1e6;border-radius:10px;flex:1;min-width:150px;font-size:14px;outline:none;transition:border .2s}
    .form-row input:focus{border-color:var(--accent)}
    .form-row button{padding:11px 22px;border:none;border-radius:10px;cursor:pointer;font-size:14px;font-weight:bold;transition:all .2s}
    .btn-create{background:var(--accent);color:#fff}
    .btn-create:hover{background:var(--accent-hover)}
    .btn-join{background:var(--cyan);color:#fff}
    .btn-join:hover{background:var(--cyan-hover)}

    /* 房间列表 */
    .room-item{background:#f8f9fa;border-radius:10px;padding:14px 18px;margin:8px 0;display:flex;justify-content:space-between;align-items:center;gap:12px;border:1px solid var(--border)}
    .room-item .room-id{color:var(--gold);font-weight:bold;font-size:16px}
    .room-item .room-meta{font-size:13px;color:var(--text-secondary);margin-top:4px}
    .room-item .room-players{font-size:13px;color:var(--text-secondary)}
    .room-item .btn-join-room{background:var(--cyan);color:#fff;border:none;padding:8px 18px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;white-space:nowrap}
    .room-item .btn-join-room:hover{background:var(--cyan-hover)}
    .room-item .btn-join-room:disabled{opacity:0.35;cursor:not-allowed}
    .no-rooms{text-align:center;color:var(--text-secondary);padding:30px;font-size:14px}
    .status-badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;margin-left:8px;font-weight:600}
    .status-waiting{background:#e8f5e9;color:var(--green)}
    .status-playing{background:#ffebee;color:var(--accent)}
    .status-ready{background:#fff8e1;color:#b8860b}

    /* 移动端适配 */
    @media (max-width:600px) {
      .navbar{padding:0 12px;height:50px}
      .navbar .logo{font-size:15px}
      .navbar .nav-links a{font-size:12px;padding:4px 10px}
      .navbar .nav-user{font-size:12px}
      .container{padding:16px 12px 30px}
      .section{padding:18px 14px;border-radius:12px}
      .section h2{font-size:16px;margin-bottom:12px}
      .form-row{gap:8px}
      .form-row input{padding:10px 12px;font-size:13px;min-width:120px}
      .form-row button{padding:10px 16px;font-size:13px}
      .room-item{flex-direction:column;align-items:flex-start;gap:10px;padding:12px 14px}
      .room-item .btn-join-room{align-self:stretch;text-align:center}
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a class="logo" href="/lobby.html">🀄 超能力立直麻将</a>
  <div class="nav-links">
    <a href="/lobby.html" class="active">大厅</a>
    <a href="#" id="navGame" style="display:none">我的对局</a>
  </div>
  <span class="nav-user" id="navUser"></span>
</nav>

<div class="container">
  <div class="section">
    <h2>开始游戏</h2>
    <div class="form-row">
      <button class="btn-create" onclick="createRoom()">🏠 创建对局房间</button>
    </div>
    <div class="form-row" style="margin-top:12px">
      <input id="roomId" placeholder="输入房间号">
      <button class="btn-join" onclick="joinRoom()">🚪 加入房间</button>
    </div>
  </div>

  <div class="section">
    <h2>活跃对局</h2>
    <div id="roomList">
      <div class="no-rooms">加载中...</div>
    </div>
  </div>
</div>

<script>
const user = localStorage.user;
if (!user) location.href = '/login.html';
document.getElementById('navUser').innerText = '👤 ' + user;

const savedRoomId = localStorage.roomId;
if (savedRoomId) {
  const navGame = document.getElementById('navGame');
  navGame.style.display = 'inline';
  navGame.onclick = () => location.href = '/index.html';
}

async function createRoom() {
  const r = await fetch('/api/create-room', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({username: user})
  }).then(x => x.json());
  localStorage.roomId = r.roomId;
  location.href = '/index.html';
}

async function joinRoom(roomId) {
  const id = roomId || document.getElementById('roomId').value.trim();
  if (!id) return alert('请输入房间号');
  const r = await fetch('/api/join-room', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({username: user, roomId: id})
  }).then(x => x.json());
  if (r.success) {
    localStorage.roomId = id;
    location.href = '/index.html';
  } else alert(r.msg);
}

async function loadRooms() {
  const list = await fetch('/api/rooms').then(r => r.json());
  const box = document.getElementById('roomList');
  if (list.length === 0) {
    box.innerHTML = '<div class="no-rooms">暂无活跃对局，快来创建一个吧！</div>';
    return;
  }
  let html = '';
  list.forEach(room => {
    const status = room.playing ? '<span class="status-badge status-playing">对局中</span>'
      : room.allReady ? '<span class="status-badge status-ready">已全员准备</span>'
      : '<span class="status-badge status-waiting">等待中</span>';
    html += `<div class="room-item">
      <div class="room-info">
        <span class="room-id">房间 ${room.roomId}</span>${status}
        <div class="room-meta">${room.players.join('、')}</div>
      </div>
      <button class="btn-join-room" onclick="joinRoom('${room.roomId}')"
        ${room.playing ? 'disabled' : ''}>${room.playing ? '对局中' : '加入'}</button>
    </div>`;
  });
  box.innerHTML = html;
}

loadRooms();
setInterval(loadRooms, 5000);
</script>
</body>
</html>
