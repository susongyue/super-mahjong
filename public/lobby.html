<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>大厅 - 超能力立直麻将</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
    body{background:#1a1a2e;color:#eee;min-height:100vh}

    /* 导航栏 */
    .navbar{background:#16213e;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid #e94560}
    .navbar .logo{color:#f5c518;font-size:18px;font-weight:bold;text-decoration:none}
    .navbar .nav-links{display:flex;gap:16px}
    .navbar .nav-links a{color:#aaa;text-decoration:none;font-size:14px;padding:4px 10px;border-radius:4px}
    .navbar .nav-links a:hover,.navbar .nav-links a.active{color:#fff;background:#e94560}
    .navbar .nav-user{color:#e94560;font-size:14px}

    .container{max-width:700px;margin:30px auto;padding:0 20px}
    .section{background:#16213e;border-radius:12px;padding:24px;margin-bottom:20px}
    .section h2{color:#f5c518;font-size:18px;margin-bottom:16px}

    /* 创建/加入 */
    .form-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .form-row input{padding:10px 14px;background:#1a1a2e;color:#fff;border:1px solid #333;border-radius:6px;flex:1;min-width:150px}
    .form-row button{padding:10px 20px;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-weight:bold}
    .btn-create{background:#e94560;color:#fff}
    .btn-join{background:#099;color:#fff}

    /* 房间列表 */
    .room-item{background:#1a1a2e;border-radius:8px;padding:14px 18px;margin:8px 0;display:flex;justify-content:space-between;align-items:center}
    .room-item .room-info{}
    .room-item .room-id{color:#f5c518;font-weight:bold;font-size:16px}
    .room-item .room-meta{font-size:13px;color:#aaa;margin-top:4px}
    .room-item .room-players{font-size:13px;color:#888}
    .room-item .btn-join-room{background:#099;color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px}
    .room-item .btn-join-room:disabled{opacity:0.4;cursor:not-allowed}
    .no-rooms{text-align:center;color:#888;padding:20px}
    .status-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;margin-left:6px}
    .status-waiting{background:#42b983;color:#fff}
    .status-playing{background:#e94560;color:#fff}
    .status-ready{background:#f5c518;color:#1a1a2e}
  </style>
</head>
<body>

<!-- 导航栏 -->
<nav class="navbar">
  <a class="logo" href="/lobby.html">🀄 超能力立直麻将</a>
  <div class="nav-links">
    <a href="/lobby.html" class="active">大厅</a>
    <a href="#" id="navGame" style="display:none">我的对局</a>
  </div>
  <span class="nav-user" id="navUser"></span>
</nav>

<div class="container">
  <!-- 创建/加入房间 -->
  <div class="section">
    <h2>开始游戏</h2>
    <div class="form-row">
      <button class="btn-create" onclick="createRoom()">🏠 创建对局房间</button>
    </div>
    <div class="form-row" style="margin-top:12px">
      <input id="roomId" placeholder="输入房间号">
      <button class="btn-join" onclick="joinRoom()">🚪 加入房间</button>
    </div>
  </div>

  <!-- 活跃对局 -->
  <div class="section">
    <h2>活跃对局</h2>
    <div id="roomList">
      <div class="no-rooms">加载中...</div>
    </div>
  </div>
</div>

<script>
// ── 初始化 ──
const user = localStorage.user;
if (!user) location.href = '/login.html';
document.getElementById('navUser').innerText = '👤 ' + user;

// 如果已有对局房间，显示"我的对局"入口
const savedRoomId = localStorage.roomId;
if (savedRoomId) {
  const navGame = document.getElementById('navGame');
  navGame.style.display = 'inline';
  navGame.onclick = () => location.href = '/index.html';
}

// ── 创建房间 ──
async function createRoom() {
  const r = await fetch('/api/create-room', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({username: user})
  }).then(x => x.json());
  localStorage.roomId = r.roomId;
  location.href = '/index.html';
}

// ── 加入房间 ──
async function joinRoom(roomId) {
  const id = roomId || document.getElementById('roomId').value;
  if (!id) return alert('请输入房间号');
  const r = await fetch('/api/join-room', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({username: user, roomId: id})
  }).then(x => x.json());
  if (r.success) {
    localStorage.roomId = id;
    location.href = '/index.html';
  } else alert(r.msg);
}

// ── 加载活跃房间 ──
async function loadRooms() {
  const list = await fetch('/api/rooms').then(r => r.json());
  const box = document.getElementById('roomList');
  if (list.length === 0) {
    box.innerHTML = '<div class="no-rooms">暂无活跃对局，快来创建一个吧！</div>';
    return;
  }
  let html = '';
  list.forEach(room => {
    const status = room.playing ? '<span class="status-badge status-playing">对局中</span>'
      : room.allReady ? '<span class="status-badge status-ready">已全员准备</span>'
      : '<span class="status-badge status-waiting">等待中</span>';
    html += `<div class="room-item">
      <div class="room-info">
        <span class="room-id">房间 ${room.roomId}</span>${status}
        <div class="room-meta">${room.players.join('、')}</div>
      </div>
      <button class="btn-join-room" onclick="joinRoom('${room.roomId}')"
        ${room.playing ? 'disabled' : ''}>${room.playing ? '对局中' : '加入'}</button>
    </div>`;
  });
  box.innerHTML = html;
}

loadRooms();
setInterval(loadRooms, 5000);
</script>
</body>
</html>
