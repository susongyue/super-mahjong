<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" type="image/png" href="dong.png">
  <title>对局记录 - Super Reach Mahjong</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="themes.css">
  <meta name="theme-color" content="#000000">
<link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <script>(function(){try{var t=localStorage.getItem('mahjong-theme')||'spotify';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
  <style>
    /* ── 工具栏 ── */
    .hist-toolbar {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      margin-bottom: 16px;
    }
    /* 刷新按钮（工具栏内） */
    .refresh-btn-inline {
      padding: 6px 14px; border-radius: var(--r-pill);
      font-size: 12px; font-weight: 600; cursor: pointer;
      border: 1px solid var(--accent-green); color: var(--green);
      background: rgba(0,200,83,.08); transition: all .2s;
      user-select: none; white-space: nowrap;
    }
    .refresh-btn-inline:hover { background: rgba(0,200,83,.16); }

    /* 排序下拉按钮 */
    .sort-dropdown {
      position: relative;
      display: inline-block;
    }
    .sort-dropdown-trigger {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 6px 12px; border-radius: var(--r-pill);
      font-size: 12px; font-weight: 600; cursor: pointer;
      border: 1px solid var(--hairline);
      background: var(--surface-2); color: var(--ink-muted);
      transition: all .2s; user-select: none; white-space: nowrap;
    }
    .sort-dropdown-trigger:hover { border-color: var(--accent-blue); color: var(--text-primary); }
    .sort-dropdown-trigger .sd-caret {
      font-size: 9px; margin-left: 2px; transition: transform .2s;
    }
    .sort-dropdown.open .sd-caret { transform: rotate(180deg); }

    .sort-dropdown-menu {
      position: absolute; top: calc(100% + 6px); left: 0; z-index: 50;
      min-width: 140px; padding: 4px; border-radius: var(--r-md);
      background: var(--surface-1);
      border: 1px solid var(--hairline);
      box-shadow: var(--shadow-md);
      opacity: 0; visibility: hidden; transform: translateY(-4px);
      transition: opacity .15s ease, transform .15s ease, visibility .15s;
    }
    .sort-dropdown.open .sort-dropdown-menu {
      opacity: 1; visibility: visible; transform: translateY(0);
    }
    .sort-option {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 10px; border-radius: var(--r-sm);
      font-size: 12px; color: var(--text-primary); cursor: pointer;
      transition: background .15s;
    }
    .sort-option:hover { background: var(--surface-3); }
    .sort-option.active { color: var(--accent-blue); font-weight: 700; }
    .sort-option-check { font-size: 11px; opacity: 0; transition: opacity .15s; }
    .sort-option.active .sort-option-check { opacity: 1; }

    .hist-search {
      padding: 6px 14px; background: var(--surface-2);
      color: var(--text-primary); border: 1px solid var(--hairline);
      border-radius: var(--r-pill); font-size: 12px; outline: none;
      transition: border-color .2s; flex: 1; max-width: 220px; min-width: 120px;
    }
    .hist-search:focus { border-color: var(--accent-blue); }
    .hist-search::placeholder { color: var(--ink-muted); }
    .hist-toolbar .divider-spacer { flex: 1; }
    .hist-toolbar .count-label {
      font-size: 12px; color: var(--ink-muted); white-space: nowrap;
    }

    /* ── 历史记录项 ── */
    .history-item {
      background: var(--surface-2);
      border-radius: var(--r-md);
      padding: 12px 18px; margin: 8px 0;
      border: 2px solid var(--hairline);
      display: flex; justify-content: space-between; align-items: center;
      gap: 10px; cursor: pointer; transition: box-shadow .2s, border-color .2s;
    }
    .history-item:hover { border-color: var(--hairline-soft); box-shadow: var(--shadow-sm); }
    .history-item .hist-gameid {
      color: var(--ink-muted); font-size: 10px; font-family: monospace;
      margin-top: 2px;
    }
    .history-item .hist-room {
      color: var(--accent-blue); font-weight: 700; font-size: 14px;
    }
    .history-item .hist-meta {
      font-size: 12px; color: var(--ink-muted);
    }
    .history-item .hist-date {
      font-size: 11px; color: var(--ink-muted);
    }

    /* ── 历史详情弹窗 ── */
    .history-popup {
      background: var(--surface-1);
      border-radius: var(--r-xl);
      padding: 24px; max-width: 560px; width: 90%;
      box-shadow: var(--shadow-lg);
      border: 2px solid var(--hairline);
      max-height: 85vh; overflow-y: auto;
    }
    .history-popup h3 {
      color: var(--accent-blue); margin-top: 0; font-size: 18px; font-weight: 700;
    }
    .history-popup .popup-row {
      font-size: 14px; line-height: 1.9; color: var(--text-primary);
    }
    .history-popup .popup-row strong { font-weight: 700; }
    .history-popup .draft-char-item {
      font-size: 13px; color: var(--ink-muted); margin: 4px 0; padding-left: 12px;
      line-height: 28px; display: flex; flex-wrap: wrap; align-items: center; gap: 2px 8px;
    }
    .history-popup .draft-char-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      object-fit: cover; vertical-align: middle; margin-right: 4px;
      border: 2px solid var(--hairline);
    }
    .history-popup .draft-char-placeholder {
      display: inline-flex; width: 28px; height: 28px; border-radius: 50%;
      background: linear-gradient(135deg, var(--avatar-bg-1), var(--avatar-bg-2)); color: var(--ink-muted);
      align-items: center; justify-content: center; font-size: 13px; font-weight: 700;
      vertical-align: middle; margin-right: 4px;
    }

    /* ── 回合切换控件 ── */
    .round-nav {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      margin: 16px 0 12px; padding: 10px 0;
      border-top: 1px solid var(--hairline);
      border-bottom: 1px solid var(--hairline);
    }
    .round-nav-btn {
      width: 32px; height: 32px; border-radius: 50%;
      border: 1px solid var(--hairline); background: var(--surface-2);
      color: var(--text-primary); font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s; user-select: none;
    }
    .round-nav-btn:hover { border-color: var(--accent-blue); color: var(--accent-blue); }
    .round-nav-btn:disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; }
    .round-nav-label {
      font-size: 14px; font-weight: 700; color: var(--text-primary);
      min-width: 80px; text-align: center;
    }
    .round-nav-label span { color: var(--accent-blue); }

    /* ── 回合内出战快照 ── */
    .battle-snapshot {
      margin-top: 8px; padding: 10px 12px;
      background: var(--surface-2); border-radius: var(--r-md);
      border: 1px solid var(--hairline);
      transition: opacity .2s ease, transform .2s ease;
    }
    .battle-snapshot .bs-title {
      font-size: 13px; font-weight: 700; color: var(--accent-blue); margin-bottom: 8px;
    }
    .battle-snapshot .bs-row {
      display: flex; align-items: center; gap: 8px; margin: 4px 0;
      font-size: 13px; color: var(--text-primary); padding: 4px 8px;
      border-radius: var(--r-sm);
      transition: background .15s;
    }
    .battle-snapshot .bs-row:hover { background: var(--surface-3); }
    .battle-snapshot .bs-player { font-weight: 600; min-width: 60px; color: var(--gold); }
    .battle-snapshot .bs-arrow { color: var(--ink-muted); font-size: 14px; }
    .battle-snapshot .bs-empty {
      text-align: center; color: var(--ink-muted); font-size: 12px;
      padding: 8px 0;
    }

    /* ── 详情标签栏 ── */
    .detail-tabs {
      display: flex; gap: 0; margin-bottom: 0; border-bottom: 2px solid var(--hairline);
    }
    .detail-tab {
      padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer;
      color: var(--ink-muted); border-bottom: 2px solid transparent;
      margin-bottom: -2px; transition: all .2s; user-select: none;
    }
    .detail-tab:hover { color: var(--text-primary); }
    .detail-tab.active { color: var(--accent-blue); border-bottom-color: var(--accent-blue); }

    /* ── 分页 ── */
    .page-nav {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      margin-top: 20px; flex-wrap: wrap;
    }
    .page-btn {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 36px; height: 36px; padding: 0 10px;
      border-radius: var(--r-sm); border: 1px solid var(--hairline);
      background: var(--surface-2); color: var(--text-primary);
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: all .15s; user-select: none;
    }
    .page-btn:hover:not(.page-active):not(:disabled) {
      border-color: var(--accent-blue); color: var(--accent-blue);
    }
    .page-btn.page-active {
      background: var(--accent-blue); color: #fff; border-color: var(--accent-blue);
    }
    .page-btn:disabled {
      opacity: 0.3; cursor: not-allowed; pointer-events: none;
    }
    .page-ellipsis {
      display: inline-flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; font-size: 13px; color: var(--ink-muted);
    }
    .page-info {
      font-size: 12px; color: var(--ink-muted); margin-left: 8px; white-space: nowrap;
    }

    @media (max-width: 768px) {
      .history-item { padding: 10px 14px; margin: 5px 0; }
      .history-item .hist-room { font-size: 13px; }
      .hist-toolbar { flex-direction: column; align-items: stretch; gap: 8px; }
      .hist-search { width: 100%; max-width: none; }
      .sort-dropdown { width: 100%; }
      .sort-dropdown-trigger, .refresh-btn-inline { justify-content: center; flex: 1; text-align: center; display: inline-flex; }
      .hist-toolbar .divider-spacer { display: none; }
      .count-label { text-align: center; display: block; }
      .history-popup { max-width: 100%; padding: 16px; }
      .page-btn { min-width: 32px; height: 32px; font-size: 12px; padding: 0 8px; }
    }
    @media (max-width: 540px) {
      .history-item { padding: 8px 10px; flex-direction: column; align-items: flex-start; gap: 4px; }
      .history-item .hist-room { font-size: 12px; }
      .page-nav { gap: 3px; }
      .page-btn { min-width: 28px; height: 28px; font-size: 11px; padding: 0 6px; }
      .page-ellipsis { width: 28px; height: 28px; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a class="logo" href="/lobby.html">Mahjong</a>
  <div class="nav-links">
    <a href="/lobby.html" title="大厅"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></a>
    <a href="/history.html" class="active" title="对局记录"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></a>
    <a href="/encyclopedia.html" title="角色图鉴"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2Z"/></svg></a>
    <a href="/profile.html" title="个人中心"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></a>
  </div>
  <span class="nav-user" id="navUser"></span>
</nav>

<div class="container">
  <div class="section">
    <div class="section-header">
      <h2>我的对局历史</h2>
    </div>
    <!-- 工具栏：刷新 - 排序下拉 - 搜索框 - 记录数量 -->
    <div class="hist-toolbar">
      <button class="refresh-btn-inline" id="btnRefreshHistory">刷新</button>
      <div class="sort-dropdown" id="sortDropdown">
        <span class="sort-dropdown-trigger" id="sortTrigger">时间倒序<span class="sd-caret">▾</span></span>
        <div class="sort-dropdown-menu" id="sortMenu">
          <div class="sort-option active" data-val="desc">时间倒序<span class="sort-option-check">✓</span></div>
          <div class="sort-option" data-val="asc">时间正序<span class="sort-option-check">✓</span></div>
        </div>
      </div>
      <input class="hist-search" id="histSearch" type="text" placeholder="搜索对局 ID…">
      <span class="divider-spacer"></span>
      <span class="count-label" id="countLabel">0 条记录</span>
    </div>
    <div id="historyList">
      <div class="no-data">加载中...</div>
    </div>
    <div id="pageNav" class="page-nav" style="display:none"></div>
  </div>
</div>

<script src="/js/lib/auth.js"></script>
<script src="/js/lib/utils.js"></script>
<script src="/js/lib/api.js"></script>
<script src="/js/lib/theme-switcher.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
Auth.check();
var user = Auth.user();

// ── 导航栏渲染 ──
Auth.renderNav(document.getElementById('navUser'));

var charImageMap = {};
var currentSort = 'desc'; // desc | asc
var currentSearch = '';
var allHistory = [];       // 全部对局数据
var currentPage = 1;
var PAGE_SIZE = 10;

// ── 加载角色头像映射 ──
(async function loadCharImages() {
  try {
    var chars = await API.getCharacters();
    chars.forEach(function (c) { charImageMap[c.name] = c.image || null; });
  } catch (e) { /* ignore */ }
})();

// ── 渲染角色头像 ──
function renderAvatar(cname) {
  var img = charImageMap[cname];
  var initial = cname ? cname.charAt(0) : '?';
  if (img) {
    return '<img class="draft-char-avatar" src="https://sr-mahjong-d0g8mp6w19f37dd37-1324905494.tcloudbaseapp.com/png/' + img + '" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'inline-flex\';">' +
      '<span class="draft-char-placeholder" style="display:none">' + initial + '</span>';
  }
  return '<span class="draft-char-placeholder">' + initial + '</span>';
}

// ── 渲染当前页 ──
function renderPage() {
  var box = document.getElementById('historyList');
  var totalPages = Math.ceil(allHistory.length / PAGE_SIZE) || 1;
  if (currentPage > totalPages) currentPage = totalPages;

  var start = (currentPage - 1) * PAGE_SIZE;
  var pageList = allHistory.slice(start, start + PAGE_SIZE);

  box.innerHTML = pageList.map(function (h) {
    var dateStr = h.endedAt || h.createdAt || null;
    var date = dateStr ? new Date(dateStr).toLocaleString('zh-CN') : '未知';
    var gid = h.gameId || '';
    return '<div class="history-item" data-id="' + Utils.escHTML(gid || h.roomId) + '">' +
      '<div>' +
      '<div class="hist-room">' + Utils.escHTML(date) + '</div>' +
      '<div class="hist-gameid">房间 ' + Utils.escHTML(h.roomId) + '</div>' +
      '<div class="hist-meta">' + h.playerCount + '人对局 | ' + h.totalRounds + ' 回合 | 房主: ' + Utils.escHTML(h.host || '未知') + '</div>' +
      '<div class="hist-meta">玩家: ' + Utils.escHTML((h.players || []).join('、')) + '</div>' +
      '</div>' +
      '</div>';
  }).join('');

  // 事件委托
  box.querySelectorAll('.history-item').forEach(function (item) {
    item.addEventListener('click', function () { viewHistoryDetail(item.dataset.id); });
  });

  // 分页导航
  renderPageNav(totalPages);

  // 入场动画
  gsap.from(box.querySelectorAll('.history-item'), {
    opacity: 0, x: -20, stagger: 0.06, duration: 0.35, ease: 'power2.out'
  });
}

// ── 渲染分页导航 ──
function renderPageNav(totalPages) {
  var nav = document.getElementById('pageNav');
  if (totalPages <= 1) { nav.style.display = 'none'; return; }
  nav.style.display = '';

  var html = '';
  // 上一页
  html += '<button class="page-btn" id="btnPrevPage" ' + (currentPage <= 1 ? 'disabled' : '') + '>◀</button>';

  // 页码按钮（省略号逻辑）
  var pages = [];
  if (totalPages <= 7) {
    for (var i = 1; i <= totalPages; i++) pages.push(i);
  } else {
    pages.push(1);
    if (currentPage > 3) pages.push('...');
    var s = Math.max(2, currentPage - 1);
    var e = Math.min(totalPages - 1, currentPage + 1);
    for (var i = s; i <= e; i++) pages.push(i);
    if (currentPage < totalPages - 2) pages.push('...');
    pages.push(totalPages);
  }

  pages.forEach(function (p) {
    if (p === '...') {
      html += '<span class="page-ellipsis">…</span>';
    } else {
      html += '<button class="page-btn' + (p === currentPage ? ' page-active' : '') + '" data-page="' + p + '">' + p + '</button>';
    }
  });

  // 下一页
  html += '<button class="page-btn" id="btnNextPage" ' + (currentPage >= totalPages ? 'disabled' : '') + '>▶</button>';
  html += '<span class="page-info">共 ' + allHistory.length + ' 条</span>';

  nav.innerHTML = html;

  // 绑定事件
  document.getElementById('btnPrevPage').addEventListener('click', function () {
    if (currentPage > 1) { currentPage--; renderPage(); window.scrollTo({ top: 180, behavior: 'smooth' }); }
  });
  document.getElementById('btnNextPage').addEventListener('click', function () {
    if (currentPage < totalPages) { currentPage++; renderPage(); window.scrollTo({ top: 180, behavior: 'smooth' }); }
  });
  nav.querySelectorAll('.page-btn[data-page]').forEach(function (btn) {
    btn.addEventListener('click', function () {
      var p = parseInt(this.dataset.page);
      if (p !== currentPage) { currentPage = p; renderPage(); window.scrollTo({ top: 180, behavior: 'smooth' }); }
    });
  });
}

// ── 加载对局历史 ──
async function loadHistory() {
  try {
    var list = await API.getGameHistory(user, currentSort, currentSearch);
    allHistory = list;
    currentPage = 1;
    var countLabel = document.getElementById('countLabel');
    countLabel.textContent = list.length + ' 条记录';

    if (list.length === 0) {
      document.getElementById('historyList').innerHTML = '<div class="no-data">' + (currentSearch ? '未找到匹配的对局' : '暂无历史对局记录') + '</div>';
      document.getElementById('pageNav').style.display = 'none';
      return;
    }

    renderPage();
  } catch (e) {
    document.getElementById('historyList').innerHTML = '<div class="no-data">加载失败，请检查网络</div>';
    document.getElementById('pageNav').style.display = 'none';
  }
}

function refreshHistory() {
  document.getElementById('historyList').innerHTML = '<div class="no-data">加载中...</div>';
  document.getElementById('pageNav').style.display = 'none';
  loadHistory();
}

document.getElementById('btnRefreshHistory').addEventListener('click', refreshHistory);

// ── 排序下拉 ──
var sortDropdown = document.getElementById('sortDropdown');
var sortTrigger = document.getElementById('sortTrigger');
var sortMenu = document.getElementById('sortMenu');

function openSort() { sortDropdown.classList.add('open'); }
function closeSort() { sortDropdown.classList.remove('open'); }
sortTrigger.addEventListener('click', function(e) { e.stopPropagation(); sortDropdown.classList.contains('open') ? closeSort() : openSort(); });

// 点击选项应用排序
sortMenu.querySelectorAll('.sort-option').forEach(function(opt) {
  opt.addEventListener('click', function(e) {
    e.stopPropagation();
    var val = this.dataset.val;
    if (val === currentSort) { closeSort(); return; }
    currentSort = val;
    // 更新 UI
    sortMenu.querySelectorAll('.sort-option').forEach(function(o) { o.classList.remove('active'); });
    this.classList.add('active');
    sortTrigger.innerHTML = (val === 'desc' ? '时间倒序' : '时间正序') + '<span class="sd-caret">▾</span>';
    closeSort();
    loadHistory();
  });
});
// 点击外部关闭
document.addEventListener('click', closeSort);

// ── 搜索输入（防抖） ──
var searchTimer;
document.getElementById('histSearch').addEventListener('input', function() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(function() {
    currentSearch = document.getElementById('histSearch').value.trim();
    loadHistory();
  }, 350);
});

// ── 查看对局详情 ──
async function viewHistoryDetail(id) {
  try {
    var resp = await fetch('/api/game-history-detail?' + (id && id.startsWith('g') ? 'gameId=' : 'roomId=') + encodeURIComponent(id));
    var detail = await resp.json();
    if (!detail || detail.error) {
      Utils.showToast(detail && detail.error ? '详情加载失败: ' + detail.error : '无法加载对局详情');
      console.warn('[history] detail failed for', id, detail);
      return;
    }

    var date = detail.endedAt ? new Date(detail.endedAt).toLocaleString('zh-CN') : '未知';
    var draft = detail.draftResults || {};
    var battles = detail.battleHistory || [];

    // 生成 "选角一览" 标签页内容
    var draftHtml = '';
    if (Object.keys(draft).length > 0) {
      draftHtml = '<div style="margin-top:12px;"><strong>选角情况：</strong></div>';
      for (var player in draft) {
        var chars = draft[player] || [];
        var charItems = chars.map(function (c) {
          var cname = c.name || c;
          return '<span>' + renderAvatar(cname) + Utils.escHTML(cname) + '</span>';
        }).join(' ');
        draftHtml += '<div class="draft-char-item">&bull; ' + Utils.escHTML(player) + '：' + charItems + '</div>';
      }
    }

    // 默认显示回合 1
    var currentRound = 1;
    var totalRounds = Math.max(1, battles.length, detail.totalRounds || 1);

    function buildRoundContent(r) {
      var ri = r - 1;
      var snap = battles[ri];
      var html = '';
      if (snap && snap.selections && Object.keys(snap.selections).length > 0) {
        html += '<div class="battle-snapshot">';
        html += '<div class="bs-title">第 ' + r + ' 回合出战情况</div>';
        for (var p in snap.selections) {
          var cname = snap.selections[p] || '';
          html += '<div class="bs-row">' +
            '<span class="bs-player">' + Utils.escHTML(p) + '</span>' +
            '<span class="bs-arrow">→</span>' +
            renderAvatar(cname) +
            '<span>' + Utils.escHTML(cname) + '</span>' +
            '</div>';
        }
        html += '</div>';
      } else {
        html += '<div class="battle-snapshot"><div class="bs-empty">该回合无出战记录</div></div>';
      }
      return html;
    }

    var popup = Utils.createOverlay(
      '<div class="history-popup">' +
        '<h3>对局详情</h3>' +
        '<div class="popup-row">' +
        '<div>对局 ID：<strong style="font-family:monospace;font-size:12px;word-break:break-all;">' + Utils.escHTML(detail.gameId || detail.roomId) + '</strong></div>' +
        '<div>房间号：' + Utils.escHTML(detail.roomId) + ' &middot; 房主：' + Utils.escHTML(detail.host || '未知') + '</div>' +
        '<div>参与玩家：' + Utils.escHTML((detail.players || []).join('、')) + '</div>' +
        '<div>总回合数：' + totalRounds + ' &middot; 结束时间：' + date + '</div>' +
        '</div>' +

        // 标签栏
        '<div class="detail-tabs">' +
        '<span class="detail-tab active" data-tab="draft">选角一览</span>' +
        '<span class="detail-tab" data-tab="battle">回合回放</span>' +
        '</div>' +

        // 选角内容
        '<div id="tab-draft" class="detail-tab-content">' + draftHtml + '</div>' +

        // 回合回放内容
        '<div id="tab-battle" class="detail-tab-content" style="display:none">' +
        (battles.length > 0 ? buildRoundContent(currentRound) : '<div class="battle-snapshot"><div class="bs-empty">暂无回合出战记录<br><small>（旧对局可能没有回合数据）</small></div></div>') +
        (battles.length > 1 ?
          '<div class="round-nav">' +
          '<button class="round-nav-btn" id="btnPrevRound" ' + (currentRound <= 1 ? 'disabled' : '') + '>&#9664;</button>' +
          '<span class="round-nav-label"><span id="roundNum">' + currentRound + '</span> / ' + totalRounds + '</span>' +
          '<button class="round-nav-btn" id="btnNextRound" ' + (currentRound >= totalRounds ? 'disabled' : '') + '>&#9654;</button>' +
          '</div>' : '') +
        '</div>' +

        '<button class="btn btn-primary" style="margin-top:16px;width:100%;" id="popupClose">关闭</button>' +
      '</div>',
      'modal-overlay'
    );

    // 标签切换
    popup.querySelectorAll('.detail-tab').forEach(function(tab) {
      tab.addEventListener('click', function() {
        popup.querySelectorAll('.detail-tab').forEach(function(t) { t.classList.remove('active'); });
        tab.classList.add('active');
        popup.querySelectorAll('.detail-tab-content').forEach(function(c) { c.style.display = 'none'; });
        document.getElementById('tab-' + tab.dataset.tab).style.display = '';
      });
    });

    // 回合切换（渐入渐出动画）
    if (battles.length > 1) {
      function updateRoundView() {
        var roundNumEl = document.getElementById('roundNum');
        if (roundNumEl) roundNumEl.textContent = currentRound;
        var btnPrev = document.getElementById('btnPrevRound');
        var btnNext = document.getElementById('btnNextRound');
        if (btnPrev) btnPrev.disabled = currentRound <= 1;
        if (btnNext) btnNext.disabled = currentRound >= totalRounds;

        var tabBattle = document.getElementById('tab-battle');
        var oldSnap = tabBattle.querySelector('.battle-snapshot');
        if (!oldSnap) return;

        // 1) 淡出当前
        oldSnap.style.transition = 'opacity 0.2s ease';
        oldSnap.style.opacity = '0';

        setTimeout(function() {
          // 2) 替换为新内容
          var tmp = document.createElement('div');
          tmp.innerHTML = buildRoundContent(currentRound);
          var newSnap = tmp.firstElementChild;
          oldSnap.parentNode.replaceChild(newSnap, oldSnap);

          // 3) 淡入新内容
          newSnap.style.opacity = '0';
          newSnap.style.transition = 'opacity 0.2s ease';
          requestAnimationFrame(function() {
            newSnap.style.opacity = '1';
          });
        }, 220);
      }
      document.getElementById('btnPrevRound').addEventListener('click', function() {
        if (currentRound > 1) { currentRound--; updateRoundView(); }
      });
      document.getElementById('btnNextRound').addEventListener('click', function() {
        if (currentRound < totalRounds) { currentRound++; updateRoundView(); }
      });
    }

    // 关闭逻辑
    document.getElementById('popupClose').addEventListener('click', function () { popup.remove(); });
    popup.addEventListener('click', function (e) { if (e.target === popup) popup.remove(); });
  } catch (e) {
    Utils.showToast('加载详情失败');
  }
}

// ── 初始化 ──
loadHistory();

// ── GSAP 入场动画 ──
gsap.from('.navbar', { y: -60, opacity: 0, duration: 0.5, ease: 'power3.out' });
gsap.from('.container > .section', {
  opacity: 0, y: 24, stagger: 0.12, duration: 0.5, delay: 0.2, ease: 'power3.out'
});
</script>
</body>
</html>
