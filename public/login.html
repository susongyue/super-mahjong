<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>登录 - 超能力立直麻将</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      display: grid;
      place-items: center;
      padding: 80px 20px 20px;
    }

    .login-box {
      background: var(--card);
      padding: 40px 36px;
      border-radius: 16px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }
    .login-box h1 {
      margin-bottom: 6px;
      color: var(--accent);
      font-size: 24px;
      font-weight: 800;
    }
    .login-box .subtitle {
      color: var(--text-secondary);
      font-size: 13px;
      margin-bottom: 24px;
    }

    .login-panel { display: none; animation: fadeIn .3s; }
    .login-panel.active { display: block; }

    @media (max-width: 768px) {
      .login-box { padding: 28px 22px; border-radius: 14px; }
      .login-box h1 { font-size: 20px; }
      .login-box .subtitle { font-size: 12px; margin-bottom: 18px; }
    }
    @media (max-width: 480px) {
      body { padding: 64px 16px 16px; }
      .login-box { padding: 24px 16px; max-width: 100%; }
      .login-box h1 { font-size: 18px; }
    }
  </style>
</head>
<body>
<nav class="navbar">
  <span class="logo">🀄 超能力立直麻将</span>
</nav>

<div class="login-box">
  <h1>超能力立直麻将</h1>
  <p class="subtitle">登录或注册，开始你的对局</p>

  <div class="tab-bar">
    <button class="active" onclick="tab(0)">登录</button>
    <button onclick="tab(1)">注册</button>
  </div>

  <div class="login-panel active" id="login">
    <input class="input" id="login-user" placeholder="请输入用户名" autocomplete="username" style="margin-bottom:10px">
    <input class="input" id="login-pwd" type="password" placeholder="请输入密码" autocomplete="current-password" style="margin-bottom:14px" onkeydown="if(event.key==='Enter')login()">
    <button class="btn btn-primary" onclick="login()" style="width:100%">登 录</button>
  </div>

  <div class="login-panel" id="reg">
    <input class="input" id="reg-user" placeholder="请输入用户名（登录用）" autocomplete="username" style="margin-bottom:10px">
    <input class="input" id="reg-nick" placeholder="设置昵称（选填，默认同用户名）" style="margin-bottom:10px">
    <input class="input" id="reg-pwd" type="password" placeholder="请设置密码" autocomplete="new-password" style="margin-bottom:14px" onkeydown="if(event.key==='Enter')register()">
    <button class="btn btn-primary" onclick="register()" style="width:100%">注 册</button>
  </div>
</div>

<script>
function tab(i) {
  document.querySelectorAll('.tab-bar button').forEach((b, j) => b.classList.toggle('active', j === i));
  document.querySelectorAll('.login-panel').forEach((p, j) => p.classList.toggle('active', j === i));
}

async function login() {
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pwd').value;
  if (!u || !p) return alert('请填写用户名和密码');
  const r = await fetch('/api/login', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username: u, password: p })
  }).then(x => x.json());
  if (r.success) {
    localStorage.user = u;
    localStorage.nickname = r.nickname || u;
    localStorage.avatar = r.avatar || '🀄';
    location.href = '/lobby.html';
  }
  else alert(r.msg);
}

async function register() {
  const u = document.getElementById('reg-user').value.trim();
  const n = document.getElementById('reg-nick').value.trim();
  const p = document.getElementById('reg-pwd').value;
  if (!u || !p) return alert('请填写用户名和密码');
  const r = await fetch('/api/register', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username: u, password: p, nickname: n || u, avatar: '🀄' })
  }).then(x => x.json());
  alert(r.success ? '注册成功！请切换到登录页登录' : r.msg);
}
</script>
</body>
</html>
