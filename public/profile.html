<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>个人中心 - Super Reach Mahjong</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="themes.css">
  <meta name="theme-color" content="#000000">
  <style>
    body { padding-top: 56px; }

    .profile-page { max-width: 560px; margin: 0 auto; padding: 0 16px; }

    .profile-header {
      text-align: center;
      padding: 32px 16px 20px;
    }
    .profile-avatar {
      width: 80px; height: 80px;
      border-radius: 50%;
      font-size: 44px;
      display: inline-flex;
      align-items: center; justify-content: center;
      background: linear-gradient(135deg, var(--gradient-violet), var(--gradient-magenta));
      color: #fff;
      margin-bottom: 12px;
      box-shadow: 0 4px 20px rgba(106,76,245,0.25);
      border: 3px solid var(--surface-2);
      overflow: hidden;
    }
    .profile-nickname {
      font-size: 22px; font-weight: 800; color: var(--ink);
    }
    .profile-username {
      font-size: 13px; color: var(--ink-muted); margin-top: 4px;
    }

    .section-box {
      background: var(--surface-1);
      border-radius: var(--r-lg);
      padding: 20px;
      margin: 12px 0;
      border: 1px solid var(--hairline);
      box-shadow: var(--shadow-sm);
    }
    .section-box h3 {
      font-size: 15px; font-weight: 700;
      margin-bottom: 14px; color: var(--ink);
      display: flex; align-items: center; gap: 8px;
    }

    .form-row { margin-bottom: 14px; }
    .form-row label {
      display: block; font-size: 13px; font-weight: 600;
      color: var(--ink-muted); margin-bottom: 6px;
    }
    .form-row .hint {
      font-size: 11px; color: var(--ink-muted); margin-top: 4px; opacity: 0.7;
    }

    .avatar-grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 8px; margin-bottom: 14px;
    }
    .avatar-option {
      width: 100%; aspect-ratio: 1;
      border-radius: var(--r-sm);
      font-size: 28px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      border: 2px solid var(--surface-2);
      background: var(--surface-1);
      transition: all .2s;
      overflow: hidden;
    }
    .avatar-option:hover { border-color: var(--accent-blue); transform: scale(1.08); }
    .avatar-option.selected {
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 3px rgba(0,153,255,0.2);
    }
    .avatar-option img { width: 100%; height: 100%; object-fit: cover; border-radius: 6px; }

    .custom-upload-wrap {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 14px; flex-wrap: wrap;
    }
    .custom-upload-btn {
      padding: 8px 18px; border-radius: var(--r-pill);
      font-size: 13px; font-weight: 600; cursor: pointer;
      border: 1px solid var(--surface-2);
      background: var(--surface-1); color: var(--ink-muted);
      transition: all .2s; white-space: nowrap;
    }
    .custom-upload-btn:hover { border-color: var(--accent-blue); color: var(--accent-blue); }
    .custom-upload-name {
      font-size: 12px; color: var(--ink-muted);
      max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    #fileInput { display: none; }

    .save-row { display: flex; gap: 10px; margin-top: 16px; }
    .save-row button { flex: 1; }

    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .stat-item {
      text-align: center;
      background: var(--surface-2);
      border-radius: var(--r-md);
      padding: 14px 8px;
    }
    .stat-num { font-size: 24px; font-weight: 800; color: var(--accent-blue); }
    .stat-label { font-size: 12px; color: var(--ink-muted); margin-top: 4px; }

    .logout-section {
      text-align: center;
      padding: 20px;
      margin: 12px 0 24px;
      background: var(--surface-1);
      border: 1px solid rgba(255,90,90,0.2);
      border-radius: var(--radius-lg);
    }
    .logout-btn {
      background: rgba(255,90,90,0.12) !important;
      color: #ff5a5a !important;
      width: 100%;
      padding: 12px 24px;
      border-radius: var(--r-pill);
      font-size: 14px; font-weight: 700; cursor: pointer;
      border: 1px solid rgba(255,90,90,0.2);
      transition: all .2s;
    }
    .logout-btn:hover { background: rgba(255,90,90,0.2) !important; }

    @media (max-width: 768px) {
      .profile-header { padding: 20px 14px 14px; }
      .profile-avatar { width: 64px; height: 64px; font-size: 34px; }
      .profile-nickname { font-size: 20px; }
      .section-box { padding: 16px; margin: 8px 0; }
      .stat-num { font-size: 20px; }
    }
    @media (max-width: 540px) {
      .avatar-grid { grid-template-columns: repeat(6, 1fr); gap: 6px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .profile-header { padding: 14px 12px 10px; }
      .profile-avatar { width: 52px; height: 52px; font-size: 28px; }
      .profile-nickname { font-size: 18px; }
      .section-box { padding: 12px; margin: 6px 0; }
      .avatar-option { font-size: 22px; }
      .custom-upload-btn { padding: 6px 12px; font-size: 12px; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a class="logo" href="/lobby.html">🀄 Super Reach Mahjong</a>
  <div class="nav-links">
    <a href="/lobby.html">大厅</a>
    <a href="/profile.html" class="active">个人中心</a>
  </div>
  <span class="nav-user" id="navUser"></span>
</nav>

<div class="profile-page">

  <div class="profile-header" id="profileHeader">
    <div class="profile-avatar" id="profileAvatarDisplay">🀄</div>
    <div class="profile-nickname" id="profileNickname">---</div>
    <div class="profile-username" id="profileUsername">@---</div>
  </div>

  <!-- 统计数据 -->
  <div class="section-box">
    <h3>📊 我的战绩</h3>
    <div class="stats-grid" id="statsGrid">
      <div class="stat-item"><div class="stat-num">...</div><div class="stat-label">对局数</div></div>
      <div class="stat-item"><div class="stat-num">...</div><div class="stat-label">总回合</div></div>
      <div class="stat-item"><div class="stat-num">...</div><div class="stat-label">场均回合</div></div>
    </div>
  </div>

  <!-- 修改资料 -->
  <div class="section-box">
    <h3>✏️ 修改资料</h3>

    <div class="form-row">
      <label>选择头像</label>
      <div class="avatar-grid" id="avatarGrid"></div>
      <div class="custom-upload-wrap">
        <button class="custom-upload-btn" onclick="document.getElementById('fileInput').click()">📷 上传自定义头像</button>
        <span class="custom-upload-name" id="uploadFileName"></span>
        <input type="file" id="fileInput" accept="image/*" onchange="previewCustomAvatar(event)">
      </div>
    </div>

    <div class="form-row">
      <label>昵称</label>
      <input class="input" id="editNickname" placeholder="设置你的昵称" maxlength="12">
      <div class="hint">1-12个字符，在对局中展示给其他玩家</div>
    </div>

    <div class="form-row">
      <label>个性签名</label>
      <input class="input" id="editBio" placeholder="写一句话介绍自己吧" maxlength="40">
      <div class="hint">最多40个字符</div>
    </div>

    <div class="save-row">
      <button class="btn btn-primary" onclick="saveProfile()">💾 保存资料</button>
    </div>
  </div>

  <!-- 修改密码 -->
  <div class="section-box">
    <h3>🔒 修改密码</h3>
    <div class="form-row">
      <label>原密码</label>
      <input class="input" id="oldPwd" type="password" placeholder="输入当前密码">
    </div>
    <div class="form-row">
      <label>新密码</label>
      <input class="input" id="newPwd" type="password" placeholder="输入新密码（至少3位）">
    </div>
    <div class="save-row">
      <button class="btn btn-cyan" onclick="changePassword()">🔑 修改密码</button>
    </div>
  </div>

  <!-- 退出登录 -->
  <div class="logout-section">
    <button class="logout-btn" onclick="Auth.logout()">🚪 退出登录</button>
  </div>

</div>

<!-- 公共模块 -->
<script src="/socket.io/socket.io.js"></script>
<script src="js/lib/auth.js"></script>
<script src="js/lib/utils.js"></script>
<script src="js/lib/api.js"></script>
<script src="js/lib/theme-switcher.js"></script>

<script>
// ─── 登录检查 & 导航栏 ───
if (!Auth.check()) location.href = '/login.html';

const username = Auth.user();
Auth.renderNav('topNav', [
  { href: '/lobby.html', label: '大厅' },
  { href: '/profile.html', label: '个人中心', active: true }
]);

const AVATARS = [
  '🀄','🀅','🎭','🎪','👑','⭐','🔥','💎',
  '🐉','🦊','🐱','🐼','🐲','🦄','🐺','🦅',
  '🌸','🍀','🌙','☀️','🌈','❄️','⚡','💫',
  '🎯','🎲','♠️','♥️','♦️','♣️','🎴','🏆'
];

let currentProfile = { nickname: username, avatar: '🀄', bio: '' };
let selectedAvatar = '🀄';
let selectedAvatarType = 'emoji';
let customAvatarFile = null;
let customAvatarUrl = '';

// ─── 初始化 ───
(async function init() {
  // 加载资料
  try {
    const r = await API.getProfile(username);
    if (r.success) {
      currentProfile = { nickname: r.nickname, avatar: r.avatar, bio: r.bio || '' };
      selectedAvatar = currentProfile.avatar;
      if (selectedAvatar.startsWith('/avatars/')) {
        selectedAvatarType = 'custom';
        customAvatarUrl = selectedAvatar;
      }
    }
  } catch (e) { /* 使用默认值 */ }

  updateProfileAvatarDisplay();
  document.getElementById('profileNickname').innerText = currentProfile.nickname;
  document.getElementById('profileUsername').innerText = '@' + username;
  document.getElementById('editNickname').value = currentProfile.nickname;
  document.getElementById('editBio').value = currentProfile.bio;

  renderAvatarGrid();
  loadStats();

  // GSAP 入场动画
  if (typeof gsap !== 'undefined') {
    gsap.from('#profileHeader', {
      opacity: 0, y: -30, duration: 0.6, ease: 'power3.out'
    });
    gsap.from('.section-box', {
      opacity: 0, y: 20, duration: 0.5, stagger: 0.12, ease: 'power2.out', delay: 0.15
    });
  }
})();

// ─── 头像显示/选择 ───
function updateProfileAvatarDisplay() {
  const el = document.getElementById('profileAvatarDisplay');
  if (selectedAvatarType === 'custom' && (customAvatarUrl || selectedAvatar.startsWith('/avatars/'))) {
    const url = customAvatarUrl || selectedAvatar;
    el.innerHTML = '<img src="' + Utils.escHTML(url) + '" alt="头像" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">';
  } else {
    el.innerText = selectedAvatar;
  }
}

function renderAvatarGrid() {
  const grid = document.getElementById('avatarGrid');
  let html = AVATARS.map(a =>
    '<div class="avatar-option' + (selectedAvatarType === 'emoji' && a === selectedAvatar ? ' selected' : '') +
    '" onclick="pickAvatar(\'' + a + '\')">' + a + '</div>'
  ).join('');

  if (customAvatarUrl) {
    html += '<div class="avatar-option' + (selectedAvatarType === 'custom' ? ' selected' : '') +
      '" onclick="pickCustomAvatar()"><img src="' + Utils.escHTML(customAvatarUrl) + '" alt="自定义头像"></div>';
  }

  grid.innerHTML = html;
}

function pickAvatar(av) {
  selectedAvatar = av;
  selectedAvatarType = 'emoji';
  updateProfileAvatarDisplay();
  renderAvatarGrid();
}

function pickCustomAvatar() {
  selectedAvatarType = 'custom';
  updateProfileAvatarDisplay();
  renderAvatarGrid();
}

function previewCustomAvatar(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (file.size > 2 * 1024 * 1024) {
    Utils.showToast('⚠️ 图片不能超过2MB');
    event.target.value = '';
    return;
  }
  document.getElementById('uploadFileName').innerText = file.name;
  customAvatarFile = file;
  const reader = new FileReader();
  reader.onload = function(e) {
    customAvatarUrl = e.target.result;
    document.getElementById('profileAvatarDisplay').innerHTML =
      '<img src="' + Utils.escHTML(customAvatarUrl) + '" alt="头像" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">';
    selectedAvatarType = 'custom';
    renderAvatarGrid();
  };
  reader.readAsDataURL(file);
}

// ─── 保存资料 ───
async function saveProfile() {
  const nickname = document.getElementById('editNickname').value.trim();
  const bio = document.getElementById('editBio').value.trim();

  if (!nickname) return Utils.showToast('昵称不能为空');
  if (nickname.length > 12) return Utils.showToast('昵称最多12个字符');
  if (bio.length > 40) return Utils.showToast('签名最多40个字符');

  let finalAvatar = selectedAvatar;
  if (customAvatarFile && customAvatarUrl && customAvatarUrl.startsWith('data:')) {
    try {
      const uploadRes = await API.uploadAvatar(username, customAvatarUrl);
      if (uploadRes.success) {
        finalAvatar = uploadRes.avatar;
        customAvatarUrl = uploadRes.avatar;
        customAvatarFile = null;
        document.getElementById('uploadFileName').innerText = '';
      } else {
        return Utils.showToast('❌ ' + (uploadRes.msg || '上传失败'));
      }
    } catch (e) {
      return Utils.showToast('头像上传失败，请重试');
    }
  }

  try {
    const r = await API.updateProfile(username, nickname, finalAvatar, bio);
    if (r.success) {
      currentProfile = { nickname: r.nickname, avatar: r.avatar, bio: r.bio };
      selectedAvatar = r.avatar;

      localStorage.nickname = r.nickname;
      localStorage.avatar = r.avatar;

      updateProfileAvatarDisplay();
      renderAvatarGrid();
      document.getElementById('profileNickname').innerText = r.nickname;
      Auth.renderNav('navUser');

      // 通知其他玩家资料变更
      if (typeof io !== 'undefined') {
        const profileSocket = io({ transports: ['polling', 'websocket'] });
        profileSocket.emit('profileChanged', { username, nickname: r.nickname, avatar: r.avatar });
        setTimeout(() => profileSocket.disconnect(), 1000);
      }

      Utils.showToast('✅ 资料已保存');
    } else {
      Utils.showToast('❌ ' + (r.msg || '保存失败'));
    }
  } catch (e) {
    Utils.showToast('网络错误，请重试');
  }
}

// ─── 修改密码 ───
async function changePassword() {
  const oldPwd = document.getElementById('oldPwd').value;
  const newPwd = document.getElementById('newPwd').value;
  if (!oldPwd || !newPwd) return Utils.showToast('请填写完整信息');
  if (newPwd.length < 3) return Utils.showToast('新密码至少3位');

  try {
    const r = await API.changePassword(username, oldPwd, newPwd);
    if (r.success) {
      document.getElementById('oldPwd').value = '';
      document.getElementById('newPwd').value = '';
      Utils.showToast('✅ 密码修改成功');
    } else {
      Utils.showToast('❌ ' + (r.msg || '修改失败'));
    }
  } catch (e) {
    Utils.showToast('网络错误，请重试');
  }
}

// ─── 加载战绩 ───
async function loadStats() {
  try {
    const list = await API.getGameHistory(username);
    const totalGames = Array.isArray(list) ? list.length : 0;
    const totalRounds = Array.isArray(list)
      ? list.reduce((a, h) => a + (h.totalRounds || 0), 0) : 0;

    document.getElementById('statsGrid').innerHTML =
      '<div class="stat-item"><div class="stat-num">' + totalGames + '</div><div class="stat-label">对局数</div></div>' +
      '<div class="stat-item"><div class="stat-num">' + totalRounds + '</div><div class="stat-label">总回合</div></div>' +
      '<div class="stat-item"><div class="stat-num">' + (totalGames ? Math.round(totalRounds / totalGames) : 0) + '</div><div class="stat-label">场均回合</div></div>';
  } catch (e) {
    document.getElementById('statsGrid').innerHTML =
      '<div class="stat-item"><div class="stat-num">-</div><div class="stat-label">加载失败</div></div>';
  }
}
</script>

</body>
</html>
