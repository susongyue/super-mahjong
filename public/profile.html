<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" type="image/png" href="dong.png">
  <title>个人中心 - Super Reach Mahjong</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="themes.css">
  <meta name="theme-color" content="#000000">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <script>(function(){try{var t=localStorage.getItem('mahjong-theme')||'spotify';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
  <style>

    .profile-page { max-width: 560px; margin: 0 auto; padding: calc(var(--nav-h) + 20px) 16px 32px; }

    .profile-header {
      text-align: center;
      padding: 20px 16px 20px;
    }
    .profile-avatar {
      width: 80px; height: 80px;
      border-radius: 50%;
      font-size: 44px;
      display: inline-flex;
      align-items: center; justify-content: center;
      background: linear-gradient(135deg, var(--gradient-violet), var(--gradient-magenta));
      color: var(--text-primary);
      margin-bottom: 12px;
      box-shadow: var(--shadow-md);
      border: 3px solid var(--surface-2);
      overflow: hidden;
    }
    .profile-nickname {
      font-size: 22px; font-weight: 800; color: var(--text-primary);
    }
    .profile-username {
      font-size: 13px; color: var(--ink-muted); margin-top: 4px;
    }

    .section-box {
      background: var(--surface-1);
      border-radius: var(--r-lg);
      padding: 20px;
      margin: 12px 0;
      border: 1px solid var(--hairline);
      box-shadow: var(--shadow-sm);
    }
    .section-box h3 {
      font-size: 15px; font-weight: 700;
      margin-bottom: 14px; color: var(--text-primary);
      display: flex; align-items: center; gap: 8px;
    }

    .form-row { margin-bottom: 14px; }
    .form-row label {
      display: block; font-size: 13px; font-weight: 600;
      color: var(--ink-muted); margin-bottom: 6px;
    }
    .form-row .hint {
      font-size: 11px; color: var(--ink-muted); margin-top: 4px; opacity: 0.7;
    }

    .avatar-grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 8px; margin-bottom: 14px;
    }
    .avatar-option {
      width: 100%; aspect-ratio: 1;
      border-radius: var(--r-sm);
      font-size: 40px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      border: 1px solid var(--surface-2);
      background: var(--charcoal-placeholder);
      transition: all .2s;
      overflow: hidden;
    }
    .avatar-option:hover { border-color: var(--accent-blue); transform: scale(1.08); }
    .avatar-option.selected {
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 3px var(--accent-blue-glow);
    }
    .avatar-option img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

    .custom-upload-wrap {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 14px; flex-wrap: wrap;
    }
    .custom-upload-btn {
      padding: 8px 18px; border-radius: var(--r-pill);
      font-size: 13px; font-weight: 600; cursor: pointer;
      border: 1px solid var(--green);
      background: var(--surface-1); color: var(--text-primary);
      transition: all .2s; white-space: nowrap;
    }
    .custom-upload-btn:hover { border-color: var(--accent-blue); color: var(--accent-blue); }
    .custom-upload-name {
      font-size: 12px; color: var(--ink-muted);
      max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    #fileInput { display: none; }

    .save-row { display: flex; gap: 10px; margin-top: 16px; }
    .save-row button { flex: 1; }

    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .stat-item {
      text-align: center;
      background: var(--surface-2);
      border-radius: var(--r-md);
      padding: 14px 8px;
    }
    .stat-num { font-size: 24px; font-weight: 800; color: var(--accent-blue); }
    .stat-label { font-size: 12px; color: var(--ink-muted); margin-top: 4px; }

    .logout-section {
      text-align: center;
      padding: 20px;
      margin: 12px 0 24px;
      background: var(--surface-1);
      border: 1px solid var(--red-border);
      border-radius: var(--r-lg);
    }
    .logout-btn {
      background: var(--red-bg) !important;
      color: var(--red) !important;
      width: 100%;
      padding: 12px 24px;
      border-radius: var(--r-pill);
      font-size: 14px; font-weight: 700; cursor: pointer;
      border: 1px solid var(--red-border);
      transition: all .2s;
    }
    .logout-btn:hover { background: var(--hover-overlay-strong) !important; }

    /* ── 历史头像 ── */
    .avatar-history-grid {
      display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px;
    }
    .avatar-history-item {
      width: 48px; height: 48px; border-radius: 50%;
      cursor: pointer; border: 1px solid var(--hairline);
      overflow: hidden; transition: all .2s; position: relative;
    }
    .avatar-history-item:hover { border-color: var(--accent-blue); transform: scale(1.08); }
    .avatar-history-item img { width: 100%; height: 100%; object-fit: cover; }
    .avatar-history-empty {
      font-size: 12px; color: var(--ink-muted); padding: 8px 0;
    }

    /* ── 管理员面板 ── */
    .admin-section {
      background: var(--surface-1);
      border-radius: var(--r-lg);
      padding: 20px;
      margin: 12px 0;
      border: 1px solid var(--red-border);
      box-shadow: var(--shadow-sm);
    }
    .admin-section h3 {
      font-size: 15px; font-weight: 700;
      margin-bottom: 14px; color: var(--red);
      display: flex; align-items: center; gap: 8px;
    }
    .admin-btn {
      padding: 8px 18px; border-radius: var(--r-pill);
      font-size: 13px; font-weight: 600; cursor: pointer;
      border: 1px solid var(--red-border);
      background: var(--red-bg); color: var(--red);
      transition: all .2s; margin: 4px 6px 4px 0;
    }
    .admin-btn:hover { background: var(--hover-overlay-strong); }
    .admin-status {
      font-size: 12px; color: var(--ink-muted); line-height: 1.8;
      background: var(--surface-2); padding: 10px 14px; border-radius: var(--r-md);
      margin-bottom: 12px; min-height: 20px;
    }

    @media (max-width: 768px) {
      .profile-page { padding-top: calc(var(--nav-h) + 12px); padding-left: 12px; padding-right: 12px; }
      .profile-header { padding: 20px 14px 14px; }
      .profile-avatar { width: 64px; height: 64px; font-size: 34px; }
      .profile-nickname { font-size: 20px; }
      .section-box { padding: 16px; margin: 8px 0; }
      .stat-num { font-size: 20px; }
    }
    @media (max-width: 540px) {
      .profile-page { padding-top: calc(var(--nav-h) + 8px); padding-left: 10px; padding-right: 10px; }
      .avatar-grid { grid-template-columns: repeat(6, 1fr); gap: 6px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .profile-header { padding: 14px 12px 10px; }
      .profile-avatar { width: 52px; height: 52px; font-size: 28px; }
      .profile-nickname { font-size: 18px; }
      .section-box { padding: 12px; margin: 6px 0; }
      .avatar-option { font-size: 22px; }
      .custom-upload-btn { padding: 6px 12px; font-size: 12px; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a class="logo" href="/lobby.html">Mahjong</a>
  <div class="nav-links">
    <a href="/lobby.html" title="大厅"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></a>
    <a href="/history.html" title="对局记录"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></a>
    <a href="/encyclopedia.html" title="角色图鉴"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2Z"/></svg></a>
    <a href="/profile.html" class="active" title="个人中心"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></a>
  </div>
  <span class="nav-user" id="navUser"></span>
</nav>

<div class="profile-page">

  <div class="profile-header" id="profileHeader">
    <div class="profile-avatar" id="profileAvatarDisplay"></div>
    <div class="profile-nickname" id="profileNickname">---</div>
    <div class="profile-username" id="profileUsername">@---</div>
  </div>

  <!-- 统计数据 -->
  <div class="section-box">
    <h3>我的战绩</h3>
    <div class="stats-grid" id="statsGrid">
      <div class="stat-item"><div class="stat-num">...</div><div class="stat-label">对局数</div></div>
      <div class="stat-item"><div class="stat-num">...</div><div class="stat-label">总回合</div></div>
      <div class="stat-item"><div class="stat-num">...</div><div class="stat-label">场均回合</div></div>
    </div>
  </div>

  <!-- 修改资料 -->
  <div class="section-box">
    <h3>修改资料</h3>

    <div class="form-row">
      <label>选择头像</label>
      <div class="avatar-grid" id="avatarGrid"></div>
      <div class="custom-upload-wrap">
        <button class="custom-upload-btn" onclick="document.getElementById('fileInput').click()">上传自定义头像</button>
        <span class="custom-upload-name" id="uploadFileName"></span>
        <input type="file" id="fileInput" accept="image/*" onchange="previewCustomAvatar(event)">
      </div>
      <div class="form-row" id="historyAvatarsRow" style="display:none">
        <label>历史头像（点击切换）</label>
        <div class="avatar-history-grid" id="avatarHistoryGrid"></div>
      </div>
    </div>

    <div class="form-row">
      <label>昵称</label>
      <input class="input" id="editNickname" placeholder="设置你的昵称" maxlength="12">
      <div class="hint">1-12个字符，在对局中展示给其他玩家</div>
    </div>

    <div class="form-row">
      <label>个性签名</label>
      <input class="input" id="editBio" placeholder="写一句话介绍自己吧" maxlength="40">
      <div class="hint">最多40个字符</div>
    </div>

    <div class="save-row">
      <button class="btn btn-primary" onclick="saveProfile()">保存资料</button>
    </div>
  </div>

  <!-- 修改密码 -->
  <div class="section-box">
    <h3>修改密码</h3>
    <div class="form-row">
      <label>原密码</label>
      <input class="input" id="oldPwd" type="password" placeholder="输入当前密码">
    </div>
    <div class="form-row">
      <label>新密码</label>
      <input class="input" id="newPwd" type="password" placeholder="输入新密码（至少3位）">
    </div>
    <div class="save-row">
      <button class="btn btn-primary" onclick="changePassword()">修改密码</button>
    </div>
  </div>

  <!-- 外观设置 -->
  <div class="section-box">
    <h3>外观设置</h3>
    <div id="themeOptions"></div>
  </div>

  <!-- 管理员面板 -->
  <div class="admin-section" id="adminSection" style="display:none">
    <h3>⚙️ 管理员面板</h3>
    <div class="admin-status" id="adminStatus">点击"获取状态"查看服务器信息…</div>
    <button class="admin-btn" onclick="refreshAdminStatus()">获取状态</button>
    <button class="admin-btn" onclick="confirmRestart()">重启服务器</button>
  </div>

  <!-- 退出登录 -->
  <div class="logout-section">
    <button class="logout-btn" onclick="Auth.logout()">退出登录</button>
  </div>

</div>

<!-- 公共模块 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script src="js/lib/auth.js"></script>
<script>if(window.Auth&&typeof Auth.syncProfile!=='function'){Auth.syncProfile=function(){return this.user()?API.getProfile(this.user()).then(function(r){if(r&&r.success){localStorage.nickname=r.nickname;localStorage.avatar=r.avatar||'';if(r.bio!==undefined)localStorage.bio=r.bio;return r}return null}).catch(function(){return null}):Promise.resolve(null)}}</script>
<script src="js/lib/utils.js"></script>
<script>if(window.Utils&&typeof Utils.safeAnimate!=='function'){Utils.safeAnimate=function(t,v){if(typeof gsap!=='undefined'&&gsap.from){try{gsap.from(t,v)}catch(_){}}};Utils.setBtnLoading=function(b,t){if(b){b.disabled=true;b.textContent=t||'处理中…'}};Utils.resetBtn=function(b){if(b){b.disabled=false}}}</script>
<script src="js/lib/api.js"></script>
<script>if(window.API&&typeof API.adminCheck!=='function'){API.adminCheck=function(u){return fetch('/api/admin/check?username='+encodeURIComponent(u)).then(function(r){return r.json()})}}</script>
<script src="js/lib/theme-switcher.js"></script>

<script>
// ─── 登录检查 & 导航栏 ───
if (!Auth.check()) location.href = '/login.html';

const username = Auth.user();
Auth.renderNav(document.getElementById('navUser'));

const AVATARS = [
  '👑','⭐','🐲','🦄','🌸','🍀','🌙','☀️','🌈','❄️','⚡','💫','🎯','🎲','🎴','🏆'
];

let currentProfile = { nickname: username, avatar: '', bio: '' };
let selectedAvatar = '';
let selectedAvatarType = 'emoji';
let customAvatarFile = null;
let customAvatarUrl = '';

// ─── 初始化 ───
(async function init() {
  // 加载资料
  try {
    const r = await API.getProfile(username);
    if (r.success) {
      currentProfile = { nickname: r.nickname, avatar: r.avatar, bio: r.bio || '' };
      selectedAvatar = currentProfile.avatar || '';
      // 自定义上传头像：本地路径 /avatars/... 或 CDN URL
      if (selectedAvatar.startsWith('/avatars/') || selectedAvatar.startsWith('https://')) {
        selectedAvatarType = 'custom';
        customAvatarUrl = selectedAvatar;
      }

      // 同步到 localStorage
      localStorage.nickname = r.nickname;
      localStorage.avatar = r.avatar || '';
      if (r.bio !== undefined) localStorage.bio = r.bio;
    }
  } catch (e) { /* 使用默认值 */ }

  updateProfileAvatarDisplay();
  document.getElementById('profileNickname').innerText = currentProfile.nickname;
  document.getElementById('profileUsername').innerText = '@' + username;
  document.getElementById('editNickname').value = currentProfile.nickname;
  document.getElementById('editBio').value = currentProfile.bio || '';

  // 导航栏同步最新资料
  Auth.renderNav(document.getElementById('navUser'));

  renderAvatarGrid();
  loadStats();

  // GSAP 入场动画
  Utils.safeAnimate('.navbar', { y: -60, opacity: 0, duration: 0.5, ease: 'power3.out' });
  Utils.safeAnimate('#profileHeader', {
    opacity: 0, y: -30, duration: 0.6, delay: 0.1, ease: 'power3.out'
  });
  Utils.safeAnimate('.section-box, .logout-section, .admin-section', {
    opacity: 0, y: 20, duration: 0.5, stagger: 0.12, ease: 'power2.out', delay: 0.2
  });
})();

// ─── 头像显示/选择 ───
function updateProfileAvatarDisplay() {
  const el = document.getElementById('profileAvatarDisplay');
  if (selectedAvatarType === 'custom' && (customAvatarUrl || selectedAvatar.startsWith('/avatars/') || selectedAvatar.startsWith('https://'))) {
    const url = customAvatarUrl || selectedAvatar;
    el.innerHTML = '<img src="' + Utils.escHTML(url) + '" alt="头像" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">';
  } else {
    el.innerText = selectedAvatar;
  }
}

function renderAvatarGrid() {
  const grid = document.getElementById('avatarGrid');
  let html = AVATARS.map(a =>
    '<div class="avatar-option' + (selectedAvatarType === 'emoji' && a === selectedAvatar ? ' selected' : '') +
    '" onclick="pickAvatar(\'' + a + '\')">' + a + '</div>'
  ).join('');

  if (customAvatarUrl) {
    html += '<div class="avatar-option' + (selectedAvatarType === 'custom' ? ' selected' : '') +
      '" onclick="pickCustomAvatar()"><img src="' + Utils.escHTML(customAvatarUrl) + '" alt="自定义头像"></div>';
  }

  grid.innerHTML = html;
}

function pickAvatar(av) {
  selectedAvatar = av;
  selectedAvatarType = 'emoji';
  updateProfileAvatarDisplay();
  renderAvatarGrid();
}

function pickCustomAvatar() {
  selectedAvatarType = 'custom';
  updateProfileAvatarDisplay();
  renderAvatarGrid();
}

function previewCustomAvatar(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (file.size > 2 * 1024 * 1024) {
    Utils.showToast('图片不能超过2MB');
    event.target.value = '';
    return;
  }
  document.getElementById('uploadFileName').innerText = file.name;
  customAvatarFile = file;
  const reader = new FileReader();
  reader.onload = function(e) {
    customAvatarUrl = e.target.result;
    document.getElementById('profileAvatarDisplay').innerHTML =
      '<img src="' + Utils.escHTML(customAvatarUrl) + '" alt="头像" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">';
    selectedAvatarType = 'custom';
    renderAvatarGrid();
  };
  reader.readAsDataURL(file);
}

// ─── 保存资料 ───
async function saveProfile() {
  const nickname = document.getElementById('editNickname').value.trim();
  const bio = document.getElementById('editBio').value.trim();

  if (!nickname) return Utils.showToast('昵称不能为空');
  if (nickname.length > 12) return Utils.showToast('昵称最多12个字符');
  if (bio.length > 40) return Utils.showToast('签名最多40个字符');

  let finalAvatar = selectedAvatar;
  if (customAvatarFile && customAvatarUrl && customAvatarUrl.startsWith('data:')) {
    try {
      const uploadRes = await API.uploadAvatar(username, customAvatarUrl);
      if (uploadRes.success) {
        finalAvatar = uploadRes.avatar;
        customAvatarUrl = uploadRes.avatar;
        customAvatarFile = null;
        document.getElementById('uploadFileName').innerText = '';
      } else {
        return Utils.showToast('❌ ' + (uploadRes.msg || '上传失败'));
      }
    } catch (e) {
      return Utils.showToast('头像上传失败，请重试');
    }
  }

  try {
    const r = await API.updateProfile(username, nickname, finalAvatar, bio);
    if (r.success) {
      currentProfile = { nickname: r.nickname, avatar: r.avatar, bio: r.bio };
      selectedAvatar = r.avatar;

      localStorage.nickname = r.nickname;
      localStorage.avatar = r.avatar;

      updateProfileAvatarDisplay();
      renderAvatarGrid();
      document.getElementById('profileNickname').innerText = r.nickname;
      Auth.renderNav(document.getElementById('navUser'));

      // 通知其他玩家资料变更
      if (typeof io !== 'undefined') {
        const profileSocket = io({ transports: ['polling', 'websocket'] });
        profileSocket.emit('profileChanged', { username, nickname: r.nickname, avatar: r.avatar });
        setTimeout(() => profileSocket.disconnect(), 1000);
      }

      Utils.showToast(' 资料已保存');
    } else {
      Utils.showToast('❌ ' + (r.msg || '保存失败'));
    }
  } catch (e) {
    Utils.showToast('网络错误，请重试');
  }
}

// ─── 修改密码 ───
async function changePassword() {
  const oldPwd = document.getElementById('oldPwd').value;
  const newPwd = document.getElementById('newPwd').value;
  if (!oldPwd || !newPwd) return Utils.showToast('请填写完整信息');
  if (newPwd.length < 3) return Utils.showToast('新密码至少3位');

  try {
    const r = await API.changePassword(username, oldPwd, newPwd);
    if (r.success) {
      document.getElementById('oldPwd').value = '';
      document.getElementById('newPwd').value = '';
      Utils.showToast(' 密码修改成功');
    } else {
      Utils.showToast('❌ ' + (r.msg || '修改失败'));
    }
  } catch (e) {
    Utils.showToast('网络错误，请重试');
  }
}

// ─── 加载战绩 ───
async function loadStats() {
  try {
    const list = await API.getGameHistory(username);
    const totalGames = Array.isArray(list) ? list.length : 0;
    const totalRounds = Array.isArray(list)
      ? list.reduce((a, h) => a + (h.totalRounds || 0), 0) : 0;

    document.getElementById('statsGrid').innerHTML =
      '<div class="stat-item"><div class="stat-num">' + totalGames + '</div><div class="stat-label">对局数</div></div>' +
      '<div class="stat-item"><div class="stat-num">' + totalRounds + '</div><div class="stat-label">总回合</div></div>' +
      '<div class="stat-item"><div class="stat-num">' + (totalGames ? Math.round(totalRounds / totalGames) : 0) + '</div><div class="stat-label">场均回合</div></div>';
  } catch (e) {
    document.getElementById('statsGrid').innerHTML =
      '<div class="stat-item"><div class="stat-num">-</div><div class="stat-label">加载失败</div></div>';
  }
}

// ─── 主题选择初始化 ───
function initThemePicker() {
  var container = document.getElementById('themeOptions');
  if (!container || typeof Theme === 'undefined') return;
  var current = Theme.get();
  container.innerHTML = Theme.list.map(function(t) {
    return '<div class="theme-opt' + (t.id === current ? ' active' : '') +
      '" onclick="Theme.set(\'' + t.id + '\'); initThemePicker();">' +
      '<span class="dot" style="background:' + t.dot + '"></span>' +
      t.name + (t.dark ? ' 🌙' : ' ☀️') +
      '</div>';
  }).join('');
}
initThemePicker();

// ── 加载历史头像 ──
async function loadAvatarHistory() {
  try {
    var res = await API.getAvatarHistory(username);
    if (!res.success || !res.history || res.history.length === 0) return;
    document.getElementById('historyAvatarsRow').style.display = '';
    var grid = document.getElementById('avatarHistoryGrid');
    grid.innerHTML = res.history.map(function(url, i) {
      var display = url;
      if (!display || (!display.startsWith('http') && !display.startsWith('/'))) display = '';
      return display
        ? '<div class="avatar-history-item" onclick="useHistoryAvatar(' + i + ')" title="点击切换">' +
          '<img src="' + Utils.escHTML(display) + '" alt="历史头像" onerror="this.parentElement.style.display=\'none\'">' +
          '</div>'
        : '';
    }).join('');
  } catch (e) { /* ignore */ }
}
loadAvatarHistory();

// ── 使用历史头像 ──
async function useHistoryAvatar(idx) {
  if (!confirm('切换到这个历史头像？')) return;
  try {
    var res = await API.useHistoryAvatar(username, idx);
    if (res.success) {
      selectedAvatar = res.avatar;
      selectedAvatarType = 'custom';
      customAvatarUrl = res.avatar;
      customAvatarFile = null;
      document.getElementById('uploadFileName').innerText = '';
      localStorage.avatar = res.avatar;
      updateProfileAvatarDisplay();
      renderAvatarGrid();
      Auth.renderNav(document.getElementById('navUser'));
      loadAvatarHistory(); // 刷新历史列表
      Utils.showToast('头像已切换');
    } else {
      Utils.showToast('❌ ' + (res.msg || '切换失败'));
    }
  } catch (e) {
    Utils.showToast('网络错误，请重试');
  }
}

// ── 管理员面板 ──
async function checkIsAdmin() {
  if (typeof API.adminCheck !== 'function') {
    console.log('[admin] API.adminCheck 不可用（需更新部署）');
    return;
  }
  try {
    var r = await API.adminCheck(username);
    if (r && r.success && r.isAdmin) {
      document.getElementById('adminSection').style.display = '';
      console.log('[admin] 管理员面板已激活, 配置人数:', r.adminUsers);
    } else if (r && r.success && r.adminUsers > 0 && !r.isAdmin) {
      console.log('[admin] 非管理员用户 (已配置' + r.adminUsers + '个管理员)');
    } else {
      console.log('[admin] 未配置管理员或检测失败');
    }
  } catch (e) {
    console.warn('[admin] 检测失败:', e.message || e);
  }
}
checkIsAdmin();

async function refreshAdminStatus() {
  var el = document.getElementById('adminStatus');
  el.innerText = '加载中…';
  try {
    var r = await API.adminStatus(username);
    if (r.success) {
      el.innerHTML =
        '运行时长：<strong>' + r.uptime + '</strong><br>' +
        '内存占用：<strong>' + r.memory + '</strong><br>' +
        'Node 版本：<strong>' + r.nodeVersion + '</strong><br>' +
        '活跃房间：<strong>' + r.activeRooms + '</strong> | 在线玩家：<strong>' + r.connectedPlayers + '</strong>';
    } else {
      el.innerText = '❌ ' + (r.msg || '获取失败');
    }
  } catch (e) {
    el.innerText = '网络错误';
  }
}

function confirmRestart() {
  if (!confirm('⚠️ 确定要重启服务器吗？\n重启期间所有玩家将断开连接。')) return;
  if (!confirm('请再次确认：这会导致所有正在进行的对局中断！')) return;
  executeRestart();
}

async function executeRestart() {
  var el = document.getElementById('adminStatus');
  el.innerHTML = '🔄 <strong>正在重启服务器…</strong>';
  try {
    await API.adminRestart(username);
    // 服务器会在 1 秒后退出的，这里不需要做什么
    setTimeout(function() {
      el.innerHTML = '服务器可能正在重启，请等待 10-30 秒后刷新页面…';
    }, 2000);
  } catch (e) {
    el.innerText = '重启请求发送失败';
  }
}
</script>
