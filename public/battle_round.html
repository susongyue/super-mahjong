<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" type="image/png" href="dong.png">
  <title>回合对战 - Super Reach Mahjong</title>
  <link rel="stylesheet" href="style.css?v=6">
  <link rel="stylesheet" href="themes.css">
  <meta name="theme-color" content="#000000">
<link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <script>(function(){try{var t=localStorage.getItem('mahjong-theme')||'spotify';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
  <style>
    .container { max-width: 800px; }

    .page-header {
      text-align: center; margin-bottom: 20px;
    }
    .page-header h1 {
      font-size: 28px; color: var(--accent-blue); font-weight: 800;
      margin-bottom: 6px; letter-spacing: -1px;
    }
    .page-header .info {
      color: var(--ink-muted); font-size: 14px; line-height: 1.6;
    }

    .battle-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
    }
    .battle-grid > * { min-width: 0; }

    .player-battle-card {
      background: var(--surface-1);
      border-radius: var(--r-lg);
      padding: 15px;
      border: 2px solid var(--hairline-strong);
      box-shadow: var(--shadow-sm);
      transition: all .25s;
    }
    .player-battle-card:hover {
      border-color: var(--accent-blue);
      box-shadow: var(--shadow-md);
    }
    .player-battle-card.is-self {
      border-color: var(--accent-blue);
      background: var(--accent-blue-glow);
      box-shadow: var(--shadow-selected);
    }
    .player-battle-card .player-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 12px; padding-bottom: 10px;
      border-bottom: 1px solid var(--hairline);
    }
    .player-battle-card .player-avatar {
      width: 45px; height: 45px; border-radius: 50%;
      background: linear-gradient(135deg, var(--gradient-violet), var(--gradient-magenta));
      color: var(--text-primary); font-size: 20px; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; overflow: hidden;
    }
    .player-battle-card.is-self .player-avatar {
      background: linear-gradient(135deg, var(--gradient-magenta), var(--gradient-coral));
    }
    .player-battle-card .player-header-info {
      flex: 1; min-width: 0;
    }
    .player-battle-card .player-name-row {
      display: flex; align-items: center; gap: 8px;
      flex-wrap: wrap;
    }
    .player-battle-card .player-name {
      font-size: 19px; font-weight: 800; color: var(--text-primary);
      line-height: 1.2;
    }
    .player-battle-card .player-username-sub {
      font-size: 13px; color: var(--ink-muted);
      margin-top: 1px;
    }
    .player-battle-card .player-tag {
      font-size: 13px; color: var(--accent-blue); font-weight: 600;
      background: var(--accent-blue-glow);
      padding: 1px 8px; border-radius: var(--r-pill);
      line-height: 1.2;
    }

    .battle-char-wrapper { cursor: pointer; }
    .battle-char-card {
      background: var(--surface-2);
      border-radius: var(--r-md);
      padding: 14px;
      border: 1px solid var(--hairline);
      transition: all .2s; position: relative;
      display: flex; flex-direction: column; gap: 0;
      overflow: hidden;
    }
    .battle-char-wrapper:hover .battle-char-card {
      border-color: var(--accent-blue);
      box-shadow: var(--shadow-blue);
      transform: translateY(-1px);
    }

    /* ── 卡片主体：左头像 + 右信息列 ── */
    .battle-char-card .char-body {
      display: flex; align-items: center; gap: 14px;
    }
    .battle-char-card .char-avatar-wrap {
      flex-shrink: 0;
    }
    .battle-char-card .char-info {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column; gap: 5px;
    }

    .battle-char-card .char-tier {
      font-size: 16px; color: var(--accent-blue); font-weight: 600;
    }
    .battle-char-card .char-avatar,
    .battle-char-card .char-avatar-placeholder {
      width: 64px; height: 64px; border-radius: 50%;
      object-fit: cover; flex-shrink: 0;
    }
    .battle-char-card .char-avatar-placeholder {
      display: flex; align-items: center; justify-content: center;
      background: var(--surface-3);
      color: var(--text-primary); font-size: 24px; font-weight: 800;
    }
    .battle-char-card .char-name {
      font-size: 20px; font-weight: 800;
      color: var(--text-primary);
      line-height: 1.2;
      word-break: keep-all; overflow-wrap: break-word;
    }
    .battle-char-card .click-hint {
      font-size: 12px; color: var(--ink-muted); text-align: center;
      margin-top: 10px; padding-top: 8px;
      border-top: 1px solid var(--hairline);
    }
    .battle-char-card .retain-badge {
      position: absolute; top: 5px; right: 5px;
      background: var(--gold); color: var(--on-primary);
      font-size: 11px; font-weight: 700; padding: 3px 8px;
      border-radius: var(--r-pill);
      z-index: 2;
    }

    .no-selection {
      text-align: center; padding: 20px;
      color: var(--ink-muted); font-size: 14px;
    }

    @media (max-width: 1024px) {
      .battle-grid { grid-template-columns: repeat(2, 1fr); gap: 14px; }
      .player-battle-card { padding: 18px; }
      .player-battle-card .player-avatar { width: 50px; height: 50px; font-size: 22px; }
      .player-battle-card .player-name { font-size: 20px; }
      .battle-char-card .char-avatar,
      .battle-char-card .char-avatar-placeholder { width: 60px; height: 60px; }
      .battle-char-card .char-name { font-size: 20px; }
      .battle-char-card { padding: 18px; }
    }
    @media (max-width: 768px) {
      .battle-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .page-header { margin-bottom: 12px; }
      .page-header h1 { font-size: 22px; }
      .page-header .info { font-size: 12px; }
      .player-battle-card { padding: 12px; border-radius: var(--r-lg); }
      .player-battle-card .player-header { margin-bottom: 8px; padding-bottom: 8px; }
      .player-battle-card .player-name { font-size: 17px; }
      .player-battle-card .player-avatar { width: 38px; height: 38px; font-size: 17px; }
      .battle-char-card .char-avatar,
      .battle-char-card .char-avatar-placeholder { width: 50px; height: 50px; }
      .battle-char-card .char-name { font-size: 18px; }
      .battle-char-card .char-tier { font-size: 13px; }
      .battle-char-card .click-hint { font-size: 11px; }
      .battle-char-card { padding: 10px; }
      .battle-char-card .char-body { gap: 10px; }
      .battle-char-card .char-info { gap: 3px; }
    }
    @media (max-width: 540px) {
      .battle-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .page-header h1 { font-size: 18px; }
      .player-battle-card { padding: 10px; }
      .player-battle-card .player-header { margin-bottom: 6px; padding-bottom: 6px; }
      .player-battle-card .player-name { font-size: 15px; }
      .player-battle-card .player-avatar { width: 34px; height: 34px; font-size: 15px; }
      .player-battle-card .player-tag { font-size: 11px; padding: 1px 6px; }
      .battle-char-card .char-avatar,
      .battle-char-card .char-avatar-placeholder { width: 42px; height: 42px; }
      .battle-char-card .char-name { font-size: 16px; }
      .battle-char-card .char-tier { font-size: 12px; }
      .battle-char-card .retain-badge { top: 3px; right: 3px; font-size: 10px; padding: 2px 6px; }
      .battle-char-card { padding: 8px; }
      .battle-char-card .char-body { gap: 8px; }
      .battle-char-card .char-info { gap: 2px; }
      .battle-char-card .click-hint { font-size: 10px; margin-top: 6px; padding-top: 6px; }
      .no-selection { padding: 10px; font-size: 12px; }
    }

    /* ── 投票面板（桌面端固定右侧） ── */
    .vote-panel {
      position: fixed;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      width: 300px;
      background: var(--surface-1);
      border: 2px solid var(--hairline);
      border-radius: var(--r-lg);
      padding: 16px;
      box-shadow: var(--shadow-md);
      z-index: 50;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .vote-panel-title {
      font-size: 16px;
      color: var(--text-primary);
      text-align: center;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--hairline);
    }
    .vote-panel-body {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .vote-panel-body .vote-btn {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
    }
    .vote-panel-footer {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .vote-panel-footer .vote-count {
      font-size: 13px;
      padding: 4px 10px;
      justify-content: center;
    }
    .vote-names {
      font-size: 11px;
      color: var(--ink-muted);
      line-height: 1.5;
      max-height: 80px;
      overflow-y: auto;
    }
    @media (max-width: 1420px) {
      .vote-panel {
        left: 2%;
        width: 96%;
        position: relative;
        z-index: 1;
        transform: none;
        margin-top: 10px;
        box-sizing: border-box;
        padding: 0;
        border: none;
        background: transparent;
        box-shadow: none;
        gap: 6px;
      }
      .vote-panel-body { flex-direction: row; gap: 8px; }
      .vote-panel-body .vote-btn {
        flex: 1;
        padding: 12px 8px;
        font-size: 13px;
        border-radius: var(--r-lg);
      }
      .vote-panel-body .vote-btn-exit {
        flex: 1;
        padding: 12px 8px;
        font-size: 11px;
      }
      .vote-panel-footer { display: none; }
      .vote-names {
        text-align: center;
        font-size: 11px;
        max-height: 36px;
      }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a class="logo" href="/lobby.html">Mahjong</a>
  <div class="nav-links">

    <a href="/game.html" id="navGameSelect" title="选择出战"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg></a>
    <a href="/battle_round.html" id="navGameBattle" class="active" title="回合对战"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></a>

<div class="container">
  <div class="page-header">
    <h1>第 <span id="roundNum">1</span> 回合对战</h1>
    <div class="info">
      房间：<strong id="roomDisplay"></strong> | 玩家：<strong id="nameDisplay"></strong>
    </div>
  </div>

  <div class="section">
    <h2>玩家出战角色</h2>
    <div class="battle-grid" id="battleGrid">
      <div class="no-data">加载中...</div>
    </div>
  </div>

</div>

<!-- 投票面板（桌面端固定右侧） -->
<div class="vote-panel" id="votePanel">
  <div class="vote-panel-body">
    <button class="vote-btn vote-btn-round" id="btnEndRound">投票结束回合</button>
    <button class="vote-btn vote-btn-game" id="btnEndGame">投票结束对局</button>
    <button class="vote-btn vote-btn-exit" id="btnExitGame" title="强制退出对局">退出对局</button>
  </div>
  <div class="vote-panel-footer">

    <span id="gameVoteInfo" class="vote-count game">对局 0/0</span>
  </div>

</div>

<!-- 角色详情弹窗 -->
<div class="detail-overlay" id="detailOverlay">
  <div class="detail-card" id="detailCard"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/lib/auth.js"></script>
<script src="/js/lib/utils.js"></script>
<script src="/js/lib/api.js"></script>
<script src="/js/lib/components.js"></script>
<script src="/js/lib/theme-switcher.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
Auth.check();
var username = Auth.user();
var roomId = Auth.checkRoomId();

// 页面加载前检查房间状态
(async function checkRoomBeforeLoad() {
  try {
    var status = await API.getRoomStatus(roomId, username);
    if (status.finished || !status.exists) {
      Utils.showToast(status.msg || '该对局已结束，即将返回大厅');
      localStorage.removeItem('roomId');
      setTimeout(function () { location.href = '/lobby.html'; }, 2000);
      return;
    }
  } catch (e) { /* 网络错误允许继续 */ }
})();

Auth.renderNav(document.getElementById('navUser'));
Nav.updateLinks();
document.getElementById('roomDisplay').innerText = roomId;
document.getElementById('nameDisplay').innerText = username;

var allChars = {};
var battleSelections = {};
var playerProfiles = {};

// ══════════ Socket ══════════
var socket = io({ transports: ['polling', 'websocket'] });
var joinDone = false;
var loadRetry = 0;
var MAX_RETRY = 5;

socket.on('connect', function () {
  socket.emit('joinRoom', { roomId: roomId, playerName: username });
  socket.emit('getRoomState', roomId);
});

socket.on('joinSuccess', function () {
  if (!joinDone) {
    joinDone = true;
    socket.emit('requestBattleRoundData', roomId);
    loadBattleData();
  }
});

socket.on('roomPlayersUpdate', function (data) {
  if (data && data.players) {
    data.players.forEach(function (p) {
      playerProfiles[p.name] = { nickname: p.nickname || p.name, avatar: p.avatar || '' };
    });
  }
  if (joinDone) { loadBattleData(); }
});

socket.on('battleRoundData', function (data) {
  console.log('收到 socket 对战数据:', { draft: Object.keys(data.draft || {}).length, selections: Object.keys(data.selections || {}).length });
  if (data.draft && Object.keys(data.draft).length > 0) { allChars = data.draft; }
  if (data.selections && Object.keys(data.selections).length > 0) {
    battleSelections = data.selections;
    if (Object.keys(allChars).length === 0) {
      API.getAllDraft(roomId).then(function (d) {
        if (d && Object.keys(d).length > 0) allChars = d;
      }).catch(function () {});
    }
  }
  if (data.players && data.players.length) {
    data.players.forEach(function (p) {
      if (!playerProfiles[p.name]) {
        playerProfiles[p.name] = { nickname: p.nickname || p.name, avatar: p.avatar || '' };
      }
    });
  }
  renderBattleGrid();
});

socket.on('roomState', function (data) {
  document.getElementById('roundNum').innerText = data.round || 1;
  // 重置投票按钮
  var btnRound = document.getElementById('btnEndRound');
  if (btnRound) {
    btnRound.disabled = false;
    btnRound.innerText = '投票结束回合';
    btnRound.style.opacity = '';
  }
  var btnGame = document.getElementById('btnEndGame');
  if (btnGame) {
    btnGame.disabled = false;
    btnGame.innerText = '投票结束对局';
    btnGame.style.opacity = '';
  }
  document.getElementById('roundVoteInfo').innerText = '回合 0/' + (data.totalPlayers || 0);
  document.getElementById('roundVoteInfo').className = 'vote-count round';
  document.getElementById('gameVoteInfo').innerText = '对局 0/' + (data.totalPlayers || 0);
  document.getElementById('gameVoteInfo').className = 'vote-count game';
});

socket.on('roundAdvanced', function (data) {
  location.href = '/game.html';
});

socket.on('roundEndVoteUpdate', function (data) {
  document.getElementById('roundVoteInfo').innerText = '回合 ' + data.voted + '/' + data.total;
  document.getElementById('roundVoteInfo').className = data.voted >= data.total ? 'vote-count done' : 'vote-count round';
  if (data.votedNames) {
    document.getElementById('voteNames').innerText = '已投票：' + data.votedNames.join('、');
  }
  var btn = document.getElementById('btnEndRound');
  if (btn) {
    btn.innerText = '投票结束回合 (' + data.voted + '/' + data.total + ')';
    if (data.voted >= data.total) {
      btn.disabled = true;
      btn.style.opacity = '0.5';
    }
  }
});

socket.on('gameEndVoteUpdate', function (data) {
  document.getElementById('gameVoteInfo').innerText = '对局 ' + data.voted + '/' + data.total;
  document.getElementById('gameVoteInfo').className = data.voted >= data.total ? 'vote-count done' : 'vote-count game';
  if (data.votedNames) {
    document.getElementById('voteNames').innerText = '已投票：' + data.votedNames.join('、');
  }
  var btn = document.getElementById('btnEndGame');
  if (btn) {
    btn.innerText = '投票结束对局 (' + data.voted + '/' + data.total + ')';
    if (data.voted >= data.total) {
      btn.disabled = true;
      btn.style.opacity = '0.5';
    }
  }
});

socket.on('gameEnded', function (data) {
  localStorage.removeItem('roomId');
  location.href = '/lobby.html';
});

socket.on('disconnect', function () { joinDone = false; });
socket.on('reconnect', function () {
  socket.emit('joinRoom', { roomId: roomId, playerName: username });
  socket.emit('requestBattleRoundData', roomId);
  joinDone = true;
  loadBattleData();
});

// ══════════ 加载数据 ══════════
async function loadBattleData() {
  try {
    var selRes = await API.getBattleSelections(roomId);
    var sel = selRes;
    battleSelections = sel || {};

    var drafts = await API.getAllDraft(roomId);
    allChars = drafts || {};

    console.log('Battle data loaded:', {
      selections: Object.keys(battleSelections).length,
      players: Object.keys(allChars).length
    });

    var selCount = Object.keys(battleSelections).length;
    var draftCount = Object.keys(allChars).length;
    if (selCount > 0 && draftCount === 0 && loadRetry < MAX_RETRY) {
      loadRetry++;
      console.log('角色池数据为空，第 ' + loadRetry + ' 次重试...');
      setTimeout(function () { loadBattleData(); }, 1000);
      return;
    }
    loadRetry = 0;
  } catch (e) {
    console.error('Failed to load battle data:', e);
    if (loadRetry < MAX_RETRY) {
      loadRetry++;
      setTimeout(function () { loadBattleData(); }, 1500);
      return;
    }
  }
  renderBattleGrid();
}

function renderBattleGrid() {
  var grid = document.getElementById('battleGrid');

  // 杀掉栅格内所有残留动画，防止重复渲染冲突
  gsap.killTweensOf(grid.querySelectorAll('.player-battle-card, .battle-char-card, .battle-char-wrapper'));

  var playerNames = Object.keys(allChars);

  if (playerNames.length === 0) {
    grid.innerHTML = '<div class="no-data">暂无对局数据，请返回选择出战页面重新操作</div>';
    return;
  }

  var selKeys = Object.keys(battleSelections);
  if (selKeys.length === 0 && loadRetry < MAX_RETRY) {
    loadRetry++;
    console.log('出战选择数据为空，第 ' + loadRetry + ' 次通过 socket 请求兜底...');
    socket.emit('requestBattleRoundData', roomId);
    setTimeout(function () { loadBattleData(); }, 800);
    return;
  }

  grid.innerHTML = playerNames.map(function (pname) {
    var isSelf = pname === username;
    var deployedCharName = battleSelections[pname];
    var playerChars = allChars[pname] || [];
    var prof = playerProfiles[pname] || { nickname: pname, avatar: '' };
    var displayName = prof.nickname || pname;

    var deployedChar = playerChars.find(function (c) { return c.name === deployedCharName; });
    var isRetain = deployedChar && deployedChar.retain === true;

    var charCardHTML = '';
    if (deployedChar) {
      var c = deployedChar;

      var avatarHTML = (function () {
        var playerCharsForImg = allChars[pname] || [];
        var cc = playerCharsForImg.find(function (x) { return x.name === c.name; });
        if (cc && cc.image) {
          return '<img class="char-avatar" src="/png/' + cc.image +
            '" alt="' + Utils.escHTML(c.name) +
            '" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\';">';
        }
        return '<div class="char-avatar-placeholder">' + (c.name || '').charAt(0) + '</div>';
      })();

      charCardHTML = '<div class="battle-char-card" data-pname="' + Utils.escHTML(pname) +
        '" data-cname="' + Utils.escHTML(c.name) + '">' +
        (isRetain ? '<div class="retain-badge"> 保留</div>' : '') +
        '<div class="char-body">' +
          '<div class="char-avatar-wrap">' + avatarHTML + '</div>' +
          '<div class="char-info">' +
            '<span class="char-name">' + Utils.escHTML(c.name) + '</span>' +
            '<span class="char-tier">Tier ' + Utils.escHTML(c.tier || '?') + '</span>' +
          '</div>' +
        '</div>' +
        '<div class="click-hint">点击查看完整技能详情</div>' +
      '</div>';
    } else {
      charCardHTML = '<div class="no-selection">未选择出战角色</div>';
    }

    return '<div class="player-battle-card' + (isSelf ? ' is-self' : '') + '">' +
      '<div class="player-header">' +
        '<div class="player-avatar">' + Utils.playerAvatarHTML(prof.avatar) + '</div>' +
        '<div class="player-header-info">' +
          '<div class="player-name-row">' +
            '<span class="player-name">' + Utils.escHTML(displayName) + '</span>' +
            (isSelf ? '<span class="player-tag">我</span>' : '') +
          '</div>' +
          (displayName !== pname ? '<div class="player-username-sub">@' + Utils.escHTML(pname) + '</div>' : '') +
        '</div>' +
      '</div>' +
      '<div class="battle-char-wrapper" data-pname="' + Utils.escHTML(pname) +
        '" data-cname="' + Utils.escHTML(deployedCharName || '') + '">' +
        charCardHTML +
      '</div>' +
    '</div>';
  }).join('');

  // 事件委托：角色卡片点击（只绑 wrapper，避免冒泡重复触发）
  grid.querySelectorAll('.battle-char-wrapper').forEach(function (wrapper) {
    wrapper.addEventListener('click', function () {
      var pname = wrapper.getAttribute('data-pname');
      var cname = wrapper.getAttribute('data-cname');
      var card = wrapper.querySelector('.battle-char-card') || wrapper;
      if (pname && cname) openFullscreen(pname, cname, card);
    });
  });

  gsap.fromTo(grid.querySelectorAll('.player-battle-card'),
    { opacity: 0, y: 20 },
    { opacity: 1, y: 0, stagger: 0.1, duration: 0.45, ease: 'power3.out', overwrite: 'auto' }
  );
}

// ══════════ 角色详情弹窗 ══════════

function openFullscreen(playerName, charName, cardEl) {
  var playerChars = allChars[playerName] || [];
  var c = playerChars.find(function (ch) { return ch.name === charName; });
  if (!c) { Utils.showToast('未找到角色数据'); return; }

  // 头像
  var avatarHTML = '';
  if (c.image) {
    avatarHTML = '<img class="detail-avatar" src="/png/' + c.image +
      '" alt="' + Utils.escHTML(c.name) +
      '" onerror="this.style.display=\'none\';this.parentElement.nextElementSibling.style.display=\'flex\';">' +
      '<div class="detail-avatar-placeholder" style="display:none">' + Utils.escHTML(c.name.charAt(0)) + '</div>';
  } else {
    avatarHTML = '<div class="detail-avatar-placeholder">' + Utils.escHTML(c.name.charAt(0)) + '</div>';
  }

  // 技能
  var skillsHTML = '';
  var skillDefs = [
    { key: 'limit',   label: '限定技', cls: 'limit' },
    { key: 'innate',  label: '固有技', cls: 'innate' },
    { key: 'passive', label: '被动技', cls: 'passive' },
    { key: 'extra',   label: '附加技', cls: 'extra' }
  ];
  skillDefs.forEach(function(sd) {
    if (c[sd.key]) {
      skillsHTML += '<div class="detail-skill-block">' +
        '<div class="detail-skill-label ' + sd.cls + '">' + sd.label + '</div>' +
        '<div class="detail-skill-text">' + Utils.escHTML(c[sd.key]) + '</div>' +
      '</div>';
    }
  });
  if (c.note) {
    skillsHTML += '<div class="detail-note"><div class="detail-note-label">说明</div><div class="detail-note-text">' + Utils.escHTML(c.note) + '</div></div>';
  }

  // 保留提示
  var retainHTML = '';
  if (c.retain) {
    retainHTML = '<div class="detail-retain">该角色拥有<strong>保留</strong>效果，出战后下回合仍可继续出战</div>';
  }

  var card = document.getElementById('detailCard');
  card.innerHTML =
    '<div class="detail-header">' +
      avatarHTML +
      '<div class="detail-title">' +
        '<div class="detail-faction">' + Utils.escHTML(c.faction || '无阵营') + '</div>' +
        '<div class="detail-name">' + Utils.escHTML(c.name) + '</div>' +
        '<div class="detail-tier">Tier ' + Utils.escHTML(c.tier || '?') + '（' + Utils.escHTML(playerName) + '）</div>' +
      '</div>' +
      '<button class="detail-close" onclick="closeFullscreen()">✕</button>' +
    '</div>' +
    '<div class="detail-body">' + skillsHTML + '</div>' +
    (retainHTML ? '<div class="detail-footer">' + retainHTML + '</div>' : '');

  document.getElementById('detailOverlay').classList.add('show');
}

function closeFullscreen() {
  document.getElementById('detailOverlay').classList.remove('show');
}

document.getElementById('detailOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeFullscreen();
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && document.getElementById('detailOverlay').classList.contains('show')) {
    closeFullscreen();
  }
});

// ══════════ 投票 ══════════
document.getElementById('btnEndRound').addEventListener('click', function () {
  var btn = document.getElementById('btnEndRound');
  if (btn.disabled) return;
  btn.disabled = true;
  btn.innerText = ' 已投票结束回合';
  socket.emit('voteEndRound', roomId);
});

document.getElementById('btnEndGame').addEventListener('click', function () {
  if (!confirm('确定要投票结束本局游戏吗？所有玩家同意后将结束对局并返回大厅。')) return;
  var btn = document.getElementById('btnEndGame');
  if (btn.disabled) return;
  btn.disabled = true;
  btn.innerText = '已投票结束对局';
  socket.emit('voteEndGame', roomId);
});

// ══════════ 退出对局 ══════════
document.getElementById('btnExitGame').addEventListener('click', function () {
  if (!confirm('确定要强制退出对局吗？退出后需要重新加入房间。')) return;
  Nav.exitGame();
  location.href = '/lobby.html';
});

// ── GSAP 入场动画 ──
gsap.from('.navbar', { y: -60, opacity: 0, duration: 0.5, ease: 'power3.out' });
gsap.from('.page-header', { opacity: 0, y: -15, duration: 0.4, delay: 0.15, ease: 'power2.out' });
gsap.fromTo('.section',
  { opacity: 0, y: 20 },
  { opacity: 1, y: 0, stagger: 0.12, duration: 0.5, delay: 0.35, ease: 'power3.out' }
);
</script>
