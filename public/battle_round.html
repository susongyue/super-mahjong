<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>回合对战 - 超能力立直麻将</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { padding-top: 56px; }
    .container { max-width: 1000px; }

    .page-header {
      text-align: center;
      margin-bottom: 20px;
    }
    .page-header h1 {
      font-size: 28px;
      color: var(--accent);
      font-weight: 800;
      margin-bottom: 6px;
    }
    .page-header .info {
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.6;
    }

    .battle-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .player-battle-card {
      background: var(--card);
      border-radius: 16px;
      padding: 20px;
      border: 2px solid var(--border);
      box-shadow: var(--shadow);
      transition: all .25s;
    }
    .player-battle-card:hover {
      border-color: var(--border-strong);
      box-shadow: 0 6px 24px rgba(0,0,0,.1);
    }
    .player-battle-card.is-self {
      border-color: var(--accent);
      background: #fff5f5;
    }
    .player-battle-card .player-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--border);
    }
    .player-battle-card .player-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #ff6b6b);
      color: #fff;
      font-size: 20px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .player-battle-card.is-self .player-avatar {
      background: linear-gradient(135deg, #e74c3c, #c0392b);
    }
    .player-battle-card .player-name {
      font-size: 18px;
      font-weight: 800;
      color: var(--text);
    }
    .player-battle-card .player-tag {
      font-size: 11px;
      color: var(--accent);
      font-weight: 600;
      background: #ffebee;
      padding: 2px 8px;
      border-radius: 8px;
    }

    .battle-char-wrapper {
      cursor: pointer;
    }
    .battle-char-card {
      background: var(--card-secondary);
      border-radius: 12px;
      padding: 16px;
      border: 2px solid var(--border);
      transition: all .2s;
      position: relative;
    }
    .battle-char-wrapper:hover .battle-char-card {
      border-color: var(--accent);
      box-shadow: 0 4px 16px rgba(0,0,0,.08);
      transform: translateY(-1px);
    }
    .battle-char-card .char-faction {
      color: var(--gold);
      font-size: 11px;
      font-weight: 700;
      background: var(--gold-bg);
      display: inline-block;
      padding: 3px 10px;
      border-radius: 10px;
      margin-bottom: 8px;
      border: 1px solid #f0d78c;
    }
    .battle-char-card .char-name {
      font-size: 20px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 4px;
    }
    .battle-char-card .char-tier {
      font-size: 13px;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 10px;
    }
    .battle-char-card .skill-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .battle-char-card .skill-tag {
      font-size: 10px;
      padding: 3px 8px;
      cursor: default;
    }
    .battle-char-card .click-hint {
      font-size: 11px;
      color: var(--text-secondary);
      text-align: center;
      margin-top: 8px;
    }
    .battle-char-card .retain-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      background: var(--gold);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 10px;
    }

    .no-selection {
      text-align: center;
      padding: 20px;
      color: var(--text-secondary);
      font-size: 14px;
    }

    .vote-section {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 14px;
    }
    .vote-btn {
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
      border: 2px solid transparent;
      outline: none;
      white-space: nowrap;
    }
    .vote-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .vote-btn-round { background:#fff3e0; color:var(--skill-innate); border-color:#ffb74d; flex-shrink:0; }
    .vote-btn-round:hover:not(:disabled) { background:#ffe0b2; border-color:var(--skill-innate); }
    .vote-btn-game { background:#fce4ec; color:var(--accent); border-color:#ef9a9a; flex-shrink:0; }
    .vote-btn-game:hover:not(:disabled) { background:#ffcdd2; border-color:var(--accent); }
    .vote-count {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 12px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 13px;
    }
    .vote-count.round { background:#fff3e0; color:var(--skill-innate); border:1.5px solid #ffcc80; }
    .vote-count.game  { background:#fce4ec; color:var(--accent); border:1.5px solid #ef9a9a; }
    .vote-count.done  { background:var(--green-bg); color:var(--green); border:1.5px solid var(--green); }

    .no-selection {
      text-align: center;
      padding: 20px;
      color: var(--text-secondary);
      font-size: 14px;
    }

    .redirect-overlay {
      position: fixed;
      top:0;left:0;right:0;bottom:0;
      background: rgba(0,0,0,.6);
      z-index: 400;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: #fff;
      font-size: 24px;
      font-weight: 700;
    }

    /* 全屏详情中增加保留/轮休状态 */
    .fs-retain-info {
      background: var(--gold-bg);
      color: var(--gold);
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      text-align: center;
      border: 1.5px solid #f0d78c;
      margin-top: 0;
    }

    @media (max-width: 768px) {
      .battle-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a class="logo" href="/lobby.html">🀄 超能力立直麻将</a>
  <div class="nav-links">
    <a href="/lobby.html">大厅</a>
    <a href="/game.html">选择出战</a>
    <a href="/battle_round.html" class="active">回合对战</a>
    <a href="/profile.html">个人中心</a>
  </div>
  <span class="nav-user" id="navUser"></span>
</nav>

<div class="container">
  <div class="page-header">
    <h1>🎴 第 <span id="roundNum">1</span> 回合对战</h1>
    <div class="info">
      房间：<strong id="roomDisplay"></strong> | 玩家：<strong id="nameDisplay"></strong>
    </div>
  </div>

  <!-- 出战角色展示 -->
  <div class="section">
    <h2>⚔️ 玩家出战角色</h2>
    <div class="battle-grid" id="battleGrid">
      <div class="no-data">加载中...</div>
    </div>
  </div>

  <!-- 投票区 -->
  <div class="section">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:10px;">
      <h2 style="margin-bottom:0;">📊 投票推进</h2>
    </div>
    <div class="vote-section">
      <button class="vote-btn vote-btn-round" id="btnEndRound" onclick="voteEndRound()">
        ✅ 投票结束回合（重新选将）
      </button>
      <button class="vote-btn vote-btn-game" id="btnEndGame" onclick="voteEndGame()">
        🏁 投票结束对局（回大厅）
      </button>
      <div style="display:flex;align-items:center;gap:8px;">
        <span id="roundVoteInfo" class="vote-count round">回合投票 0/0</span>
        <span id="gameVoteInfo" class="vote-count game">对局投票 0/0</span>
      </div>
    </div>
    <div id="voteNames" style="margin-top:10px;font-size:12px;color:var(--text-secondary);"></div>
  </div>
</div>

<!-- 全屏角色展示弹窗 -->
<div class="char-fullscreen-overlay hidden" id="charFullscreen">
  <div class="fs-header">
    <div class="fs-header-left">
      <div id="fsAvatar"></div>
      <div class="fs-header-text">
        <div class="fs-char-name" id="fsCharName"></div>
        <div class="fs-char-tier" id="fsCharTier"></div>
        <div class="fs-faction-badge" id="fsFaction"></div>
      </div>
    </div>
    <button class="fs-close" onclick="closeFullscreen()">✕</button>
  </div>
  <div class="fs-body" id="fsBody"></div>
  <div id="fsRetainInfo"></div>
  <div class="fs-footer">
    <span class="fs-footer-hint">按 ESC 关闭</span>
  </div>
</div>

<div class="redirect-overlay hidden" id="redirectOverlay">
  <div style="font-size:18px;text-align:center;" id="redirectText"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const username = localStorage.user;
const roomId = localStorage.roomId;
if (!username) location.href = '/login.html';
if (!roomId) location.href = '/lobby.html';

// ─── 页面加载前检查房间状态（防止回到已结束对局） ───
(async function checkRoomBeforeLoad() {
  try {
    const status = await fetch('/api/room-status?roomId=' + roomId + '&username=' + encodeURIComponent(username))
      .then(x => x.json());
    if (status.finished || !status.exists) {
      alert(status.msg || '该对局已结束，即将返回大厅');
      localStorage.removeItem('roomId');
      location.href = '/lobby.html';
      return;
    }
  } catch (e) {
    // 网络错误，允许继续（可能是离线/服务器重启）
  }
})();

document.getElementById('navUser').innerHTML =
  '<span style="cursor:pointer" onclick="location.href=\'/profile.html\'">' + (localStorage.avatar || '🀄') + ' ' + (localStorage.nickname || username) + '</span>';
document.getElementById('roomDisplay').innerText = roomId;
document.getElementById('nameDisplay').innerText = username;

let allChars = {}; // { playerName: [ {name, tier, faction, limit, innate, passive, extra, note, retain}, ... ] }
let battleSelections = {};

const SKILL_TYPES = {
  limit:   { label:'限定', icon:'🔥', cls:'limit', order:1 },
  innate:  { label:'固有', icon:'⚡', cls:'innate', order:2 },
  passive: { label:'被动', icon:'🛡️', cls:'passive', order:3 },
  extra:   { label:'附加', icon:'✨', cls:'extra', order:4 }
};

// ══════════ Socket ══════════
const socket = io({ transports: ['polling', 'websocket'] });
let joinDone = false;
let loadRetry = 0;
const MAX_RETRY = 5;

socket.on('connect', () => {
  socket.emit('joinRoom', { roomId, playerName: username });
  socket.emit('getRoomState', roomId);
});

// 等待加入房间成功后再加载数据
socket.on('joinSuccess', () => {
  if (!joinDone) {
    joinDone = true;
    // 先通过 REST API 加载，同时在 socket 层面也请求一份
    socket.emit('requestBattleRoundData', roomId);
    loadBattleData();
  }
});

// 玩家列表更新时也刷新（用于加入后同步）
socket.on('roomPlayersUpdate', () => {
  if (joinDone) {
    loadBattleData();
  }
});

// 从 socket 接收完整对战数据（比 REST 更可靠，会检查 Supabase）
socket.on('battleRoundData', (data) => {
  console.log('📡 收到 socket 对战数据:', { draft: Object.keys(data.draft||{}).length, selections: Object.keys(data.selections||{}).length });
  if (data.draft && Object.keys(data.draft).length > 0) {
    allChars = data.draft;
  }
  if (data.selections && Object.keys(data.selections).length > 0) {
    battleSelections = data.selections;
    // 尝试重新请求 REST API（可能已恢复）
    if (Object.keys(allChars).length === 0) {
      fetch(`/api/all-draft?roomId=${roomId}`).then(r => r.json()).then(d => {
        if (d && Object.keys(d).length > 0) allChars = d;
      }).catch(()=>{});
    }
  }
  renderBattleGrid();
});

socket.on('roomState', (data) => {
  document.getElementById('roundNum').innerText = data.round || 1;
});

// 回合推进 → 回到选将页
socket.on('roundAdvanced', (data) => {
  showRedirectOverlay('✅ 全部玩家同意，进入第 ' + data.round + ' 回合！请重新选择出战角色...');
  setTimeout(() => { location.href = '/game.html'; }, 2000);
});

// 回合投票更新
socket.on('roundEndVoteUpdate', (data) => {
  document.getElementById('roundVoteInfo').innerText = '回合投票 ' + data.voted + '/' + data.total;
  document.getElementById('roundVoteInfo').className = data.voted >= data.total ? 'vote-count done' : 'vote-count round';
  if (data.votedNames) {
    document.getElementById('voteNames').innerText = '已投票：' + data.votedNames.join('、');
  }
});

// 对局投票更新
socket.on('gameEndVoteUpdate', (data) => {
  document.getElementById('gameVoteInfo').innerText = '对局投票 ' + data.voted + '/' + data.total;
  document.getElementById('gameVoteInfo').className = data.voted >= data.total ? 'vote-count done' : 'vote-count game';
});

// 对局结束 → 回大厅
socket.on('gameEnded', (data) => {
  showRedirectOverlay(data.msg);
  setTimeout(() => {
    localStorage.removeItem('roomId');
    location.href = '/lobby.html';
  }, 2500);
});

// ══════════ 加载数据 ══════════
async function loadBattleData() {
  try {
    // 加载当前回合作战选择
    const selRes = await fetch(`/api/battle-selections?roomId=${roomId}`);
    const sel = await selRes.json();
    battleSelections = sel || {};

    // 加载所有玩家的角色池
    const draftRes = await fetch(`/api/all-draft?roomId=${roomId}`);
    const drafts = await draftRes.json();
    allChars = drafts || {};

    console.log('Battle data loaded:', {
      selections: Object.keys(battleSelections).length,
      players: Object.keys(allChars).length
    });

    // 检查数据是否完整：如果有选择但没有角色池数据，重试
    const selCount = Object.keys(battleSelections).length;
    const draftCount = Object.keys(allChars).length;
    if (selCount > 0 && draftCount === 0 && loadRetry < MAX_RETRY) {
      loadRetry++;
      console.log(`⚠️ 角色池数据为空，第 ${loadRetry} 次重试...`);
      setTimeout(() => loadBattleData(), 1000);
      return;
    }

    loadRetry = 0;
  } catch (e) {
    console.error('Failed to load battle data:', e);
    if (loadRetry < MAX_RETRY) {
      loadRetry++;
      setTimeout(() => loadBattleData(), 1500);
      return;
    }
  }

  renderBattleGrid();
}

// socket 重连时也重新加载
socket.on('disconnect', () => { joinDone = false; });
socket.on('reconnect', () => {
  socket.emit('joinRoom', { roomId, playerName: username });
  socket.emit('requestBattleRoundData', roomId);
  joinDone = true;
  loadBattleData();
});

// 获取角色头像 HTML（从角色池中查找 image 字段）
function getCharImageHTML(name, playerName) {
  const playerChars = allChars[playerName] || [];
  const c = playerChars.find(x => x.name === name);
  const img = c && c.image;
  if (img) return `<img class="char-avatar" src="/png/${img}" alt="${escHTML(name)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">`;
  return `<div class="char-avatar-placeholder">${(name||'').charAt(0)}</div>`;
}
function getCharImageHTML_Big(name, playerName) {
  const playerChars = allChars[playerName] || [];
  const c = playerChars.find(x => x.name === name);
  const img = c && c.image;
  if (img) return `<img class="fs-avatar" src="/png/${img}" alt="${escHTML(name)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">`;
  return `<div class="fs-avatar-placeholder">${(name||'').charAt(0)}</div>`;
}

function escHTML(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderStrategyTags(tags) {
  if (!tags || !tags.length) return '';
  return '<div class="strategy-tags">' + tags.map(t =>
    '<span class="strategy-tag ' + t + '">' + escHTML(t) + '</span>'
  ).join('') + '</div>';
}

function renderBattleGrid() {
  const grid = document.getElementById('battleGrid');
  const playerNames = Object.keys(allChars);

  if (playerNames.length === 0) {
    grid.innerHTML = '<div class="no-data">暂无对局数据，请返回选择出战页面重新操作</div>';
    return;
  }

  // 如果所有玩家都没有选择记录，尝试通过 socket 请求兜底
  const selKeys = Object.keys(battleSelections);
  if (selKeys.length === 0 && loadRetry < MAX_RETRY) {
    loadRetry++;
    console.log(`⚠️ 出战选择数据为空，第 ${loadRetry} 次通过 socket 请求兜底...`);
    socket.emit('requestBattleRoundData', roomId);
    // 同时重试 REST API
    setTimeout(() => loadBattleData(), 800);
    return;
  }

  grid.innerHTML = playerNames.map((pname, pidx) => {
    const isSelf = pname === username;
    const deployedCharName = battleSelections[pname];
    const playerChars = allChars[pname] || [];

    // 找到出战的角色完整数据
    const deployedChar = playerChars.find(c => c.name === deployedCharName);
    const isRetain = deployedChar && deployedChar.retain === true;

    // 出战角色卡片
    let charCardHTML = '';
    if (deployedChar) {
      const c = deployedChar;
      const skills = [];
      if (c.limit)   skills.push({ key:'limit', text:c.limit });
      if (c.innate)  skills.push({ key:'innate', text:c.innate });
      if (c.passive) skills.push({ key:'passive', text:c.passive });
      if (c.extra)   skills.push({ key:'extra', text:c.extra });

      const skillTags = skills.map(s => {
        const st = SKILL_TYPES[s.key];
        return `<span class="skill-tag ${st.cls}">
          <span class="tag-icon">${st.icon}</span>${st.label}
        </span>`;
      }).join('');

      // 使用 data 属性存储参数，避免 onclick 中特殊字符问题
      charCardHTML = `<div class="battle-char-card" data-pname="${escHTML(pname)}" data-cname="${escHTML(c.name)}">
        ${isRetain ? '<div class="retain-badge">🛡️ 保留</div>' : ''}
        <div class="char-card-header">
          ${getCharImageHTML(c.name, pname)}
          <div class="char-info">
            <div class="char-faction">${escHTML(c.faction||'无阵营')}</div>
            <div class="char-name">${escHTML(c.name)}</div>
          </div>
        </div>
        <div class="char-tier">Tier ${escHTML(c.tier||'?')}</div>
        <div class="skill-tags">${skillTags}</div>
        ${renderStrategyTags(c.tags)}
        <div class="click-hint">👆 点击查看完整技能详情</div>
      </div>`;
    } else {
      charCardHTML = `<div class="no-selection">⚠️ 未选择出战角色</div>`;
    }

    const initial = pname.charAt(0);

    return `<div class="player-battle-card${isSelf ? ' is-self' : ''}">
      <div class="player-header">
        <div class="player-avatar">${initial}</div>
        <div>
          <div class="player-name">${isSelf ? '⭐ ' : ''}${escHTML(pname)}</div>
          ${isSelf ? '<div class="player-tag">我</div>' : ''}
        </div>
      </div>
      <div class="battle-char-wrapper" onclick="handleCharClick(this)" data-pname="${escHTML(pname)}" data-cname="${escHTML(deployedCharName||'')}">
        ${charCardHTML}
      </div>
    </div>`;
  }).join('');
}

// 使用事件委托处理点击（比 onclick 更安全）
function handleCharClick(el) {
  const pname = el.getAttribute('data-pname');
  const cname = el.getAttribute('data-cname');
  if (pname && cname) {
    openFullscreen(pname, cname);
  }
}

// ══════════ 全屏角色详情 ══════════
function openFullscreen(playerName, charName) {
  const playerChars = allChars[playerName] || [];
  const c = playerChars.find(c => c.name === charName);
  if (!c) {
    showToast('⚠️ 未找到角色数据');
    return;
  }

  document.getElementById('fsAvatar').innerHTML = getCharImageHTML_Big(c.name, playerName);
  document.getElementById('fsCharName').innerText = c.name;
  document.getElementById('fsCharTier').innerHTML = 'Tier ' + (c.tier || '?') + '（' + playerName + '）' + (c.tags && c.tags.length ? ' &middot; ' + c.tags.map(t => '<span class="strategy-tag ' + t + '">' + escHTML(t) + '</span>').join(' ') : '');
  document.getElementById('fsFaction').innerText = c.faction || '无阵营';

  const skills = [];
  if (c.limit)   skills.push({ key:'limit', text:c.limit });
  if (c.innate)  skills.push({ key:'innate', text:c.innate });
  if (c.passive) skills.push({ key:'passive', text:c.passive });
  if (c.extra)   skills.push({ key:'extra', text:c.extra });

  let bodyHTML = skills.map(s => {
    const st = SKILL_TYPES[s.key];
    return `<div class="fs-skill-block">
      <span class="fs-skill-label ${st.cls}">${st.icon} ${st.label}技能</span>
      <div class="fs-skill-text">${escHTML(s.text)}</div>
    </div>`;
  }).join('');

  if (c.note) {
    bodyHTML += `<div class="fs-skill-block">
      <span class="fs-skill-label" style="background:#e8eaf6;color:#3f51b5;border-color:#9fa8da;">📝 备注</span>
      <div class="fs-skill-text">${escHTML(c.note)}</div>
    </div>`;
  }

  document.getElementById('fsBody').innerHTML = bodyHTML;

  // 保留效果提示
  const retainInfo = document.getElementById('fsRetainInfo');
  if (c.retain) {
    retainInfo.innerHTML = '<div class="fs-retain-info">🛡️ 该角色拥有<strong>保留</strong>效果，出战后下回合仍可继续出战</div>';
  } else {
    retainInfo.innerHTML = '';
  }

  document.getElementById('charFullscreen').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}

function closeFullscreen() {
  document.getElementById('charFullscreen').classList.add('hidden');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && !document.getElementById('charFullscreen').classList.contains('hidden')) {
    closeFullscreen();
  }
});

// ══════════ 投票 ══════════
function voteEndRound() {
  const btn = document.getElementById('btnEndRound');
  if (btn.disabled) return;
  btn.disabled = true;
  btn.innerText = '✅ 已投票结束回合';
  socket.emit('voteEndRound', roomId);
}

function voteEndGame() {
  if (!confirm('确定要投票结束本局游戏吗？所有玩家同意后将结束对局并返回大厅。')) return;
  const btn = document.getElementById('btnEndGame');
  if (btn.disabled) return;
  btn.disabled = true;
  btn.innerText = '🏁 已投票结束对局';
  socket.emit('voteEndGame', roomId);
}

function showRedirectOverlay(msg) {
  const overlay = document.getElementById('redirectOverlay');
  document.getElementById('redirectText').innerText = msg;
  overlay.classList.remove('hidden');
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}
</script>
</body>
