<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>回合对战 - 超能力立直麻将</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { padding-top: 56px; }
    .container { max-width: 1000px; }

    .page-header {
      text-align: center;
      margin-bottom: 20px;
    }
    .page-header h1 {
      font-size: 28px;
      color: var(--accent);
      font-weight: 800;
      margin-bottom: 6px;
    }
    .page-header .info {
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.6;
    }

    .battle-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .player-battle-card {
      background: var(--card);
      border-radius: 16px;
      padding: 20px;
      border: 2px solid var(--border);
      box-shadow: var(--shadow);
      transition: all .25s;
    }
    .player-battle-card:hover {
      border-color: var(--border-strong);
      box-shadow: 0 6px 24px rgba(0,0,0,.1);
    }
    .player-battle-card.is-self {
      border-color: var(--accent);
      background: #fff5f5;
    }
    .player-battle-card .player-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--border);
    }
    .player-battle-card .player-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #ff6b6b);
      color: #fff;
      font-size: 18px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .player-battle-card.is-self .player-avatar {
      background: linear-gradient(135deg, #e74c3c, #c0392b);
    }
    .player-battle-card .player-name {
      font-size: 18px;
      font-weight: 800;
      color: var(--text);
    }
    .player-battle-card .player-tag {
      font-size: 11px;
      color: var(--accent);
      font-weight: 600;
      background: #ffebee;
      padding: 2px 8px;
      border-radius: 8px;
    }

    .battle-char-card {
      background: var(--card-secondary);
      border-radius: 12px;
      padding: 16px;
      border: 2px solid var(--border);
      cursor: pointer;
      transition: all .2s;
      position: relative;
    }
    .battle-char-card:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 16px rgba(0,0,0,.08);
      transform: translateY(-1px);
    }
    .battle-char-card .char-faction {
      color: var(--gold);
      font-size: 11px;
      font-weight: 700;
      background: var(--gold-bg);
      display: inline-block;
      padding: 3px 10px;
      border-radius: 10px;
      margin-bottom: 8px;
      border: 1px solid #f0d78c;
    }
    .battle-char-card .char-name {
      font-size: 20px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 4px;
    }
    .battle-char-card .char-tier {
      font-size: 13px;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 10px;
    }
    .battle-char-card .skill-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .battle-char-card .skill-tag {
      font-size: 10px;
      padding: 3px 8px;
    }
    .battle-char-card .click-hint {
      font-size: 11px;
      color: var(--text-secondary);
      text-align: center;
      margin-top: 8px;
    }
    .battle-char-card .retain-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      background: var(--gold);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 10px;
    }

    .vote-section {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 14px;
    }
    .vote-btn {
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
      border: 2px solid transparent;
      outline: none;
      white-space: nowrap;
    }
    .vote-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .vote-btn-round { background:#fff3e0; color:var(--skill-innate); border-color:#ffb74d; flex-shrink:0; }
    .vote-btn-round:hover:not(:disabled) { background:#ffe0b2; border-color:var(--skill-innate); }
    .vote-btn-game { background:#fce4ec; color:var(--accent); border-color:#ef9a9a; flex-shrink:0; }
    .vote-btn-game:hover:not(:disabled) { background:#ffcdd2; border-color:var(--accent); }
    .vote-count {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 12px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 13px;
    }
    .vote-count.round { background:#fff3e0; color:var(--skill-innate); border:1.5px solid #ffcc80; }
    .vote-count.game  { background:#fce4ec; color:var(--accent); border:1.5px solid #ef9a9a; }
    .vote-count.done  { background:var(--green-bg); color:var(--green); border:1.5px solid var(--green); }

    .no-selection {
      text-align: center;
      padding: 20px;
      color: var(--text-secondary);
      font-size: 14px;
    }

    .redirect-overlay {
      position: fixed;
      top:0;left:0;right:0;bottom:0;
      background: rgba(0,0,0,.6);
      z-index: 400;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: #fff;
      font-size: 24px;
      font-weight: 700;
    }

    @media (max-width: 768px) {
      .battle-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a class="logo" href="/lobby.html">🀄 超能力立直麻将</a>
  <div class="nav-links">
    <a href="/lobby.html">大厅</a>
    <a href="/game.html">选择出战</a>
    <a href="#" class="active">回合对战</a>
  </div>
  <span class="nav-user" id="navUser"></span>
</nav>

<div class="container">
  <div class="page-header">
    <h1>🎴 第 <span id="roundNum">1</span> 回合对战</h1>
    <div class="info">
      房间：<strong id="roomDisplay"></strong> | 玩家：<strong id="nameDisplay"></strong>
    </div>
  </div>

  <!-- 出战角色展示 -->
  <div class="section">
    <h2>⚔️ 玩家出战角色</h2>
    <div class="battle-grid" id="battleGrid">
      <div class="no-data">加载中...</div>
    </div>
  </div>

  <!-- 投票区 -->
  <div class="section">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:10px;">
      <h2 style="margin-bottom:0;">📊 投票推进</h2>
    </div>
    <div class="vote-section">
      <button class="vote-btn vote-btn-round" id="btnEndRound" onclick="voteEndRound()">
        ✅ 投票结束回合（重新选将）
      </button>
      <button class="vote-btn vote-btn-game" id="btnEndGame" onclick="voteEndGame()">
        🏁 投票结束对局（回大厅）
      </button>
      <div style="display:flex;align-items:center;gap:8px;">
        <span id="roundVoteInfo" class="vote-count round">回合投票 0/0</span>
        <span id="gameVoteInfo" class="vote-count game">对局投票 0/0</span>
      </div>
    </div>
    <div id="voteNames" style="margin-top:10px;font-size:12px;color:var(--text-secondary);"></div>
  </div>
</div>

<!-- 全屏角色展示弹窗 -->
<div class="char-fullscreen-overlay hidden" id="charFullscreen">
  <div class="fs-header">
    <div class="fs-header-left">
      <div class="fs-char-name" id="fsCharName"></div>
      <div class="fs-char-tier" id="fsCharTier"></div>
      <div class="fs-faction-badge" id="fsFaction"></div>
    </div>
    <button class="fs-close" onclick="closeFullscreen()">✕</button>
  </div>
  <div class="fs-body" id="fsBody"></div>
  <div class="fs-footer">
    <span class="fs-footer-hint">👆 将此屏幕展示给其他玩家查看</span>
  </div>
</div>

<div class="redirect-overlay hidden" id="redirectOverlay">
  <div style="font-size:18px;text-align:center;" id="redirectText"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const username = localStorage.user;
const roomId = localStorage.roomId;
if (!username) location.href = '/login.html';
if (!roomId) location.href = '/lobby.html';

document.getElementById('navUser').innerText = '👤 ' + username;
document.getElementById('roomDisplay').innerText = roomId;
document.getElementById('nameDisplay').innerText = username;

let allChars = {}; // { playerName: [char1, char2, ...] }
let battleSelections = {};

const SKILL_TYPES = {
  limit:   { label:'限定', icon:'🔥', cls:'limit', order:1 },
  innate:  { label:'固有', icon:'⚡', cls:'innate', order:2 },
  passive: { label:'被动', icon:'🛡️', cls:'passive', order:3 },
  extra:   { label:'附加', icon:'✨', cls:'extra', order:4 }
};

// ══════════ Socket ══════════
const socket = io({ transports: ['polling', 'websocket'] });

socket.on('connect', () => {
  socket.emit('joinRoom', { roomId, playerName: username });
  socket.emit('getRoomState', roomId);
  loadBattleData();
});

socket.on('roomState', (data) => {
  document.getElementById('roundNum').innerText = data.round || 1;
});

// 回合推进 → 回到选将页
socket.on('roundAdvanced', (data) => {
  showRedirectOverlay('✅ 全部玩家同意，进入第 ' + data.round + ' 回合！请重新选择出战角色...');
  setTimeout(() => { location.href = '/game.html'; }, 2000);
});

// 回合投票更新
socket.on('roundEndVoteUpdate', (data) => {
  document.getElementById('roundVoteInfo').innerText = '回合投票 ' + data.voted + '/' + data.total;
  document.getElementById('roundVoteInfo').className = data.voted >= data.total ? 'vote-count done' : 'vote-count round';
  if (data.votedNames) {
    document.getElementById('voteNames').innerText = '已投票：' + data.votedNames.join('、');
  }
});

// 对局投票更新
socket.on('gameEndVoteUpdate', (data) => {
  document.getElementById('gameVoteInfo').innerText = '对局投票 ' + data.voted + '/' + data.total;
  document.getElementById('gameVoteInfo').className = data.voted >= data.total ? 'vote-count done' : 'vote-count game';
});

// 对局结束 → 回大厅
socket.on('gameEnded', (data) => {
  showRedirectOverlay(data.msg);
  setTimeout(() => {
    localStorage.removeItem('roomId');
    location.href = '/lobby.html';
  }, 2500);
});

// ══════════ 加载数据 ══════════
async function loadBattleData() {
  // 加载当前回合作战选择
  const sel = await fetch(`/api/battle-selections?roomId=${roomId}`).then(r => r.json());
  battleSelections = sel || {};

  // 加载所有玩家的角色池
  const drafts = await fetch(`/api/all-draft?roomId=${roomId}`).then(r => r.json());
  allChars = drafts || {};

  renderBattleGrid();
}

function escHTML(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderBattleGrid() {
  const grid = document.getElementById('battleGrid');
  const playerNames = Object.keys(allChars);

  if (playerNames.length === 0) {
    grid.innerHTML = '<div class="no-data">暂无角色数据</div>';
    return;
  }

  grid.innerHTML = playerNames.map((pname, pidx) => {
    const isSelf = pname === username;
    const deployedCharName = battleSelections[pname];
    const playerChars = allChars[pname] || [];

    // 找到出战的角色完整数据
    const deployedChar = playerChars.find(c => c.name === deployedCharName);
    const isRetain = deployedChar && deployedChar.retain === true;

    // 出战角色卡片
    let charCardHTML = '';
    if (deployedChar) {
      const c = deployedChar;
      const skills = [];
      if (c.limit)   skills.push({ key:'limit', text:c.limit });
      if (c.innate)  skills.push({ key:'innate', text:c.innate });
      if (c.passive) skills.push({ key:'passive', text:c.passive });
      if (c.extra)   skills.push({ key:'extra', text:c.extra });

      const skillTags = skills.map(s => {
        const st = SKILL_TYPES[s.key];
        const preview = s.text.length > 10 ? s.text.substring(0,10)+'…' : s.text;
        return `<span class="skill-tag ${st.cls}" style="cursor:default;">
          <span class="tag-icon">${st.icon}</span>${st.label}
          <span class="tag-preview">${escHTML(preview)}</span>
        </span>`;
      }).join('');

      charCardHTML = `<div class="battle-char-card" onclick="openFullscreen('${escHTML(pname)}','${escHTML(c.name)}')">
        ${isRetain ? '<div class="retain-badge">🛡️ 保留</div>' : ''}
        <div class="char-faction">${escHTML(c.faction||'无阵营')}</div>
        <div class="char-name">${escHTML(c.name)}</div>
        <div class="char-tier">Tier ${escHTML(c.tier)}</div>
        <div class="skill-tags">${skillTags}</div>
        <div class="click-hint">👆 点击查看完整技能</div>
      </div>`;
    } else {
      charCardHTML = `<div class="no-selection">⚠️ 未选择出战角色</div>`;
    }

    const initial = pname.charAt(0);

    return `<div class="player-battle-card${isSelf ? ' is-self' : ''}">
      <div class="player-header">
        <div class="player-avatar">${initial}</div>
        <div>
          <div class="player-name">${isSelf ? '⭐ ' : ''}${escHTML(pname)}</div>
          ${isSelf ? '<div class="player-tag">我</div>' : ''}
        </div>
      </div>
      ${charCardHTML}
    </div>`;
  }).join('');
}

// ══════════ 全屏角色详情 ══════════
function openFullscreen(playerName, charName) {
  const playerChars = allChars[playerName] || [];
  const c = playerChars.find(c => c.name === charName);
  if (!c) return;

  document.getElementById('fsCharName').innerText = c.name + ' (' + playerName + ')';
  document.getElementById('fsCharTier').innerText = 'Tier ' + (c.tier || '?');
  document.getElementById('fsFaction').innerText = c.faction || '无阵营';

  const skills = [];
  if (c.limit)   skills.push({ key:'limit', text:c.limit });
  if (c.innate)  skills.push({ key:'innate', text:c.innate });
  if (c.passive) skills.push({ key:'passive', text:c.passive });
  if (c.extra)   skills.push({ key:'extra', text:c.extra });

  document.getElementById('fsBody').innerHTML = skills.map(s => {
    const st = SKILL_TYPES[s.key];
    return `<div class="fs-skill-block">
      <span class="fs-skill-label ${st.cls}">${st.icon} ${st.label}技能</span>
      <div class="fs-skill-text">${escHTML(s.text)}</div>
    </div>`;
  }).join('');

  document.getElementById('charFullscreen').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}

function closeFullscreen() {
  document.getElementById('charFullscreen').classList.add('hidden');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && !document.getElementById('charFullscreen').classList.contains('hidden')) {
    closeFullscreen();
  }
});

// ══════════ 投票 ══════════
function voteEndRound() {
  const btn = document.getElementById('btnEndRound');
  if (btn.disabled) return;
  btn.disabled = true;
  btn.innerText = '✅ 已投票结束回合';
  socket.emit('voteEndRound', roomId);
}

function voteEndGame() {
  if (!confirm('确定要投票结束本局游戏吗？所有玩家同意后将结束对局并返回大厅。')) return;
  const btn = document.getElementById('btnEndGame');
  if (btn.disabled) return;
  btn.disabled = true;
  btn.innerText = '🏁 已投票结束对局';
  socket.emit('voteEndGame', roomId);
}

function showRedirectOverlay(msg) {
  const overlay = document.getElementById('redirectOverlay');
  document.getElementById('redirectText').innerText = msg;
  overlay.classList.remove('hidden');
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}
</script>
</body>
</html>
