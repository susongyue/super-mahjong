<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>回合对战 - Super Reach Mahjong</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="themes.css">
  <meta name="theme-color" content="#000000">
  <style>
    body { padding-top: 56px; }
    .container { max-width: 1000px; }

    .page-header {
      text-align: center; margin-bottom: 20px;
    }
    .page-header h1 {
      font-size: 28px; color: var(--accent-blue); font-weight: 800;
      margin-bottom: 6px; letter-spacing: -1px;
    }
    .page-header .info {
      color: var(--ink-muted); font-size: 14px; line-height: 1.6;
    }

    .battle-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px;
    }

    .player-battle-card {
      background: var(--surface-1);
      border-radius: var(--r-xl);
      padding: 20px;
      border: 1px solid var(--hairline);
      transition: all .25s;
    }
    .player-battle-card:hover {
      border-color: var(--hairline-soft);
      box-shadow: var(--shadow-sm);
    }
    .player-battle-card.is-self {
      border-color: var(--accent-blue);
      background: var(--accent-blue-glow);
    }
    .player-battle-card .player-header {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 14px; padding-bottom: 12px;
      border-bottom: 1px solid var(--hairline);
    }
    .player-battle-card .player-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: linear-gradient(135deg, var(--gradient-violet), var(--gradient-magenta));
      color: var(--ink); font-size: 20px; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; overflow: hidden;
    }
    .player-battle-card.is-self .player-avatar {
      background: linear-gradient(135deg, var(--gradient-magenta), var(--gradient-coral));
    }
    .player-battle-card .player-name {
      font-size: 18px; font-weight: 800; color: var(--ink);
    }
    .player-battle-card .player-username-sub {
      font-size: 11px; color: var(--ink-muted);
    }
    .player-battle-card .player-tag {
      font-size: 11px; color: var(--accent-blue); font-weight: 600;
      background: var(--accent-blue-glow);
      padding: 2px 8px; border-radius: var(--r-pill);
    }

    .battle-char-wrapper { cursor: pointer; }
    .battle-char-card {
      background: var(--surface-2);
      border-radius: var(--r-lg);
      padding: 16px;
      border: 1px solid var(--hairline);
      transition: all .2s; position: relative;
    }
    .battle-char-wrapper:hover .battle-char-card {
      border-color: var(--accent-blue);
      box-shadow: var(--shadow-blue);
      transform: translateY(-1px);
    }
    .battle-char-card .char-faction {
      color: var(--gold); font-size: 11px; font-weight: 700;
      background: var(--gold-bg); display: inline-block;
      padding: 3px 10px; border-radius: var(--r-pill);
      margin-bottom: 8px; border: 1px solid var(--gold-border);
    }
    .battle-char-card .char-name {
      font-size: 20px; font-weight: 800; color: var(--ink); margin-bottom: 4px;
    }
    .battle-char-card .char-tier {
      font-size: 13px; color: var(--accent-blue); font-weight: 600; margin-bottom: 10px;
    }
    .battle-char-card .skill-tags {
      display: flex; flex-wrap: wrap; gap: 4px;
    }
    .battle-char-card .skill-tag {
      font-size: 10px; padding: 3px 8px; cursor: default;
    }
    .battle-char-card .click-hint {
      font-size: 11px; color: var(--ink-muted); text-align: center; margin-top: 8px;
    }
    .battle-char-card .retain-badge {
      position: absolute; top: 8px; right: 8px;
      background: var(--gold); color: var(--on-primary);
      font-size: 10px; font-weight: 700; padding: 3px 8px;
      border-radius: var(--r-pill);
    }

    .no-selection {
      text-align: center; padding: 20px;
      color: var(--ink-muted); font-size: 14px;
    }

    @media (max-width: 768px) {
      body { padding-top: 44px; }
      .battle-grid { grid-template-columns: 1fr; gap: 10px; }
      .page-header { margin-bottom: 12px; }
      .page-header h1 { font-size: 22px; }
      .page-header .info { font-size: 12px; }
      .player-battle-card { padding: 14px; border-radius: var(--r-lg); }
      .player-battle-card .player-header { margin-bottom: 10px; padding-bottom: 8px; }
      .player-battle-card .player-name { font-size: 16px; }
      .player-battle-card .player-avatar { width: 36px; height: 36px; font-size: 16px; }
      .battle-char-card { padding: 12px; border-radius: var(--r-md); }
      .battle-char-card .char-name { font-size: 17px; }
      .battle-char-card .char-tier { font-size: 11px; margin-bottom: 6px; }
      .battle-char-card .char-faction { font-size: 10px; padding: 2px 8px; margin-bottom: 6px; }
      .battle-char-card .click-hint { font-size: 10px; margin-top: 4px; }
    }
    @media (max-width: 540px) {
      body { padding-top: 42px; }
      .battle-grid { gap: 8px; }
      .page-header h1 { font-size: 18px; }
      .player-battle-card { padding: 10px; }
      .player-battle-card .player-header { margin-bottom: 8px; padding-bottom: 6px; }
      .player-battle-card .player-name { font-size: 14px; }
      .player-battle-card .player-avatar { width: 32px; height: 32px; font-size: 14px; }
      .player-battle-card .player-tag { font-size: 10px; padding: 1px 6px; }
      .battle-char-card { padding: 10px; }
      .battle-char-card .char-name { font-size: 15px; }
      .battle-char-card .char-tier { font-size: 10px; }
      .battle-char-card .retain-badge { top: 4px; right: 4px; font-size: 9px; padding: 2px 6px; }
      .no-selection { padding: 14px; font-size: 13px; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a class="logo" href="/lobby.html">🀄 Super Reach Mahjong</a>
  <div class="nav-links">
    <a href="/lobby.html">大厅</a>
    <a href="/game.html">选择出战</a>
    <a href="/battle_round.html" class="active">回合对战</a>
    <a href="/profile.html">个人中心</a>
  </div>
  <span class="nav-user" id="navUser"></span>
</nav>

<div class="container">
  <div class="page-header">
    <h1>🎴 第 <span id="roundNum">1</span> 回合对战</h1>
    <div class="info">
      房间：<strong id="roomDisplay"></strong> | 玩家：<strong id="nameDisplay"></strong>
    </div>
  </div>

  <div class="section">
    <h2>⚔️ 玩家出战角色</h2>
    <div class="battle-grid" id="battleGrid">
      <div class="no-data">加载中...</div>
    </div>
  </div>

  <div class="section">
    <h2 style="margin-bottom:12px;">📊 投票推进</h2>
    <div class="vote-section">
      <button class="vote-btn vote-btn-round" id="btnEndRound">
        ✅ 投票结束回合（重新选将）
      </button>
      <button class="vote-btn vote-btn-game" id="btnEndGame">
        🏁 投票结束对局（回大厅）
      </button>
      <div style="display:flex;align-items:center;gap:8px;">
        <span id="roundVoteInfo" class="vote-count round">回合投票 0/0</span>
        <span id="gameVoteInfo" class="vote-count game">对局投票 0/0</span>
      </div>
    </div>
    <div id="voteNames" style="margin-top:10px;font-size:12px;color:var(--ink-muted);"></div>
  </div>
</div>

<!-- 全屏角色展示弹窗 -->
<div class="char-fullscreen-overlay hidden" id="charFullscreen">
  <div class="fs-header">
    <div class="fs-header-left">
      <div id="fsAvatar"></div>
      <div class="fs-header-text">
        <div class="fs-char-name" id="fsCharName"></div>
        <div class="fs-char-tier" id="fsCharTier"></div>
        <div class="fs-faction-badge" id="fsFaction"></div>
      </div>
    </div>
    <button class="fs-close" id="fsCloseBtn">✕</button>
  </div>
  <div class="fs-body" id="fsBody"></div>
  <div id="fsRetainInfo"></div>
  <div class="fs-footer">
    <span class="fs-footer-hint">按 ESC 关闭</span>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/lib/auth.js"></script>
<script src="/js/lib/utils.js"></script>
<script src="/js/lib/api.js"></script>
<script src="/js/lib/components.js"></script>
<script src="/js/lib/theme-switcher.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
Auth.check();
var username = Auth.user();
var roomId = Auth.checkRoomId();

// 页面加载前检查房间状态
(async function checkRoomBeforeLoad() {
  try {
    var status = await API.getRoomStatus(roomId, username);
    if (status.finished || !status.exists) {
      Utils.showToast(status.msg || '该对局已结束，即将返回大厅');
      localStorage.removeItem('roomId');
      setTimeout(function () { location.href = '/lobby.html'; }, 2000);
      return;
    }
  } catch (e) { /* 网络错误允许继续 */ }
})();

Auth.renderNav(document.getElementById('navUser'));
document.getElementById('roomDisplay').innerText = roomId;
document.getElementById('nameDisplay').innerText = username;

var allChars = {};
var battleSelections = {};
var playerProfiles = {};

// ══════════ Socket ══════════
var socket = io({ transports: ['polling', 'websocket'] });
var joinDone = false;
var loadRetry = 0;
var MAX_RETRY = 5;

socket.on('connect', function () {
  socket.emit('joinRoom', { roomId: roomId, playerName: username });
  socket.emit('getRoomState', roomId);
});

socket.on('joinSuccess', function () {
  if (!joinDone) {
    joinDone = true;
    socket.emit('requestBattleRoundData', roomId);
    loadBattleData();
  }
});

socket.on('roomPlayersUpdate', function (data) {
  if (data && data.players) {
    data.players.forEach(function (p) {
      playerProfiles[p.name] = { nickname: p.nickname || p.name, avatar: p.avatar || '🀄' };
    });
  }
  if (joinDone) { loadBattleData(); }
});

socket.on('battleRoundData', function (data) {
  console.log('📡 收到 socket 对战数据:', { draft: Object.keys(data.draft || {}).length, selections: Object.keys(data.selections || {}).length });
  if (data.draft && Object.keys(data.draft).length > 0) { allChars = data.draft; }
  if (data.selections && Object.keys(data.selections).length > 0) {
    battleSelections = data.selections;
    if (Object.keys(allChars).length === 0) {
      API.getAllDraft(roomId).then(function (d) {
        if (d && Object.keys(d).length > 0) allChars = d;
      }).catch(function () {});
    }
  }
  if (data.players && data.players.length) {
    data.players.forEach(function (p) {
      if (!playerProfiles[p.name]) {
        playerProfiles[p.name] = { nickname: p.nickname || p.name, avatar: p.avatar || '🀄' };
      }
    });
  }
  renderBattleGrid();
});

socket.on('roomState', function (data) {
  document.getElementById('roundNum').innerText = data.round || 1;
});

socket.on('roundAdvanced', function (data) {
  Utils.createOverlay('<div class="redirect-spinner"></div><div>✅ 全部玩家同意，进入第 ' + data.round + ' 回合！请重新选择出战角色...</div>');
  setTimeout(function () { location.href = '/game.html'; }, 2000);
});

socket.on('roundEndVoteUpdate', function (data) {
  document.getElementById('roundVoteInfo').innerText = '回合投票 ' + data.voted + '/' + data.total;
  document.getElementById('roundVoteInfo').className = data.voted >= data.total ? 'vote-count done' : 'vote-count round';
  if (data.votedNames) {
    document.getElementById('voteNames').innerText = '已投票：' + data.votedNames.join('、');
  }
});

socket.on('gameEndVoteUpdate', function (data) {
  document.getElementById('gameVoteInfo').innerText = '对局投票 ' + data.voted + '/' + data.total;
  document.getElementById('gameVoteInfo').className = data.voted >= data.total ? 'vote-count done' : 'vote-count game';
});

socket.on('gameEnded', function (data) {
  Utils.createOverlay('<div class="redirect-spinner"></div><div>' + data.msg + '</div>');
  setTimeout(function () {
    localStorage.removeItem('roomId');
    location.href = '/lobby.html';
  }, 2500);
});

socket.on('disconnect', function () { joinDone = false; });
socket.on('reconnect', function () {
  socket.emit('joinRoom', { roomId: roomId, playerName: username });
  socket.emit('requestBattleRoundData', roomId);
  joinDone = true;
  loadBattleData();
});

// ══════════ 加载数据 ══════════
async function loadBattleData() {
  try {
    var selRes = await API.getBattleSelections(roomId);
    var sel = selRes;
    battleSelections = sel || {};

    var drafts = await API.getAllDraft(roomId);
    allChars = drafts || {};

    console.log('Battle data loaded:', {
      selections: Object.keys(battleSelections).length,
      players: Object.keys(allChars).length
    });

    var selCount = Object.keys(battleSelections).length;
    var draftCount = Object.keys(allChars).length;
    if (selCount > 0 && draftCount === 0 && loadRetry < MAX_RETRY) {
      loadRetry++;
      console.log('⚠️ 角色池数据为空，第 ' + loadRetry + ' 次重试...');
      setTimeout(function () { loadBattleData(); }, 1000);
      return;
    }
    loadRetry = 0;
  } catch (e) {
    console.error('Failed to load battle data:', e);
    if (loadRetry < MAX_RETRY) {
      loadRetry++;
      setTimeout(function () { loadBattleData(); }, 1500);
      return;
    }
  }
  renderBattleGrid();
}

function renderBattleGrid() {
  var grid = document.getElementById('battleGrid');
  var playerNames = Object.keys(allChars);

  if (playerNames.length === 0) {
    grid.innerHTML = '<div class="no-data">暂无对局数据，请返回选择出战页面重新操作</div>';
    return;
  }

  var selKeys = Object.keys(battleSelections);
  if (selKeys.length === 0 && loadRetry < MAX_RETRY) {
    loadRetry++;
    console.log('⚠️ 出战选择数据为空，第 ' + loadRetry + ' 次通过 socket 请求兜底...');
    socket.emit('requestBattleRoundData', roomId);
    setTimeout(function () { loadBattleData(); }, 800);
    return;
  }

  grid.innerHTML = playerNames.map(function (pname) {
    var isSelf = pname === username;
    var deployedCharName = battleSelections[pname];
    var playerChars = allChars[pname] || [];
    var prof = playerProfiles[pname] || { nickname: pname, avatar: '🀄' };
    var displayName = prof.nickname || pname;

    var deployedChar = playerChars.find(function (c) { return c.name === deployedCharName; });
    var isRetain = deployedChar && deployedChar.retain === true;

    var charCardHTML = '';
    if (deployedChar) {
      var c = deployedChar;
      var skillTagsHTML = Components.renderSkillTags(c, false);
      var strategyHTML = Components.renderStrategyTags(c.tags);

      charCardHTML = '<div class="battle-char-card" data-pname="' + Utils.escHTML(pname) +
        '" data-cname="' + Utils.escHTML(c.name) + '">' +
        (isRetain ? '<div class="retain-badge">🛡️ 保留</div>' : '') +
        '<div class="char-card-header">' +
          (function () {
            var playerCharsForImg = allChars[pname] || [];
            var cc = playerCharsForImg.find(function (x) { return x.name === c.name; });
            if (cc && cc.image) {
              return '<img class="char-avatar" src="/png/' + cc.image +
                '" alt="' + Utils.escHTML(c.name) +
                '" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\';">';
            }
            return '<div class="char-avatar-placeholder">' + (c.name || '').charAt(0) + '</div>';
          })() +
          '<div class="char-info">' +
            '<div class="char-faction">' + Utils.escHTML(c.faction || '无阵营') + '</div>' +
            '<div class="char-name">' + Utils.escHTML(c.name) + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="char-tier">Tier ' + Utils.escHTML(c.tier || '?') + '</div>' +
        (skillTagsHTML ? '<div class="skill-tags">' + skillTagsHTML + '</div>' : '') +
        (strategyHTML || '') +
        '<div class="click-hint">👆 点击查看完整技能详情</div>' +
      '</div>';
    } else {
      charCardHTML = '<div class="no-selection">⚠️ 未选择出战角色</div>';
    }

    return '<div class="player-battle-card' + (isSelf ? ' is-self' : '') + '">' +
      '<div class="player-header">' +
        '<div class="player-avatar">' + Utils.playerAvatarHTML(prof.avatar) + '</div>' +
        '<div>' +
          '<div class="player-name">' + (isSelf ? '⭐ ' : '') + Utils.escHTML(displayName) + '</div>' +
          (displayName !== pname ? '<div class="player-username-sub">@' + Utils.escHTML(pname) + '</div>' : '') +
          (isSelf ? '<div class="player-tag">我</div>' : '') +
        '</div>' +
      '</div>' +
      '<div class="battle-char-wrapper" data-pname="' + Utils.escHTML(pname) +
        '" data-cname="' + Utils.escHTML(deployedCharName || '') + '">' +
        charCardHTML +
      '</div>' +
    '</div>';
  }).join('');

  // 事件委托：角色卡片点击
  grid.querySelectorAll('.battle-char-wrapper, .battle-char-card').forEach(function (el) {
    el.addEventListener('click', function () {
      var wrapper = el.closest('.battle-char-wrapper') || el;
      var pname = wrapper.getAttribute('data-pname');
      var cname = wrapper.getAttribute('data-cname');
      if (pname && cname) openFullscreen(pname, cname);
    });
  });

  gsap.from(grid.querySelectorAll('.player-battle-card'), {
    opacity: 0, y: 20, stagger: 0.1, duration: 0.45, ease: 'power3.out'
  });
}

// ══════════ 全屏角色详情 ══════════
function openFullscreen(playerName, charName) {
  var playerChars = allChars[playerName] || [];
  var c = playerChars.find(function (ch) { return ch.name === charName; });
  if (!c) { Utils.showToast('⚠️ 未找到角色数据'); return; }

  // 头像 big
  var avatarHTML = '';
  if (c.image) {
    avatarHTML = '<img class="fs-avatar" src="/png/' + c.image +
      '" alt="' + Utils.escHTML(c.name) +
      '" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\';">';
  } else {
    avatarHTML = '<div class="fs-avatar-placeholder">' + (c.name || '').charAt(0) + '</div>';
  }
  document.getElementById('fsAvatar').innerHTML = avatarHTML;
  document.getElementById('fsCharName').innerText = c.name;
  document.getElementById('fsCharTier').innerHTML = 'Tier ' + (c.tier || '?') +
    '（' + Utils.escHTML(playerName) + '）' +
    (c.tags && c.tags.length ? ' &middot; ' + Components.renderStrategyTags(c.tags) : '');
  document.getElementById('fsFaction').innerText = c.faction || '无阵营';

  var skills = [];
  if (c.limit) skills.push({ key: 'limit', text: c.limit });
  if (c.innate) skills.push({ key: 'innate', text: c.innate });
  if (c.passive) skills.push({ key: 'passive', text: c.passive });
  if (c.extra) skills.push({ key: 'extra', text: c.extra });

  var bodyHTML = skills.map(function (s) {
    var st = SKILL_TYPES[s.key];
    return '<div class="fs-skill-block">' +
      '<span class="fs-skill-label ' + st.cls + '">' + st.icon + ' ' + st.label + '技能</span>' +
      '<div class="fs-skill-text">' + Utils.escHTML(s.text) + '</div>' +
    '</div>';
  }).join('');

  if (c.note) {
    bodyHTML += '<div class="fs-skill-block">' +
      '<span class="fs-skill-label" style="background:rgba(0,153,255,0.1);color:var(--accent-blue);border-color:rgba(0,153,255,0.3);">📝 备注</span>' +
      '<div class="fs-skill-text">' + Utils.escHTML(c.note) + '</div>' +
    '</div>';
  }

  document.getElementById('fsBody').innerHTML = bodyHTML;

  var retainInfo = document.getElementById('fsRetainInfo');
  if (c.retain) {
    retainInfo.innerHTML = '<div class="fs-retain-info">🛡️ 该角色拥有<strong>保留</strong>效果，出战后下回合仍可继续出战</div>';
  } else {
    retainInfo.innerHTML = '';
  }

  document.getElementById('charFullscreen').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}

function closeFullscreen() {
  document.getElementById('charFullscreen').classList.add('hidden');
  document.body.style.overflow = '';
}

document.getElementById('fsCloseBtn').addEventListener('click', closeFullscreen);
document.addEventListener('keydown', function (e) {
  if (e.key === 'Escape' && !document.getElementById('charFullscreen').classList.contains('hidden')) {
    closeFullscreen();
  }
});

// ══════════ 投票 ══════════
document.getElementById('btnEndRound').addEventListener('click', function () {
  var btn = document.getElementById('btnEndRound');
  if (btn.disabled) return;
  btn.disabled = true;
  btn.innerText = '✅ 已投票结束回合';
  socket.emit('voteEndRound', roomId);
});

document.getElementById('btnEndGame').addEventListener('click', function () {
  if (!confirm('确定要投票结束本局游戏吗？所有玩家同意后将结束对局并返回大厅。')) return;
  var btn = document.getElementById('btnEndGame');
  if (btn.disabled) return;
  btn.disabled = true;
  btn.innerText = '🏁 已投票结束对局';
  socket.emit('voteEndGame', roomId);
});

// ── GSAP 入场动画 ──
gsap.from('.navbar', { y: -60, opacity: 0, duration: 0.5, ease: 'power3.out' });
gsap.from('.page-header', { opacity: 0, y: -15, duration: 0.4, delay: 0.15, ease: 'power2.out' });
gsap.from('.section', { opacity: 0, y: 20, stagger: 0.12, duration: 0.5, delay: 0.35, ease: 'power3.out' });
</script>
</body>
</html>
