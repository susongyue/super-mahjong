<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/png" href="dong.png">
<title>Super Reach Mahjong - 对局房间</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="themes.css">
<meta name="theme-color" content="#000000">
<link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
<script>(function(){try{var t=localStorage.getItem('mahjong-theme')||'spotify';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<style>

  /* ── 房间头部 ── */
  .room-header {
    background: var(--surface-1);
    padding: 18px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 2px solid var(--hairline);
    margin-top: 56px; /* 避开固定导航栏 */
  }
  .room-header h2 { color: var(--gold); font-size: 18px; font-weight: 700; }
  .room-id { color: var(--ink-muted); font-size: 13px; }
  .room-id strong { color: var(--text-primary); }

  /* ── 区域标题 ── */
  .section-title {
    font-size: 15px; font-weight: 700; color: var(--text-primary);
    margin-bottom: 10px; letter-spacing: -0.3px;
  }

  /* ── 玩家卡片 ── */
  .player-card {
    background: var(--surface-1);
    border-radius: var(--r-lg);
    padding: 14px 20px;
    margin: 8px 0;
    display: flex;
    align-items: center;
    gap: 12px;
    border: 2px solid var(--hairline);
  }
  .player-card.self {
    border-color: var(--accent-blue);
    background: var(--accent-blue-glow);
  }
  .player-name { font-size: 16px; font-weight: 700; color: var(--text-primary); }
  .player-username-sub { font-size: 11px; color: var(--ink-muted); display: block; }
  .player-avatar-mini {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, var(--gradient-violet), var(--gradient-magenta));
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0; overflow: hidden;
    color: var(--text-primary);
  }
  .player-info { flex: 1; min-width: 0; }
  .player-status { font-size: 13px; color: var(--ink-muted); white-space: nowrap; }
  .player-status .ready { color: var(--green); font-weight: 600; }
  .player-status .unready { color: var(--ink-muted); font-weight: 600; }

  /* ── 投票（复用全局 vote 类） ── */
  #voteArea {
    margin-top: var(--sp-lg);
    background: var(--surface-1);
    border-radius: var(--r-xl);
    padding: var(--sp-lg);
    border: 2px solid var(--hairline);
  }
  #voteArea h3 { color: var(--gold); margin-bottom: 12px; font-size: 16px; font-weight: 700; }
  #voteTip { margin-top: 10px; font-size: 13px; color: var(--ink-muted); }
  #voteResult { margin-top: 8px; font-size: 14px; color: var(--gold); font-weight: 600; }

  /* ── Draft 区域 ── */
  #draftArea {
    margin-top: var(--sp-lg);
    background: var(--surface-1);
    border-radius: var(--r-xl);
    padding: var(--sp-lg);
    border: 2px solid var(--hairline);
  }
  #draftArea h3 { color: var(--gold); margin-bottom: 12px; font-size: 16px; font-weight: 700; }

  /* ── Draft 阶段标签 ── */
  .draft-phase-label {
    text-align: center;
    font-size: 15px; font-weight: 700; color: var(--gold);
    margin-bottom: 12px; padding: 8px 16px;
    background: var(--gold-bg);
    border-radius: var(--r-md);
    border: 1px solid var(--gold-border);
  }

  /* ── Draft 回合信息 ── */
  .draft-turn-info {
    background: var(--surface-2);
    border-radius: var(--r-lg);
    padding: 14px 18px; margin-bottom: 14px;
    border: 2px solid var(--hairline);
    text-align: center;
    transition: all .3s;
  }
  .draft-turn-info.my-turn {
    border-color: var(--accent-blue);
    background: var(--accent-blue-glow);
    box-shadow: var(--shadow-blue);
  }
  .turn-badge {
    display: inline-block;
    padding: 6px 20px; border-radius: var(--r-pill);
    font-size: 14px; font-weight: 700; margin-bottom: 6px;
  }
  .turn-badge.your-turn {
    background: var(--accent-blue);
    color: var(--text-primary);
    animation: pulse-turn 1.2s infinite;
  }
  .turn-badge.waiting-turn {
    background: var(--surface-1);
      color: var(--ink-muted);
      border: 2px solid var(--hairline);
  }
  @keyframes pulse-turn {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.04); }
  }
  .turn-progress { font-size: 12px; color: var(--ink-muted); margin-top: 4px; }
  .turn-order-hint { font-size: 12px; color: var(--ink-muted); margin-top: 2px; }

  /* ── Draft 区域分隔 ── */
  .draft-section { margin-bottom: 16px; }
  .draft-section-title {
    font-size: 14px; font-weight: 700; color: var(--text-primary);
    margin-bottom: 8px;
  }

  /* ── Draft 池卡片网格 ── */
  .draft-pool-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
  }
  .draft-hand-grid {
    grid-template-columns: repeat(6, 1fr);
    gap: 6px;
  }

  /* ── Draft 角色卡片（紧凑版） ── */
  .draft-char {
    background: var(--surface-2);
    padding: 10px 12px;
    border-radius: var(--r-md);
    border: 2px solid var(--hairline);
  }
  .draft-char-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .draft-char .faction-badge { color: var(--gold); font-size: 11px; font-weight: 700; margin-bottom: 2px; }
  .draft-char .char-tier { font-size: 11px; color: var(--ink-muted); }
  .draft-char .char-skill { font-size: 11px; color: var(--ink-muted); margin-top: 3px; line-height: 1.4; }
  .draft-char .char-skill strong { color: var(--text-primary); }

  .draft-avatar {
    width: 40px; height: 40px; border-radius: 50%;
    object-fit: cover; border: 2px solid var(--hairline);
    background: var(--surface-2); flex-shrink: 0;
  }
  .draft-avatar-placeholder {
    width: 40px; height: 40px; border-radius: 50%;
    background: linear-gradient(135deg, var(--avatar-bg-1), var(--avatar-bg-2));
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; font-weight: 800; color: var(--ink-muted);
    border: 2px solid var(--hairline); flex-shrink: 0;
  }

  /* 池网格中更小的头像 */
  .draft-pool-grid .draft-avatar,
  .draft-pool-grid .draft-avatar-placeholder {
    width: 34px; height: 34px; border-radius: 50%;
  }
  .draft-pool-grid .draft-avatar-placeholder { font-size: 14px; }
  .draft-pool-grid .draft-char-row { gap: 6px; }

  /* 手牌网格中 */
  .draft-hand-grid .draft-avatar,
  .draft-hand-grid .draft-avatar-placeholder {
    width: 32px; height: 32px; border-radius: 50%;
  }
  .draft-hand-grid .draft-avatar-placeholder { font-size: 13px; }
  .draft-hand-grid .draft-char-row { gap: 4px; }
  .draft-hand-grid .draft-char { padding: 6px 8px; }
  .draft-hand-grid .draft-char .faction-badge { font-size: 10px; padding: 1px 6px; }

  /* ── 玩家手牌区域 ── */
  .draft-player-hand {
    margin-bottom: 12px; padding: 10px 14px;
    background: var(--surface-2);
    border-radius: var(--r-md);
    border: 2px solid var(--hairline);
  }
  .draft-player-hand.my-hand {
    background: var(--accent-blue-glow);
    border-color: var(--accent-blue);
  }
  .draft-player-hand .dp-name {
    color: var(--text-primary); font-size: 14px; font-weight: 700; margin-bottom: 6px;
  }
  .draft-player-hand.my-hand .dp-name { color: var(--accent-blue); }
  .dp-count { font-size: 12px; color: var(--ink-muted); font-weight: 400; }

  /* ── 选角预览 ── */
  .draft-preview {
    background: var(--surface-2);
    border-radius: var(--r-md);
    padding: 10px 14px;
    border: 2px solid var(--hairline);
  }
  .draft-pick-preview { display: flex; flex-wrap: wrap; gap: 6px; }
  .pick-order-item {
    display: inline-block;
    padding: 4px 12px; border-radius: var(--r-pill);
    font-size: 12px; font-weight: 500;
    background: var(--surface-1); color: var(--ink-muted);
    border: 2px solid var(--hairline);
  }

  /* 隐藏卡片 */
  .draft-char-hidden {
    background: var(--surface-2);
    border-style: dashed;
    min-height: 60px;
    display: flex; align-items: center; justify-content: center;
  }

  .no-pick-hint {
    color: var(--ink-muted); font-size: 12px;
    font-style: italic; padding: 8px;
  }

  /* ── 跳转提示 ── */
  .redirect-hint {
    text-align: center; color: var(--ink-muted);
    font-size: 13px; margin-top: 20px; padding: 12px;
    background: var(--surface-2);
    border-radius: var(--r-md);
    border: 2px solid var(--hairline);
  }

  /* 旧版 draft-grid（非池选模式用） */
  .draft-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .draft-player { margin-bottom: 20px; }
  .draft-player .dp-name { color: var(--accent-blue); font-size: 17px; margin-bottom: 10px; font-weight: 700; }

  /* ── 响应式 ── */
  @media (max-width: 768px) {
    .room-header { padding: 10px 14px; flex-direction: column; align-items: flex-start; gap: 2px; }
    .room-header h2 { font-size: 16px; }
    .draft-grid { grid-template-columns: repeat(2, 1fr); gap: 6px; }
    .player-card { padding: 10px 12px; margin: 5px 0; }
    .player-name { font-size: 14px; }
    .player-avatar-mini { width: 32px; height: 32px; font-size: 16px; }
    #voteArea, #draftArea { padding: 14px; margin-top: 14px; }
    .draft-char { padding: 8px 10px; }
    .draft-player .dp-name { font-size: 15px; margin-bottom: 8px; }
    .admin-section { padding: 14px; }
    #csvDrop { padding: 14px; }
    .section-title { font-size: 14px; }

    .draft-pool-grid { grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .draft-hand-grid { grid-template-columns: repeat(3, 1fr); gap: 4px; }
    .draft-phase-label { font-size: 13px; padding: 6px 12px; }
    .turn-badge { font-size: 13px; padding: 5px 16px; }
    .draft-turn-info { padding: 10px 14px; }
    .draft-player-hand { padding: 8px 10px; }
    .draft-player-hand .dp-name { font-size: 13px; }
    .draft-section-title { font-size: 13px; }
    .pick-order-item { font-size: 11px; padding: 3px 10px; }
    .turn-order-hint { font-size: 11px; }
  }
  @media (max-width: 540px) {
    .draft-grid { grid-template-columns: repeat(2, 1fr); gap: 6px; }
    .player-card { flex-direction: column; align-items: flex-start; gap: 4px; padding: 8px 10px; }
    .player-name { font-size: 13px; }
    .room-header { padding: 8px 10px; }
    .room-header h2 { font-size: 15px; }
    .room-id { font-size: 11px; }
    #voteArea, #draftArea { padding: 10px; margin-top: 10px; }
    #voteArea h3, #draftArea h3 { font-size: 14px; }
    .draft-player .dp-name { font-size: 14px; }
    .draft-char { padding: 6px 8px; }
    .draft-char-row { gap: 4px; }
    .redirect-hint { font-size: 11px; padding: 8px; margin-top: 12px; }
    .admin-section h3 { font-size: 12px; }

    .draft-pool-grid { grid-template-columns: repeat(2, 1fr); gap: 5px; }
    .draft-hand-grid { grid-template-columns: repeat(2, 1fr); gap: 4px; }
    .draft-phase-label { font-size: 12px; padding: 5px 10px; margin-bottom: 8px; }
    .turn-badge { font-size: 12px; padding: 4px 14px; }
    .draft-turn-info { padding: 8px 10px; margin-bottom: 10px; }
    .draft-turn-info .turn-progress { font-size: 11px; }
    .draft-player-hand { padding: 6px 8px; margin-bottom: 8px; }
    .draft-player-hand .dp-name { font-size: 12px; }
    .dp-count { font-size: 10px; }
    .draft-section { margin-bottom: 10px; }
    .draft-section-title { font-size: 12px; margin-bottom: 5px; }
    .pick-order-item { font-size: 10px; padding: 2px 8px; }
    .draft-phase-label { font-size: 11px; }
  }
</style>
</head>
<body>

<nav class="navbar">
  <a class="logo" href="/lobby.html">Mahjong</a>
  <div class="nav-links">
    <a href="/lobby.html" title="大厅"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></a>
    <a href="#" class="active" title="当前对局"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg></a>
    <a href="/history.html" title="对局记录"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></a>
    <a href="/encyclopedia.html" title="角色图鉴"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2Z"/></svg></a>
    <a href="/profile.html" title="个人中心"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></a>
  </div>
  <span class="nav-user" id="navUser"></span>
</nav>

<div class="room-header">
  <div>
    <h2>对局房间</h2>
    <div class="room-id">房间号：<strong id="roomIdDisplay">---</strong></div>
  </div>
</div>

<div class="container">
  <div class="section-title">房间玩家（最多4人）</div>
  <div id="playerList"></div>

  <button class="btn btn-primary" id="readyBtn" disabled style="width:100%;margin-top:12px">准备游戏</button>

  <div id="voteArea" class="hidden">
    <h3>选择角色抽取方式</h3>
    <div class="vote-section">
      <button class="vote-btn vote-btn-round" id="voteRandom">随机抽取</button>
      <button class="vote-btn vote-btn-game" id="voteNormal">正常抽取</button>
    </div>
    <div id="voteTip"></div>
    <div id="voteResult"></div>
  </div>

  <div id="draftArea" class="hidden">
    <h3>角色选取</h3>
    <div id="draftContent"></div>
    <div class="redirect-hint" id="redirectHint">即将自动跳转到对局页面...</div>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/lib/auth.js"></script>
<script src="/js/lib/utils.js"></script>
<script src="/js/lib/api.js"></script>
<script src="/js/lib/components.js"></script>
<script src="/js/lib/theme-switcher.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
// ── 登录 & 房间检查 ──
Auth.check();
var username = Auth.user();
var roomId = Auth.checkRoomId();

document.getElementById('roomIdDisplay').innerText = roomId;
Auth.renderNav(document.getElementById('navUser'));

// 页面加载前检查房间状态（防止回到已结束对局）
(async function checkRoomBeforeLoad() {
  try {
    var status = await API.getRoomStatus(roomId, username);
    if (status.finished || !status.exists) {
      Utils.showToast(status.msg || '该对局已结束，即将返回大厅');
      localStorage.removeItem('roomId');
      setTimeout(function () { location.href = '/lobby.html'; }, 2000);
      return;
    }
  } catch (e) { /* 网络错误允许继续 */ }
})();

// ── Socket ──
var socket = io();
var myVote = '';

socket.emit('joinRoom', { roomId: roomId, playerName: username });

socket.on('joinSuccess', function () { document.getElementById('readyBtn').disabled = false; });
socket.on('joinFailed', function (msg) {
  Utils.showToast('加入房间失败：' + msg);
  setTimeout(function () { location.href = '/lobby.html'; }, 2000);
});

socket.on('roomPlayersUpdate', function (data) { renderPlayers(data.players); });

function renderPlayers(players) {
  var html = '';
  players.forEach(function (p) {
    var isSelf = p.name === username;
    var displayName = p.nickname || p.name;
    html += '<div class="player-card' + (isSelf ? ' self' : '') + '">' +
      '<div class="player-avatar-mini">' + Utils.playerAvatarHTML(p.avatar) + '</div>' +
      '<div class="player-info">' +
        '<span class="player-name">' + Utils.escHTML(displayName) + '</span>' +
        (displayName !== p.name ? '<span class="player-username-sub">@' + Utils.escHTML(p.name) + '</span>' : '') +
      '</div>' +
      '<span class="player-status">' +
        (p.ready ? '<span class="ready">已准备</span>' : '<span class="unready">未准备</span>') +
        (p.vote ? ' · 已投票' : '') +
      '</span>' +
    '</div>';
  });
  document.getElementById('playerList').innerHTML = html || '<p class="no-data">暂无玩家</p>';
}

// ── 准备 ──
document.getElementById('readyBtn').addEventListener('click', function () {
  socket.emit('toggleReady', roomId);
});

socket.on('allReady', function (msg) {
  document.getElementById('voteArea').classList.remove('hidden');
  document.getElementById('readyBtn').disabled = true;
  document.getElementById('voteTip').innerText = msg;
  Utils.safeAnimate('#voteArea', { opacity: 0, y: 20, duration: 0.5, ease: 'power2.out' });
});

// ── 投票 ──
document.getElementById('voteRandom').addEventListener('click', function () { vote('random'); });
document.getElementById('voteNormal').addEventListener('click', function () { vote('normal'); });

function vote(type) {
  myVote = type;
  socket.emit('voteSelect', { roomId: roomId, type: type });
  document.querySelectorAll('.vote-section button').forEach(function (b) { b.disabled = true; });
  document.getElementById('voteTip').innerText = '你已投票：' + (type === 'random' ? '随机抽取' : '正常抽取');
}

socket.on('voteUpdate', function (data) {
  document.getElementById('voteResult').innerText =
    '当前投票：随机 ' + data.vote.random + ' 票 | 正常 ' + data.vote.normal + ' 票';
});

socket.on('voteResult', function (data) {
  document.getElementById('voteResult').innerText = '投票结束！最终选择：' + data.desc;
  document.getElementById('draftArea').classList.remove('hidden');
  document.getElementById('draftContent').innerHTML =
    '<p style="text-align:center;padding:20px;color:var(--ink-muted)">正在准备角色池...</p>';
  document.getElementById('redirectHint').classList.add('hidden');
  Utils.safeAnimate('#draftArea', { opacity: 0, y: 20, duration: 0.5, ease: 'power2.out' });
});

// ─── Draft 角色卡片渲染 ───
function draftCharImageHTML(c) {
  if (c.image) {
    return '<img class="draft-avatar" src="/png/' + c.image + '" alt="' + Utils.escHTML(c.name) +
      '" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\';">';
  }
  return '<div class="draft-avatar-placeholder">' + (c.name || '').charAt(0) + '</div>';
}

function renderDraftCharCard(c, clickable) {
  var cls = clickable ? 'draft-char draft-char-pickable' : 'draft-char';
  var dataAttr = clickable ? ' data-char-name="' + c.name.replace(/"/g, '&quot;') + '"' : '';
  return '<div class="' + cls + '"' + dataAttr + '>' +
    '<div class="draft-char-row">' +
      draftCharImageHTML(c) +
      '<div style="flex:1;min-width:0;">' +
        '<div class="faction-badge">' + Utils.escHTML(c.faction || '无阵营') + '</div>' +
        '<div style="font-weight:bold;font-size:14px;color:var(--text-primary)">' + Utils.escHTML(c.name) + '</div>' +
        '<div class="char-tier">Tier: ' + c.tier + '</div>' +
      '</div>' +
    '</div>' +
  '</div>';
}

// ─── 池选模式：正常抽取 ───
document.getElementById('draftContent').addEventListener('click', function (e) {
  var card = e.target.closest('.draft-char-pickable');
  if (card && card.dataset.charName) {
    socket.emit('draftPick', { roomId: roomId, characterName: card.dataset.charName, playerName: username });
  }
});

socket.on('draftPoolStart', function (data) {
  document.getElementById('draftContent').innerHTML = renderPoolDraftUI(data);
  document.getElementById('redirectHint').classList.add('hidden');
  Utils.safeAnimate('.draft-pool-grid .draft-char', {
    opacity: 0, y: 15, stagger: 0.04, duration: 0.4, ease: 'power2.out'
  });
});

socket.on('draftUpdate', function (data) {
  updatePoolDraftUI(data);
});

function renderPoolDraftUI(data) {
  var pool = data.pool, currentPlayer = data.currentPlayer, hands = data.hands;
  var currentTurnIndex = data.currentTurnIndex, totalPicks = data.totalPicks;
  var pickOrder = data.pickOrder, pickOrderPreview = data.pickOrderPreview;
  var isMyTurn = currentPlayer === username;

  var myFirstPos = pickOrder.indexOf(username);
  var myTurnHint = myFirstPos >= 0
    ? '你是第 <strong>' + (myFirstPos + 1) + '</strong> 顺位（循环选取）'
    : '';

  var html = '<div class="draft-phase-label">池选模式 — 每轮发10张角色，轮流选取</div>' +
    '<div class="draft-turn-info' + (isMyTurn ? ' my-turn' : '') + '">' +
      (isMyTurn
        ? '<div class="turn-badge your-turn">轮到你选角了！</div>'
        : '<div class="turn-badge waiting-turn">等待 <strong>' + Utils.escHTML(currentPlayer) + '</strong> 选取...</div>') +
      '<div class="turn-progress">进度：' + currentTurnIndex + '/' + totalPicks + ' 次选择</div>' +
      '<div class="turn-order-hint">' + myTurnHint + '</div>' +
    '</div>' +

    '<div class="draft-section">' +
      '<div class="draft-section-title">当前角色池（' + pool.length + '张）' + (pool.length === 0 ? ' — 等待发牌...' : '') + '</div>' +
      '<div class="draft-pool-grid">' +
        pool.map(function (c) { return renderDraftCharCard(c, isMyTurn); }).join('') +
      '</div>' +
    '</div>';

  // 各玩家手牌
  html += '<div class="draft-section"><div class="draft-section-title">各玩家已选角色</div>';
  Object.entries(hands).forEach(function (entry) {
    var name = entry[0], chars = entry[1];
    var isMe = name === username;
    html += '<div class="draft-player-hand' + (isMe ? ' my-hand' : '') + '" data-player="' + Utils.escHTML(name) + '">' +
      '<div class="dp-name">' +
        Utils.escHTML(name) +
        ' <span class="dp-count">（' + chars.length + '/6）</span>' +
      '</div>' +
      '<div class="draft-grid draft-hand-grid">' +
        chars.map(function (c) { return renderDraftCharCard(c, false); }).join('') +
        (chars.length === 0 ? '<div class="no-pick-hint">尚未选取</div>' : '') +
      '</div>' +
    '</div>';
  });
  html += '</div>';

  // 预览下几个选角顺序
  if (pickOrderPreview && pickOrderPreview.length > 0) {
    html += '<div class="draft-section draft-preview">' +
      '<div class="draft-section-title">即将选取的玩家</div>' +
      '<div class="draft-pick-preview">' +
        pickOrderPreview.slice(0, 6).map(function (n, i) {
          return '<span class="pick-order-item">' + (i + currentTurnIndex + 1) + '. ' + Utils.escHTML(n) + '</span>';
        }).join('') +
      '</div>' +
    '</div>';
  }

  return html;
}

function updatePoolDraftUI(data) {
  var pool = data.pool, currentPlayer = data.currentPlayer, hands = data.hands;
  var currentTurnIndex = data.currentTurnIndex, totalPicks = data.totalPicks;
  var pickOrderPreview = data.pickOrderPreview;
  var isMyTurn = currentPlayer === username;

  // 更新池卡片
  var poolGrid = document.querySelector('.draft-pool-grid');
  if (poolGrid) {
    poolGrid.innerHTML = pool.length > 0
      ? pool.map(function (c) { return renderDraftCharCard(c, isMyTurn); }).join('')
      : '<div class="no-pick-hint" style="grid-column:1/-1">角色池已空，等待发牌...</div>';
  }

  // 更新回合信息
  var turnInfo = document.querySelector('.draft-turn-info');
  if (turnInfo) {
    turnInfo.className = 'draft-turn-info' + (isMyTurn ? ' my-turn' : '');
    turnInfo.innerHTML = (isMyTurn
      ? '<div class="turn-badge your-turn">轮到你选角了！</div>'
      : '<div class="turn-badge waiting-turn">等待 <strong>' + Utils.escHTML(currentPlayer) + '</strong> 选取...</div>') +
      '<div class="turn-progress">进度：' + currentTurnIndex + '/' + totalPicks + ' 次选择</div>';
  }

  // 更新各玩家手牌
  Object.entries(hands).forEach(function (entry) {
    var name = entry[0], chars = entry[1];
    var handGrid = document.querySelector('.draft-player-hand[data-player="' + name.replace(/"/g, '&quot;') + '"] .draft-hand-grid');
    if (!handGrid) {
      document.getElementById('draftContent').innerHTML = renderPoolDraftUI({
        pool: pool, currentPlayer: currentPlayer, hands: hands,
        currentTurnIndex: currentTurnIndex, totalPicks: totalPicks,
        pickOrderPreview: pickOrderPreview, pickOrder: []
      });
      return;
    }
    handGrid.innerHTML = chars.map(function (c) { return renderDraftCharCard(c, false); }).join('') +
      (chars.length === 0 ? '<div class="no-pick-hint">尚未选取</div>' : '');
    var dpCount = handGrid.parentElement.querySelector('.dp-count');
    if (dpCount) dpCount.textContent = '（' + chars.length + '/6）';
  });

  // 更新预览
  var preview = document.querySelector('.draft-pick-preview');
  if (preview && pickOrderPreview) {
    preview.innerHTML = pickOrderPreview.slice(0, 6).map(function (n, i) {
      return '<span class="pick-order-item">' + (i + currentTurnIndex + 1) + '. ' + Utils.escHTML(n) + '</span>';
    }).join('');
  }

  // 更新池数量标题
  var poolTitle = document.querySelector('.draft-section:first-of-type .draft-section-title');
  if (poolTitle) {
    poolTitle.textContent = '当前角色池（' + pool.length + '张）' + (pool.length === 0 ? ' — 等待发牌...' : '');
  }
}

// ─── 随机模式 ───
var myRandomChars = [];

socket.on('draftRandomResult', function (data) {
  myRandomChars = data.characters;
  var html = '<div class="draft-phase-label">随机抽取模式 — 角色已分配</div>' +
    '<div class="draft-section">' +
      '<div class="draft-section-title">你的角色</div>' +
      '<div class="draft-grid">' + data.characters.map(function (c) { return renderDraftCharCard(c, false); }).join('') + '</div>' +
    '</div>' +
    '<div class="draft-section">' +
      '<div class="draft-section-title">其他玩家角色</div>' +
      '<div class="draft-grid">' +
        data.allPlayerNames.filter(function (n) { return n !== username; }).map(function (n) {
          return '<div class="draft-char draft-char-hidden">' +
            '<div class="draft-char-row" style="justify-content:center;padding:12px 0">' +
              '<span style="color:var(--ink-muted);font-size:13px">' + Utils.escHTML(n) + ' 的角色不可见</span>' +
            '</div>' +
          '</div>';
        }).join('') +
      '</div>' +
    '</div>';
  document.getElementById('draftContent').innerHTML = html;
  Utils.safeAnimate('.draft-grid .draft-char', {
    opacity: 0, y: 15, stagger: 0.05, duration: 0.4, ease: 'power2.out'
  });
});

// ─── 选角完成 ───
socket.on('draftAllDone', function (data) {
  if (data.type === 'normal' && data.hands) {
    var html = '<div class="draft-phase-label"> 选角完成！</div>';
    Object.entries(data.hands).forEach(function (entry) {
      var name = entry[0], chars = entry[1];
      html += '<div class="draft-player">' +
        '<div class="dp-name">' + Utils.escHTML(name) + '（' + chars.length + '个角色）</div>' +
        '<div class="draft-grid">' + chars.map(function (c) { return renderDraftCharCard(c, false); }).join('') + '</div>' +
      '</div>';
    });
    document.getElementById('draftContent').innerHTML = html;
  }
  document.getElementById('redirectHint').classList.remove('hidden');
  Utils.startCountdown(document.getElementById('redirectHint'), 3, function () {
    location.href = '/game.html';
  }, '', '秒后自动跳转到对局页面...');
});

// ─── 重连时查询 draft 状态 ───
socket.emit('getDraftState', roomId);

socket.on('error', function (msg) { Utils.showToast('错误：' + msg); });

// ── GSAP 入场动画 ──
Utils.safeAnimate('.navbar', { y: -60, opacity: 0, duration: 0.5, ease: 'power3.out' });
Utils.safeAnimate('.room-header', { opacity: 0, y: -10, duration: 0.4, delay: 0.15, ease: 'power2.out' });
Utils.safeAnimate('.container', { opacity: 0, y: 20, duration: 0.6, delay: 0.3, ease: 'power3.out' });
</script>
</body>
</html>
