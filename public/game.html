<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>选择出战 - 超能力立直麻将</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { padding-top: 56px; }
    .container { max-width: 960px; }

    .page-header {
      text-align: center;
      margin-bottom: 20px;
    }
    .page-header h1 {
      font-size: 28px;
      color: var(--accent);
      font-weight: 800;
      margin-bottom: 6px;
    }
    .page-header .info {
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.6;
    }

    .selection-progress {
      background: var(--card);
      border-radius: 14px;
      padding: 16px 20px;
      margin-bottom: 18px;
      box-shadow: var(--shadow);
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }
    .progress-text {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }
    .progress-bar-wrap {
      flex: 1;
      min-width: 150px;
      height: 10px;
      background: var(--card-secondary);
      border-radius: 5px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--green), #2ecc71);
      transition: width .3s;
      border-radius: 5px;
    }
    .selection-list {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 4px;
    }
    .selection-list span {
      color: var(--green);
      font-weight: 600;
    }

    .char-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .char-card {
      background: var(--card-secondary);
      border-radius: 14px;
      padding: 16px;
      border: 2px solid var(--border);
      cursor: pointer;
      transition: all .25s;
      position: relative;
    }
    .char-card:hover:not(.resting) {
      box-shadow: 0 6px 24px rgba(0,0,0,.1);
      transform: translateY(-2px);
      border-color: var(--accent);
    }
    .char-card.selected {
      border-color: var(--accent);
      background: #fff5f5;
      box-shadow: 0 0 0 3px rgba(231,76,60,.25);
    }
    .char-card.resting {
      opacity: 0.45;
      cursor: not-allowed;
      background: #eee;
      border-color: #ddd;
    }
    .char-card.resting-retain {
      opacity: 0.8;
      cursor: pointer;
      border-color: var(--gold);
      border-style: dashed;
      background: linear-gradient(135deg, #fff8e1, var(--card-secondary));
    }
    .char-card .resting-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      background: #999;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 10px;
      z-index: 2;
    }
    .char-card .retain-badge {
      position: absolute;
      top: 8px;
      left: 8px;
      background: var(--gold);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 10px;
      z-index: 2;
    }
    .char-card .faction-badge {
      display: inline-block;
      color: var(--gold);
      font-size: 11px;
      font-weight: 700;
      background: var(--gold-bg);
      padding: 3px 10px;
      border-radius: 12px;
      margin-bottom: 8px;
      border: 1px solid #f0d78c;
    }
    .char-card .char-name {
      font-size: 17px;
      font-weight: 800;
      margin-bottom: 4px;
      color: var(--text);
    }
    .char-card .char-meta {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .char-card .char-meta .tier {
      color: var(--accent);
      font-weight: 600;
    }
    .char-card .skill-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 10px;
    }
    .char-card .skill-tag {
      font-size: 10px;
      padding: 3px 8px;
      cursor: default;
    }
    .char-card .card-actions {
      display: flex;
      gap: 6px;
      margin-top: 4px;
    }
    .char-card .btn-detail {
      flex: 1;
      padding: 7px 10px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      border: 2px solid var(--border-strong);
      background: var(--card);
      color: var(--text-secondary);
      transition: all .2s;
      text-align: center;
    }
    .char-card .btn-detail:hover {
      color: var(--accent);
      border-color: var(--accent);
      background: #fff;
    }
    .char-card .btn-deploy {
      flex: 1;
      padding: 7px 10px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      border: 2px solid var(--accent);
      background: var(--accent);
      color: #fff;
      transition: all .2s;
      text-align: center;
    }
    .char-card .btn-deploy:hover:not(:disabled) {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }
    .char-card .btn-deploy:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .char-card .btn-deploy.deployed {
      background: var(--green);
      border-color: var(--green);
    }
    .char-card .btn-deploy.deployed:hover {
      background: var(--green-hover);
    }

    .vote-section {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 14px;
    }
    .vote-btn {
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
      border: 2px solid transparent;
      outline: none;
      white-space: nowrap;
    }
    .vote-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .vote-btn-game { background:#fce4ec; color:var(--accent); border-color:#ef9a9a; }
    .vote-btn-game:hover:not(:disabled) { background:#ffcdd2; border-color:var(--accent); }
    .vote-count {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 12px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 13px;
    }
    .vote-count.game  { background:#fce4ec; color:var(--accent); border:1.5px solid #ef9a9a; }
    .vote-count.done  { background:var(--green-bg); color:var(--green); border:1.5px solid var(--green); }
    .vote-info { display:flex; align-items:center; gap:8px; font-size:13px; color:var(--text-secondary); font-weight:600; }

    .redirect-overlay {
      position: fixed;
      top:0;left:0;right:0;bottom:0;
      background: rgba(0,0,0,.6);
      z-index: 400;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: #fff;
      font-size: 24px;
      font-weight: 700;
    }

    /* 全屏角色详情弹窗中新增出战按钮 */
    .fs-deploy-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      border: 2px solid var(--accent);
      background: var(--accent);
      color: #fff;
      transition: all .2s;
      margin-top: 16px;
      width: 100%;
    }
    .fs-deploy-btn:hover:not(:disabled) {
      background: var(--accent-hover);
    }
    .fs-deploy-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .fs-deploy-btn.deployed {
      background: var(--green);
      border-color: var(--green);
    }
    .fs-deploy-btn.deployed:hover {
      background: var(--green-hover);
    }
    .fs-deploy-btn.blocked {
      background: #999;
      border-color: #999;
      cursor: not-allowed;
    }
    .fs-retain-info {
      background: var(--gold-bg);
      color: var(--gold);
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      text-align: center;
      border: 1.5px solid #f0d78c;
      margin-top: 12px;
    }

    @media (max-width: 900px) { .char-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; } }
    @media (max-width: 540px) { .char-grid { grid-template-columns: 1fr; gap: 8px; } }
  </style>
</head>
<body>

<nav class="navbar">
  <a class="logo" href="/lobby.html">🀄 超能力立直麻将</a>
  <div class="nav-links">
    <a href="/lobby.html">大厅</a>
    <a href="/battle_round.html">回合对战</a>
    <a href="#" class="active">选择出战</a>
    <a href="/profile.html">个人中心</a>
  </div>
  <span class="nav-user" id="navUser"></span>
</nav>

<div class="container">
  <div class="page-header">
    <h1>⚔️ 选择出战角色</h1>
    <div class="info">
      房间：<strong id="roomDisplay"></strong> |
      玩家：<strong id="nameDisplay"></strong> |
      🏁 第 <strong id="roundNum">1</strong> 回合
    </div>
  </div>

  <!-- 选择进度（只显示准备人数，不显示具体选择） -->
  <div class="selection-progress">
    <div>
      <div class="progress-text" id="progressText">等待选择... 0/0</div>
      <div class="selection-list" id="selectionList"></div>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
    </div>
  </div>

  <!-- 角色选择区 -->
  <div class="section">
    <div class="section-header-row" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h2 style="margin-bottom:0;">🎯 你的角色（点击查看详情）</h2>
      <span id="mySelectionBadge" style="font-size:13px;color:var(--text-secondary);"></span>
    </div>
    <div class="char-grid" id="charGrid">
      <div class="no-data">加载中...</div>
    </div>
  </div>

  <!-- 投票区 -->
  <div class="section">
    <div class="section-header-row" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <h2 style="margin-bottom:0;">📊 对局投票</h2>
    </div>
    <div class="vote-section">
      <button class="vote-btn vote-btn-game" id="btnEndGame" onclick="voteEndGame()">
        🏁 投票结束对局
      </button>
      <div class="vote-info">
        <span id="gameVoteInfo" class="vote-count game">对局投票 0/0</span>
      </div>
    </div>
    <div id="voteNames" style="margin-top:10px;font-size:12px;color:var(--text-secondary);"></div>
  </div>
</div>

<!-- 全屏角色详情弹窗 -->
<div class="char-fullscreen-overlay hidden" id="charFullscreen">
  <div class="fs-header">
    <div class="fs-header-left">
      <div id="fsAvatar"></div>
      <div class="fs-header-text">
        <div class="fs-char-name" id="fsCharName"></div>
        <div class="fs-char-tier" id="fsCharTier"></div>
        <div class="fs-faction-badge" id="fsFaction"></div>
      </div>
    </div>
    <button class="fs-close" onclick="closeFullscreen()">✕</button>
  </div>
  <div class="fs-body" id="fsBody"></div>
  <div id="fsRetainInfo"></div>
  <button class="fs-deploy-btn" id="fsDeployBtn" onclick="deployFromFullscreen()">⚔️ 出战</button>
  <div class="fs-footer">
    <span class="fs-footer-hint">按 ESC 关闭</span>
  </div>
</div>

<div class="redirect-overlay hidden" id="redirectOverlay">
  <div style="font-size:18px;text-align:center;" id="redirectText"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const username = localStorage.user;
const roomId = localStorage.roomId;
if (!username) location.href = '/login.html';
if (!roomId) location.href = '/lobby.html';

// ─── 页面加载前检查房间状态（防止回到已结束对局） ───
(async function checkRoomBeforeLoad() {
  try {
    const status = await fetch('/api/room-status?roomId=' + roomId + '&username=' + encodeURIComponent(username))
      .then(x => x.json());
    if (status.finished || !status.exists) {
      alert(status.msg || '该对局已结束，即将返回大厅');
      localStorage.removeItem('roomId');
      location.href = '/lobby.html';
      return;
    }
  } catch (e) { /* 网络错误允许继续 */ }
})();

(function updateNav() {
  const avatar = localStorage.avatar || '🀄';
  const nickname = localStorage.nickname || username;
  let avatarHTML = avatar.startsWith('/avatars/')
    ? '<img src="' + avatar + '" alt="" style="width:24px;height:24px;border-radius:50%;object-fit:cover;vertical-align:middle;">'
    : avatar;
  document.getElementById('navUser').innerHTML =
    '<span style="cursor:pointer" onclick="location.href=\'/profile.html\'">' + avatarHTML + ' ' + nickname + '</span>';
})();
document.getElementById('roomDisplay').innerText = roomId;
document.getElementById('nameDisplay').innerText = username;

// 全局状态
let myChars = [];
let charStates = {};         // { charName: {resting:bool} }
let mySelection = null;      // 当前选择的角色名
let totalPlayers = 0;
let readyPlayerNames = [];   // 已准备的玩家名（不包含角色信息）
let playerProfiles = {};     // { playerName: { nickname, avatar } }
let fsCurrentIdx = -1;       // 全屏弹窗中查看的角色索引

// ══════════ Socket ══════════
const socket = io({ transports: ['polling', 'websocket'] });

socket.on('connect', () => {
  socket.emit('joinRoom', { roomId, playerName: username });
  socket.emit('getRoomState', roomId);
  socket.emit('getBattleState', { roomId, playerName: username });
});

// 房间状态
socket.on('roomState', (data) => {
  document.getElementById('roundNum').innerText = data.round || 1;
  totalPlayers = data.totalPlayers || 0;
  updateSelectionUI();
});

// 玩家列表更新
socket.on('roomPlayersUpdate', (data) => {
  totalPlayers = data.players ? data.players.length : totalPlayers;
  // 缓存/更新玩家资料（每次更新以支持资料变更同步）
  if (data && data.players) {
    data.players.forEach(p => {
      playerProfiles[p.name] = { nickname: p.nickname || p.name, avatar: p.avatar || '🀄' };
    });
  }
  updateSelectionUI();
});

// 角色状态更新（仅自己的）
socket.on('characterStatesUpdate', (data) => {
  charStates = data || {};
  renderCharGrid();
});

// 作战选将状态（页面恢复用）
socket.on('battleState', (data) => {
  document.getElementById('roundNum').innerText = data.round || 1;
  totalPlayers = data.totalPlayers || 0;
  readyPlayerNames = data.readyPlayerNames || [];
  if (data.mySelection) {
    mySelection = data.mySelection;
    document.getElementById('mySelectionBadge').innerHTML = '✅ 已选择：<strong>' + escHTML(mySelection) + '</strong>';
    renderCharGrid();
  }
  updateSelectionUI();
});

// 准备状态更新（仅显示人数和已准备的玩家名，不显示角色选择）
socket.on('battleReadyUpdate', (data) => {
  readyPlayerNames = data.readyPlayerNames || [];
  totalPlayers = data.totalPlayers || totalPlayers;
  updateSelectionUI();
});

// 确认自己的选择
socket.on('battleSelectionConfirm', (data) => {
  mySelection = data.characterName;
  document.getElementById('mySelectionBadge').innerHTML = '✅ 已选择：<strong>' + escHTML(mySelection) + '</strong>';
  renderCharGrid();
  updateSelectionUI();
  showToast('✅ 已选择 ' + data.characterName + ' 出战！等待其他玩家...');
});

// 取消选择
socket.on('battleSelectionCancel', () => {
  mySelection = null;
  document.getElementById('mySelectionBadge').innerText = '';
  renderCharGrid();
  showToast('已取消选择');
});

// 所有人选完 → 跳转到回合界面
socket.on('allBattleSelected', (data) => {
  showRedirectOverlay('所有玩家已选择出战角色！即将进入回合界面...');
  setTimeout(() => { location.href = '/battle_round.html'; }, 2000);
});

// 回合推进
socket.on('roundAdvanced', (data) => {
  document.getElementById('roundNum').innerText = data.round;
  mySelection = null;
  readyPlayerNames = [];
  document.getElementById('mySelectionBadge').innerText = '';
  loadChars();
  updateSelectionUI();
  showToast('🎉 第 ' + data.round + ' 回合开始！请选择出战角色');
});

// 对局投票更新
socket.on('gameEndVoteUpdate', (data) => {
  document.getElementById('gameVoteInfo').innerText = '对局投票 ' + data.voted + '/' + data.total;
  document.getElementById('gameVoteInfo').className = data.voted >= data.total ? 'vote-count done' : 'vote-count game';
});

// 对局结束
socket.on('gameEnded', (data) => {
  showRedirectOverlay(data.msg);
  setTimeout(() => {
    localStorage.removeItem('roomId');
    location.href = '/lobby.html';
  }, 2500);
});

socket.on('error', (msg) => {
  showToast('⚠️ ' + msg);
});

function showRedirectOverlay(msg) {
  const overlay = document.getElementById('redirectOverlay');
  document.getElementById('redirectText').innerText = msg;
  overlay.classList.remove('hidden');
}

// ══════════ 角色加载 ══════════
async function loadChars() {
  const chars = await fetch(`/api/my-draft?roomId=${roomId}&username=${encodeURIComponent(username)}`).then(r => r.json());
  const states = await fetch(`/api/character-states?roomId=${roomId}&username=${encodeURIComponent(username)}`).then(r => r.json());

  myChars = chars;
  charStates = states;

  if (!chars || chars.length === 0) {
    document.getElementById('charGrid').innerHTML = '<div class="no-data">暂无角色数据</div>';
    return;
  }

  renderCharGrid();
}

const SKILL_TYPES = {
  limit:   { label:'限定', icon:'🔥', cls:'limit' },
  innate:  { label:'固有', icon:'⚡', cls:'innate' },
  passive: { label:'被动', icon:'🛡️', cls:'passive' },
  extra:   { label:'附加', icon:'✨', cls:'extra' }
};

function getCharImageHTML(name) {
  const c = myChars.find(x => x.name === name);
  const img = c && c.image;
  if (img) return `<img class="char-avatar" src="/png/${img}" alt="${escHTML(name)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">`;
  return `<div class="char-avatar-placeholder">${name.charAt(0)}</div>`;
}
function getCharImageHTML_Big(name) {
  const c = myChars.find(x => x.name === name);
  const img = c && c.image;
  if (img) return `<img class="fs-avatar" src="/png/${img}" alt="${escHTML(name)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">`;
  return `<div class="fs-avatar-placeholder">${name.charAt(0)}</div>`;
}

function escHTML(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderStrategyTags(tags) {
  if (!tags || !tags.length) return '';
  return '<div class="strategy-tags">' + tags.map(t =>
    '<span class="strategy-tag ' + t + '">' + escHTML(t) + '</span>'
  ).join('') + '</div>';
}

function renderCharGrid() {
  const grid = document.getElementById('charGrid');

  grid.innerHTML = myChars.map((c, idx) => {
    const state = charStates[c.name] || { resting: false };
    const isResting = state.resting;
    const isRetain = c.retain === true;
    const isSelected = mySelection === c.name;
    const isBlocked = isResting && !isRetain;
    const isRestingRetain = isResting && isRetain;

    let extraClasses = '';
    if (isSelected) extraClasses += ' selected';
    if (isBlocked) extraClasses += ' resting';
    if (isRestingRetain) extraClasses += ' resting-retain';

    const badges = [];
    if (isRestingRetain) badges.push('<div class="resting-badge" style="background:var(--gold);">🛡️ 轮休·可出战</div>');
    else if (isResting) badges.push('<div class="resting-badge">😴 休息中</div>');
    if (isRetain) badges.push('<div class="retain-badge">🛡️ 保留</div>');

    const skills = [];
    if (c.limit)   skills.push({ key:'limit', text:c.limit });
    if (c.innate)  skills.push({ key:'innate', text:c.innate });
    if (c.passive) skills.push({ key:'passive', text:c.passive });
    if (c.extra)   skills.push({ key:'extra', text:c.extra });

    const skillTags = skills.map(s => {
      const st = SKILL_TYPES[s.key];
      return `<span class="skill-tag ${st.cls}" onclick="event.stopPropagation()"><span class="tag-icon">${st.icon}</span>${st.label}</span>`;
    }).join('');

    // 出战按钮状态
    let deployBtnHTML = '';
    if (isBlocked) {
      deployBtnHTML = '<button class="btn-detail" onclick="event.stopPropagation();openFullscreen('+idx+')">🔍 查看详情</button>';
    } else if (isSelected) {
      deployBtnHTML = '<button class="btn-deploy deployed" onclick="event.stopPropagation();cancelDeploy('+idx+')">✅ 已出战</button>';
    } else {
      deployBtnHTML = '<button class="btn-deploy" onclick="event.stopPropagation();deployChar('+idx+')">⚔️ 出战</button>';
    }

    return `<div class="char-card${extraClasses}" onclick="openFullscreen(${idx})">
      ${badges.join('')}
      <div class="char-card-header">
        ${getCharImageHTML(c.name)}
        <div class="char-info">
          <div class="faction-badge">${escHTML(c.faction||'无阵营')}</div>
          <div class="char-name">${escHTML(c.name)}</div>
        </div>
      </div>
      <div class="char-meta"><span class="tier">Tier ${escHTML(c.tier)}</span></div>
      <div class="skill-tags">${skillTags}</div>
      ${renderStrategyTags(c.tags)}
      <div class="card-actions">
        <button class="btn-detail" onclick="event.stopPropagation();openFullscreen(${idx})">🔍 详情</button>
        ${deployBtnHTML}
      </div>
    </div>`;
  }).join('');
}

// ══════════ 选择/取消/查看详情 ══════════
function deployChar(idx) {
  const c = myChars[idx];
  if (!c) return;

  const isResting = charStates[c.name] && charStates[c.name].resting;
  const isRetain = c.retain === true;
  if (isResting && !isRetain) {
    showToast('⚠️ 该角色正在休息中，等待全部角色出战过后即可恢复');
    return;
  }
  if (isResting && isRetain) {
    showToast('🛡️ 保留效果发动！该角色不受休息限制');
  }

  mySelection = c.name;
  socket.emit('selectBattleCharacter', { roomId, characterName: c.name, playerName: username });
  document.getElementById('mySelectionBadge').innerHTML = '✅ 已选择：<strong>' + escHTML(c.name) + '</strong>';
  renderCharGrid();
  // 关闭全屏弹窗
  closeFullscreen();
}

function cancelDeploy(idx) {
  const c = myChars[idx];
  if (!c) return;
  mySelection = null;
  socket.emit('resetBattleSelection', { roomId, playerName: username });
  document.getElementById('mySelectionBadge').innerText = '';
  renderCharGrid();
  closeFullscreen();
}

// ══════════ 全屏角色详情 ══════════
function openFullscreen(idx) {
  const c = myChars[idx];
  if (!c) return;
  fsCurrentIdx = idx;

  document.getElementById('fsAvatar').innerHTML = getCharImageHTML_Big(c.name);
  document.getElementById('fsCharName').innerText = c.name;
  document.getElementById('fsCharTier').innerHTML = 'Tier ' + (c.tier || '?') + (c.tags && c.tags.length ? ' &middot; ' + c.tags.map(t => '<span class="strategy-tag ' + t + '">' + escHTML(t) + '</span>').join(' ') : '');
  document.getElementById('fsFaction').innerText = c.faction || '无阵营';

  const skills = [];
  if (c.limit)   skills.push({ key:'limit', text:c.limit });
  if (c.innate)  skills.push({ key:'innate', text:c.innate });
  if (c.passive) skills.push({ key:'passive', text:c.passive });
  if (c.extra)   skills.push({ key:'extra', text:c.extra });

  document.getElementById('fsBody').innerHTML = skills.map(s => {
    const st = SKILL_TYPES[s.key];
    return `<div class="fs-skill-block">
      <span class="fs-skill-label ${st.cls}">${st.icon} ${st.label}技能</span>
      <div class="fs-skill-text">${escHTML(s.text)}</div>
    </div>`;
  }).join('') + (c.note ? `<div class="fs-skill-block"><span class="fs-skill-label" style="background:#e8eaf6;color:#3f51b5;border-color:#9fa8da;">📝 备注</span><div class="fs-skill-text">${escHTML(c.note)}</div></div>` : '');

  // 出战按钮状态
  const deployBtn = document.getElementById('fsDeployBtn');
  const isResting = charStates[c.name] && charStates[c.name].resting;
  const isRetain = c.retain === true;
  const isSelected = mySelection === c.name;
  const isBlocked = isResting && !isRetain;

  deployBtn.classList.remove('deployed', 'blocked');
  deployBtn.disabled = false;

  if (isBlocked) {
    deployBtn.innerText = '🔒 休息中，无法出战';
    deployBtn.classList.add('blocked');
    deployBtn.disabled = true;
  } else if (isSelected) {
    deployBtn.innerText = '✅ 已出战（点击取消）';
    deployBtn.classList.add('deployed');
    deployBtn.onclick = () => cancelDeploy(fsCurrentIdx);
  } else {
    deployBtn.innerText = '⚔️ 出战';
    deployBtn.onclick = () => deployChar(fsCurrentIdx);
  }

  // 保留提示
  const retainInfo = document.getElementById('fsRetainInfo');
  if (isResting && isRetain) {
    retainInfo.innerHTML = '<div class="fs-retain-info">🛡️ 该角色拥有<strong>保留</strong>效果，休息状态下仍可出战！</div>';
  } else if (isRetain && !isResting) {
    retainInfo.innerHTML = '<div class="fs-retain-info">🛡️ 该角色拥有<strong>保留</strong>效果，出战后仍可在下回合继续出战</div>';
  } else {
    retainInfo.innerHTML = '';
  }

  document.getElementById('charFullscreen').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}

function deployFromFullscreen() {
  if (fsCurrentIdx >= 0) deployChar(fsCurrentIdx);
}

function closeFullscreen() {
  document.getElementById('charFullscreen').classList.add('hidden');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && !document.getElementById('charFullscreen').classList.contains('hidden')) {
    closeFullscreen();
  }
});

// ══════════ 进度UI（只显示准备人数，不显示他人选择） ══════════
function updateSelectionUI() {
  const selectedCount = readyPlayerNames.length;
  const total = totalPlayers || 4;
  const percent = total > 0 ? (selectedCount / total) * 100 : 0;

  document.getElementById('progressText').innerText = '已准备 ' + selectedCount + '/' + total + ' 人';
  document.getElementById('progressBar').style.width = percent + '%';

  // 显示已准备的玩家昵称（使用昵称而非用户名）
  const names = readyPlayerNames.map(p => {
    const prof = playerProfiles[p];
    const displayName = prof ? prof.nickname : p;
    return '<span>' + displayName + '</span>';
  });
  const waitingCount = total - selectedCount;
  if (waitingCount > 0) {
    names.push('<span style="color:var(--text-secondary);">等待 ' + waitingCount + ' 人...</span>');
  }
  document.getElementById('selectionList').innerHTML = names.length > 0 ? names.join(' | ') : '等待所有人准备...';
}

// ══════════ 投票 ══════════
function voteEndGame() {
  if (!confirm('确定要投票结束本局游戏吗？所有玩家同意后将结束对局。')) return;
  const btn = document.getElementById('btnEndGame');
  btn.disabled = true;
  btn.innerText = '🏁 已投票结束对局';
  socket.emit('voteEndGame', roomId);
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

loadChars();
</script>
</body>
</html>
