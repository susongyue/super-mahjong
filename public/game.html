<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>对局中 - 超能力立直麻将</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { padding-top: 56px; }

    .container { max-width: 960px; }

    .page-header {
      text-align: center;
      margin-bottom: 28px;
    }
    .page-header h1 {
      font-size: 30px;
      color: var(--accent);
      font-weight: 800;
      margin-bottom: 6px;
    }
    .page-header .info {
      color: var(--text-secondary);
      font-size: 15px;
      line-height: 1.6;
    }
    .page-header .info strong { color: var(--text); }

    .section-header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 16px;
    }
    .section-header-row h2 { margin-bottom: 0; }

    /* 提示文字 */
    .card-hint {
      display: block;
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 10px;
      text-align: center;
    }

    @media (max-width: 768px) {
      .page-header h1 { font-size: 24px; }
    }
    @media (max-width: 540px) {
      .page-header h1 { font-size: 22px; }
      .page-header .info { font-size: 13px; }
      .section-header-row { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a class="logo" href="/lobby.html">🀄 超能力立直麻将</a>
  <div class="nav-links">
    <a href="/lobby.html">大厅</a>
    <a href="#" class="active">对局中</a>
  </div>
  <span class="nav-user" id="navUser"></span>
</nav>

<div class="container">
  <div class="page-header">
    <h1>🎴 对局进行中</h1>
    <div class="info">
      房间：<strong id="roomDisplay"></strong> | 玩家：<strong id="nameDisplay"></strong>
    </div>
  </div>

  <!-- 回合信息 + 投票区 -->
  <div class="section">
    <div class="section-header-row">
      <h2>📊 对局状态</h2>
      <span class="round-badge">🏁 第 <span id="roundNum">1</span> 回合</span>
    </div>
    <div class="vote-section" style="margin-top:16px;">
      <button class="vote-btn vote-btn-round" id="btnEndRound" onclick="voteEndRound()">
        ✅ 投票结束回合
      </button>
      <button class="vote-btn vote-btn-game" id="btnEndGame" onclick="voteEndGame()">
        🏁 投票结束对局
      </button>
      <div class="vote-info">
        <span id="roundVoteInfo" class="vote-count round">回合投票 0/0</span>
        <span id="gameVoteInfo" class="vote-count game">对局投票 0/0</span>
      </div>
    </div>
    <div id="voteNames" style="margin-top:10px;font-size:12px;color:var(--text-secondary);"></div>
  </div>

  <!-- 角色列表 -->
  <div class="section">
    <div class="section-header-row">
      <h2>🎯 你的角色（6选1出战）</h2>
    </div>
    <div class="char-grid" id="charGrid">
      <div class="no-data">加载中...</div>
    </div>
  </div>
</div>

<!-- 全屏角色展示弹窗（覆盖整个手机屏幕） -->
<div class="char-fullscreen-overlay hidden" id="charFullscreen">
  <div class="fs-header">
    <div class="fs-header-left">
      <div class="fs-char-name" id="fsCharName"></div>
      <div class="fs-char-tier" id="fsCharTier"></div>
      <div class="fs-faction-badge" id="fsFaction"></div>
    </div>
    <button class="fs-close" onclick="closeFullscreen()">✕</button>
  </div>
  <div class="fs-body" id="fsBody"></div>
  <div class="fs-footer">
    <span class="fs-footer-hint">👆 将此屏幕展示给其他玩家查看</span>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const username = localStorage.user;
const roomId = localStorage.roomId;
if (!username) location.href = '/login.html';

document.getElementById('navUser').innerText = '👤 ' + username;
document.getElementById('roomDisplay').innerText = roomId || '未知';
document.getElementById('nameDisplay').innerText = username;

// 技能类型：按展示顺序 限定技 → 固有技 → 被动技 → 附加技
const SKILL_TYPES = {
  limit:   { label: '限定', icon: '🔥', cls: 'limit', order: 1 },
  innate:  { label: '固有', icon: '⚡', cls: 'innate', order: 2 },
  passive: { label: '被动', icon: '🛡️', cls: 'passive', order: 3 },
  extra:   { label: '附加', icon: '✨', cls: 'extra', order: 4 }
};

function escHTML(s) {
  if (!s) return '';
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ══════════ Socket.io 连接 ══════════
const socket = io({ transports: ['polling', 'websocket'] });

socket.on('connect', () => {
  socket.emit('joinRoom', { roomId, playerName: username });
  socket.emit('getRoomState', roomId);
});

// 获取房间状态
socket.on('roomState', (data) => {
  document.getElementById('roundNum').innerText = data.round || 1;
});

// 回合投票更新
socket.on('roundEndVoteUpdate', (data) => {
  document.getElementById('roundVoteInfo').innerText = '回合投票 ' + data.voted + '/' + data.total;
  document.getElementById('roundVoteInfo').className = data.voted >= data.total ? 'vote-count done' : 'vote-count round';
});

// 回合推进
socket.on('roundAdvanced', (data) => {
  document.getElementById('roundNum').innerText = data.round;
  document.getElementById('roundVoteInfo').innerText = '回合投票 0/0';
  document.getElementById('roundVoteInfo').className = 'vote-count round';
  document.getElementById('btnEndRound').disabled = false;
  document.getElementById('btnEndRound').innerText = '✅ 投票结束回合';
  showToast('🎉 第 ' + data.round + ' 回合开始！');
});

// 对局投票更新
socket.on('gameEndVoteUpdate', (data) => {
  document.getElementById('gameVoteInfo').innerText = '对局投票 ' + data.voted + '/' + data.total;
  document.getElementById('gameVoteInfo').className = data.voted >= data.total ? 'vote-count done' : 'vote-count game';
});

// 对局结束
socket.on('gameEnded', (data) => {
  showToast(data.msg);
  document.getElementById('roundNum').innerText = '1';
  document.getElementById('roundVoteInfo').innerText = '回合投票 0/0';
  document.getElementById('roundVoteInfo').className = 'vote-count round';
  document.getElementById('gameVoteInfo').innerText = '对局投票 0/0';
  document.getElementById('gameVoteInfo').className = 'vote-count game';
  document.getElementById('btnEndRound').disabled = false;
  document.getElementById('btnEndRound').innerText = '✅ 投票结束回合';
  document.getElementById('btnEndGame').disabled = false;
  document.getElementById('btnEndGame').innerText = '🏁 投票结束对局';
});

// 玩家列表更新
socket.on('roomPlayersUpdate', (data) => {
  updateVoteNames();
});

function updateVoteNames() {
  // 用简单的提示代替玩家名列表
}

// 投票结束回合
function voteEndRound() {
  const btn = document.getElementById('btnEndRound');
  if (btn.disabled) return;
  btn.disabled = true;
  btn.innerText = '✅ 已投票结束回合';
  socket.emit('voteEndRound', roomId);
}

// 投票结束对局
function voteEndGame() {
  if (!confirm('确定要投票结束本局游戏吗？所有玩家同意后将结束对局。')) return;
  const btn = document.getElementById('btnEndGame');
  if (btn.disabled) return;
  btn.disabled = true;
  btn.innerText = '🏁 已投票结束对局';
  socket.emit('voteEndGame', roomId);
}

// ══════════ 角色加载 ══════════
async function loadChars() {
  const chars = await fetch(`/api/my-draft?roomId=${roomId}&username=${encodeURIComponent(username)}`).then(r => r.json());
  const grid = document.getElementById('charGrid');
  if (!chars || chars.length === 0) {
    grid.innerHTML = '<div class="no-data">暂无角色数据，请先在房间内完成选角</div>';
    return;
  }

  grid.innerHTML = chars.map((c, idx) => {
    // 技能按顺序: 限定技 → 固有技 → 被动技 → 附加技
    const skills = [];
    if (c.limit)   skills.push({ key: 'limit', text: c.limit });
    if (c.innate)  skills.push({ key: 'innate', text: c.innate });
    if (c.passive) skills.push({ key: 'passive', text: c.passive });
    if (c.extra)   skills.push({ key: 'extra', text: c.extra });

    const skillTags = skills.map(s => {
      const st = SKILL_TYPES[s.key];
      const preview = s.text.length > 10 ? s.text.substring(0, 10) + '…' : s.text;
      return `<span class="skill-tag ${st.cls}" style="cursor:default;">
        <span class="tag-icon">${st.icon}</span>${st.label}
        <span class="tag-preview">${escHTML(preview)}</span>
      </span>`;
    }).join('');

    return `<div class="char-card" onclick="openFullscreen(${idx})" style="cursor:pointer;">
      <div class="faction-badge">${escHTML(c.faction || '无阵营')}</div>
      <div class="char-name">${escHTML(c.name)}</div>
      <div class="char-meta">
        <span class="tier">Tier ${escHTML(c.tier)}</span>
      </div>
      <div class="skill-tags">${skillTags}</div>
      <span class="card-hint">👆 点击卡片查看完整技能</span>
    </div>`;
  }).join('');

  // 缓存角色数据
  window._chars = chars;
}

// ══════════ 全屏角色展示 ══════════
function openFullscreen(index) {
  const c = window._chars[index];
  if (!c) return;

  document.getElementById('fsCharName').innerText = c.name;
  document.getElementById('fsCharTier').innerText = 'Tier ' + (c.tier || '?');
  document.getElementById('fsFaction').innerText = c.faction || '无阵营';

  // 技能按顺序: 限定技 → 固有技 → 被动技 → 附加技
  const skills = [];
  if (c.limit)   skills.push({ key: 'limit', text: c.limit });
  if (c.innate)  skills.push({ key: 'innate', text: c.innate });
  if (c.passive) skills.push({ key: 'passive', text: c.passive });
  if (c.extra)   skills.push({ key: 'extra', text: c.extra });

  document.getElementById('fsBody').innerHTML = skills.map(s => {
    const st = SKILL_TYPES[s.key];
    return `<div class="fs-skill-block">
      <span class="fs-skill-label ${st.cls}">${st.icon} ${st.label}技能</span>
      <div class="fs-skill-text">${escHTML(s.text)}</div>
    </div>`;
  }).join('');

  document.getElementById('charFullscreen').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}

function closeFullscreen() {
  document.getElementById('charFullscreen').classList.add('hidden');
  document.body.style.overflow = '';
}

// ESC 关闭全屏
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && !document.getElementById('charFullscreen').classList.contains('hidden')) {
    closeFullscreen();
  }
});

// ══════════ Toast ══════════
function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

loadChars();
</script>
</body>
</html>
