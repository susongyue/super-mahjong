<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" type="image/png" href="dong.png">
  <title>选择出战 - Super Reach Mahjong</title>
  <link rel="stylesheet" href="style.css?v=6">
  <link rel="stylesheet" href="themes.css">
  <meta name="theme-color" content="#000000">
<link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <script>(function(){try{var t=localStorage.getItem('mahjong-theme')||'spotify';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
  <style>
    .container { max-width: 800px; }

    .page-header {
      text-align: center; margin-bottom: 20px;
    }
    .page-header h1 {
      font-size: 28px; color: var(--accent-blue); font-weight: 800;
      margin-bottom: 6px; letter-spacing: -1px;
    }
    .page-header .info {
      color: var(--ink-muted); font-size: 14px; line-height: 1.6;
    }

    /* 进度条 */
    .selection-progress {
      background: var(--surface-1);
      border-radius: var(--r-xl);
      padding: 16px 20px; margin-bottom: 18px;
      border: 2px solid var(--hairline);
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 10px;
    }
    .progress-text {
      font-size: 15px; font-weight: 700; color: var(--text-primary);
    }
    .progress-bar-wrap {
      flex: 1; min-width: 150px; height: 14px;
      background: var(--surface-2); border-radius: 7px;
      overflow: hidden; border: 2px solid var(--hairline);
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--green), var(--green-dark));
      transition: width .3s; border-radius: 7px;
    }
    .selection-list {
      font-size: 12px; color: var(--ink-muted); margin-top: 4px;
    }
    .selection-list span { color: var(--green); font-weight: 600; }

    /* ── 出战页 3列卡片 ── */
    .char-grid { grid-template-columns: repeat(3, 1fr); gap: 14px; }
    .char-card { padding: 0; cursor: pointer; display: flex; flex-direction: column; align-items: center; overflow: hidden; border-radius: 15%; }

    /* 头像区域 */
    .char-card-header {
      padding: 22px 14px 10px;
      background: linear-gradient(160deg, var(--card-header-bg), var(--surface-1));
      display: flex; align-items: center; justify-content: center;
    }
    .char-card .char-name {
      font-size: 16px; font-weight: 800; color: var(--text-primary);
      text-align: center; padding: 10px 8px 2px;
      letter-spacing: -0.5px;
    }
    .char-card .char-tier {
      font-size: 12px; color: var(--ink-muted); font-weight: 600;
      text-align: center; padding: 0 8px 12px;
    }

    /* 操作按钮 */
    .char-card .card-actions {
      display: flex; gap: 0; width: 100%; margin-top: auto;
    }
    .char-card .btn-deploy {
      flex: 1; padding: 11px 10px;
      border-radius: 0 0 15% 15%; font-size: 13px;
      font-weight: 700; cursor: pointer;
      border: none;
      background: #09ff0081; color: var(--on-primary);
      transition: all .2s; text-align: center;
    }
    .char-card .btn-deploy:hover:not(:disabled) {
      background: #09ff00; filter: brightness(1.1);
    }
    .char-card .btn-deploy:disabled { opacity: 0.4; cursor: not-allowed; filter: none; }
    .char-card .btn-deploy.deployed { background: var(--green); color: var(--on-primary); }
    .char-card .btn-deploy.resting-btn {
      background: var(--surface-3); color: var(--ink-muted);
      font-weight: 600;
    }

    @media (max-width: 900px) { .char-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; } }
    @media (max-width: 768px) {
      .char-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .page-header h1 { font-size: 18px; }
      .page-header .info { font-size: 11px; }
      .selection-progress { padding: 10px 12px; gap: 6px; }
      .char-card { padding: 0; border-radius: var(--r-lg); }
      .char-card-header { padding: 14px 8px 6px; }
      .char-card .char-name { font-size: 13px; padding: 6px 4px 2px; }
      .char-card .char-tier { font-size: 10px; padding: 0 4px 8px; }
      .char-card .btn-deploy { padding: 9px 6px; font-size: 11px; }
    }

    /* ── 投票面板（桌面端固定右侧） ── */
    .vote-panel {
      position: fixed;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      width: 200px;
      background: var(--surface-1);
      border: 2px solid var(--hairline);
      border-radius: var(--r-lg);
      padding: 16px;
      box-shadow: var(--shadow-md);
      z-index: 50;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .vote-panel-title {
      font-size: 16px;
      color: var(--text-primary);
      text-align: center;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--hairline);
    }
    .vote-panel-body {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .vote-panel-body .vote-btn {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
    }
    .vote-panel-footer {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .vote-panel-footer .vote-count {
      font-size: 13px;
      padding: 4px 10px;
      justify-content: center;
    }
    .vote-names {
      font-size: 11px;
      color: var(--ink-muted);
      line-height: 1.5;
      max-height: 80px;
      overflow-y: auto;
    }
    @media (max-width: 1420px) {
      .vote-panel {
        left: 2%;
        width: 96%;
        position: relative;
        z-index: 1;
        transform: none;
        max-width: 600px;
        margin-top: 10px;
        box-sizing: border-box;
        padding: 0;
        border: none;
        background: transparent;
        box-shadow: none;
        gap: 6px;
      }
      .vote-panel-body { flex-direction: row; gap: 8px; }
      .vote-panel-body .vote-btn {
        flex: 1;
        padding: 12px 16px;
        font-size: 14px;
        border-radius: var(--r-lg);
      }
      .vote-panel-body .vote-btn-exit {
        flex: 1;
        padding: 12px 8px;
        font-size: 12px;
      }
      .vote-panel-footer { display: none; }
      .vote-names {
        text-align: center;
        font-size: 11px;
        max-height: 48px;
      }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a class="logo" href="/lobby.html">Mahjong</a>
  <div class="nav-links">
    <a href="/lobby.html" title="大厅"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></a>
    <a href="/game.html" id="navGameSelect" class="active" title="选择出战"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg></a>
    <a href="/battle_round.html" id="navGameBattle" title="回合对战"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></a>
    <a href="/history.html" title="对局记录"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></a>
    <a href="/encyclopedia.html" title="角色图鉴"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2Z"/></svg></a>
    <a href="/profile.html" title="个人中心"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></a>
  </div>
  <span class="nav-user" id="navUser"></span>
</nav>

<div class="container">
  <div class="page-header">
    <h1>选择出战角色</h1>
    <div class="info">
      房间：<strong id="roomDisplay"></strong> |
      玩家：<strong id="nameDisplay"></strong> |
      第 <strong id="roundNum">1</strong> 回合
    </div>
  </div>

  <div class="selection-progress">
    <div>
      <div class="progress-text" id="progressText">等待选择... 0/0</div>
      <div class="selection-list" id="selectionList"></div>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
    </div>
  </div>

  <div class="section">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h2 style="margin-bottom:0;">你的角色（点击查看详情）</h2>
      <span id="mySelectionBadge" style="font-size:13px;color:var(--ink-muted);"></span>
    </div>
    <div class="char-grid" id="charGrid">
      <div class="no-data">加载中...</div>
    </div>
  </div>

</div>

<!-- 投票面板（桌面端固定右侧） -->
<div class="vote-panel" id="votePanel">
  <div class="vote-panel-body">
    <button class="vote-btn vote-btn-game" id="btnEndGame">投票结束对局</button>
    <button class="vote-btn vote-btn-exit" id="btnExitGame" title="强制退出对局">退出对局</button>
  </div>
  <div class="vote-panel-footer">
    <span id="gameVoteInfo" class="vote-count game">对局 0/0</span>
  </div>
  <div id="voteNames" class="vote-names"></div>
</div>

<!-- 角色详情弹窗 -->
<div class="detail-overlay" id="detailOverlay">
  <div class="detail-card" id="detailCard"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/lib/auth.js"></script>
<script src="/js/lib/utils.js"></script>
<script src="/js/lib/api.js"></script>
<script src="/js/lib/components.js"></script>
<script src="/js/lib/theme-switcher.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
Auth.check();
var username = Auth.user();
var roomId = Auth.checkRoomId();

// 页面加载前检查房间状态
(async function checkRoomBeforeLoad() {
  try {
    var status = await API.getRoomStatus(roomId, username);
    if (status.finished || !status.exists) {
      Utils.showToast(status.msg || '对局已结束，即将返回大厅');
      localStorage.removeItem('roomId');
      setTimeout(function () { location.href = '/lobby.html'; }, 2000);
      return;
    }
  } catch (e) { /* 网络错误允许继续 */ }
})();

Auth.renderNav(document.getElementById('navUser'));
Nav.updateLinks();
document.getElementById('roomDisplay').innerText = roomId;
document.getElementById('nameDisplay').innerText = username;

// 全局状态
var myChars = [];
var charStates = {};
var mySelection = null;
var totalPlayers = 0;
var readyPlayerNames = [];
var playerProfiles = {};


// ══════════ Socket ══════════
var socket = io({ transports: ['polling', 'websocket'] });

socket.on('connect', function () {
  socket.emit('joinRoom', { roomId: roomId, playerName: username });
  socket.emit('getRoomState', roomId);
  socket.emit('getBattleState', { roomId: roomId, playerName: username });
});

socket.on('roomState', function (data) {
  document.getElementById('roundNum').innerText = data.round || 1;
  totalPlayers = data.totalPlayers || 0;
  updateSelectionUI();
});

socket.on('roomPlayersUpdate', function (data) {
  totalPlayers = data.players ? data.players.length : totalPlayers;
  if (data && data.players) {
    data.players.forEach(function (p) {
      playerProfiles[p.name] = { nickname: p.nickname || p.name, avatar: p.avatar || '' };
    });
  }
  updateSelectionUI();
});

socket.on('characterStatesUpdate', function (data) {
  charStates = (data && data.states) || {};
  renderCharGrid();
});

socket.on('battleState', function (data) {
  document.getElementById('roundNum').innerText = data.round || 1;
  totalPlayers = data.totalPlayers || 0;
  readyPlayerNames = data.readyPlayerNames || [];
  if (data.mySelection) {
    mySelection = data.mySelection;
    document.getElementById('mySelectionBadge').innerHTML = '已选择：<strong>' + Utils.escHTML(mySelection) + '</strong>';
    renderCharGrid();
  }
  updateSelectionUI();
});

socket.on('battleReadyUpdate', function (data) {
  readyPlayerNames = data.readyPlayerNames || [];
  totalPlayers = data.totalPlayers || totalPlayers;
  updateSelectionUI();
});

socket.on('battleSelectionConfirm', function (data) {
  mySelection = data.characterName;
  document.getElementById('mySelectionBadge').innerHTML = '已选择：<strong>' + Utils.escHTML(mySelection) + '</strong>';
  renderCharGrid();
  updateSelectionUI();
  Utils.showToast('已选择 ' + data.characterName + ' ,等待其他玩家...');
});

socket.on('battleSelectionCancel', function () {
  mySelection = null;
  document.getElementById('mySelectionBadge').innerText = '';
  renderCharGrid();
  Utils.showToast('已取消选择');
});

socket.on('allBattleSelected', function () {
  location.href = '/battle_round.html';
});

socket.on('roundAdvanced', function (data) {
  document.getElementById('roundNum').innerText = data.round;
  mySelection = null;
  readyPlayerNames = [];
  document.getElementById('mySelectionBadge').innerText = '';
  // 重置投票按钮
  var btn = document.getElementById('btnEndGame');
  btn.disabled = false;
  btn.innerText = '投票结束对局';
  btn.style.opacity = '';
  document.getElementById('gameVoteInfo').innerText = '对局 0/' + (data.totalPlayers || 0);
  document.getElementById('gameVoteInfo').className = 'vote-count game';
  loadChars();
  updateSelectionUI();
  Utils.showToast('第 ' + data.round + ' 回合开始！请选择出战角色');
});

socket.on('gameEndVoteUpdate', function (data) {
  document.getElementById('gameVoteInfo').innerText = '对局 ' + data.voted + '/' + data.total;
  document.getElementById('gameVoteInfo').className = data.voted >= data.total ? 'vote-count done' : 'vote-count game';
  if (data.votedNames) {
    document.getElementById('voteNames').innerText = '已投票：' + data.votedNames.join('、');
  }
  var btn = document.getElementById('btnEndGame');
  if (btn) {
    btn.innerText = '投票结束对局 (' + data.voted + '/' + data.total + ')';
    if (data.voted >= data.total) {
      btn.disabled = true;
      btn.style.opacity = '0.5';
    }
  }
});

socket.on('gameEnded', function (data) {
  localStorage.removeItem('roomId');
  location.href = '/lobby.html';
});

socket.on('error', function (msg) {
  Utils.showToast(msg);
});

// ══════════ 角色加载 ══════════
async function loadChars() {
  var chars = await API.getMyDraft(roomId, username);
  var states = await API.getCharacterStates(roomId, username);
  myChars = chars;
  charStates = states;
  if (!chars || chars.length === 0) {
    document.getElementById('charGrid').innerHTML = '<div class="no-data">暂无角色数据</div>';
    return;
  }
  renderCharGrid();
}

function renderCharGrid() {
  var grid = document.getElementById('charGrid');
  grid.innerHTML = myChars.map(function (c, idx) {
    var state = charStates[c.name] || { resting: false };
    var isResting = state.resting;
    var isRetain = c.retain === true;
    var isSelected = mySelection === c.name;
    var isBlocked = isResting && !isRetain;
    var isRestingRetain = isResting && isRetain;

    var extraClasses = '';
    if (isSelected) extraClasses += ' selected';
    if (isBlocked) extraClasses += ' resting';
    if (isRestingRetain) extraClasses += ' resting-retain';

    var badges = [];
    if (isRetain) badges.push('<div class="retain-badge">保留</div>');

    // 出战按钮状态（休息状态集成到按钮中）
    var deployBtnHTML = '';
    if (isBlocked) {
      deployBtnHTML = '<button class="btn-deploy resting-btn" disabled>休息中</button>';
    } else if (isSelected) {
      deployBtnHTML = '<button class="btn-deploy deployed">已出战（取消）</button>';
    } else {
      deployBtnHTML = '<button class="btn-deploy">出战</button>';
    }

    return '<div class="char-card' + extraClasses + '" data-idx="' + idx + '">' +
      badges.join('') +
      '<div class="char-card-header">' +
        Utils.charImageHTML(myChars, c.name) +
      '</div>' +
      '<div class="char-name">' + Utils.escHTML(c.name) + '</div>' +
      '<div class="char-tier">Tier ' + Utils.escHTML(c.tier) + '</div>' +
      '<div class="card-actions">' +
        deployBtnHTML +
      '</div>' +
    '</div>';
  }).join('');

  // 事件委托：卡片点击查看详情，按钮点击出战/取消
  grid.querySelectorAll('.char-card').forEach(function (card) {
    card.addEventListener('click', function (e) {
      if (e.target.closest('.btn-deploy')) return;
      var idx = parseInt(card.dataset.idx);
      openFullscreen(idx, card);
    });
  });
  grid.querySelectorAll('.btn-deploy').forEach(function (btn) {
    btn.addEventListener('click', function (e) {
      e.stopPropagation();
      var idx = parseInt(btn.closest('.char-card').dataset.idx);
      if (btn.classList.contains('deployed')) {
        cancelDeploy(idx);
      } else {
        deployChar(idx);
      }
    });
  });
}

// ══════════ 选择/取消 ══════════
function deployChar(idx) {
  var c = myChars[idx];
  if (!c) return;
  var isResting = charStates[c.name] && charStates[c.name].resting;
  var isRetain = c.retain === true;
  if (isResting && !isRetain) {
    Utils.showToast('该角色正在休息中，等待全部角色出战过后即可恢复');
    return;
  }
  if (isResting && isRetain) {
    Utils.showToast(' 保留效果发动！该角色不受休息限制');
  }
  mySelection = c.name;
  socket.emit('selectBattleCharacter', { roomId: roomId, characterName: c.name, playerName: username });
  document.getElementById('mySelectionBadge').innerHTML = ' 已选择：<strong>' + Utils.escHTML(c.name) + '</strong>';
  renderCharGrid();
  closeFullscreen();
}

function cancelDeploy(idx) {
  var c = myChars[idx];
  if (!c) return;
  mySelection = null;
  socket.emit('resetBattleSelection', { roomId: roomId, playerName: username });
  document.getElementById('mySelectionBadge').innerText = '';
  renderCharGrid();
  closeFullscreen();
}

// ══════════ 角色详情弹窗 ══════════

function openFullscreen(idx, cardEl) {
  var c = myChars[idx];
  if (!c) return;

  // 头像
  var avatarHTML = '';
  if (c.image) {
    var webpSrc = '/webp/' + c.image.replace(/\.png$/i, '.webp');
    var pngSrc = '/png/' + c.image;
    avatarHTML = '<picture>' +
      '<source srcset="' + webpSrc + '" type="image/webp">' +
      '<img class="detail-avatar" src="' + pngSrc + '" alt="' + Utils.escHTML(c.name) + '" onerror="this.style.display=\'none\';this.parentElement.nextElementSibling.style.display=\'flex\';">' +
      '</picture>' +
      '<div class="detail-avatar-placeholder" style="display:none">' + Utils.escHTML(c.name.charAt(0)) + '</div>';
  } else {
    avatarHTML = '<div class="detail-avatar-placeholder">' + Utils.escHTML(c.name.charAt(0)) + '</div>';
  }

  // 技能
  var skillsHTML = '';
  var skillDefs = [
    { key: 'limit',   label: '限定技', cls: 'limit' },
    { key: 'innate',  label: '固有技', cls: 'innate' },
    { key: 'passive', label: '被动技', cls: 'passive' },
    { key: 'extra',   label: '附加技', cls: 'extra' }
  ];
  skillDefs.forEach(function(sd) {
    if (c[sd.key]) {
      skillsHTML += '<div class="detail-skill-block">' +
        '<div class="detail-skill-label ' + sd.cls + '">' + sd.label + '</div>' +
        '<div class="detail-skill-text">' + Utils.escHTML(c[sd.key]) + '</div>' +
      '</div>';
    }
  });
  if (c.note) {
    skillsHTML += '<div class="detail-note"><div class="detail-note-label">说明</div><div class="detail-note-text">' + Utils.escHTML(c.note) + '</div></div>';
  }

  // 出战状态
  var isResting = charStates[c.name] && charStates[c.name].resting;
  var isRetain = c.retain === true;
  var isSelected = mySelection === c.name;
  var isBlocked = isResting && !isRetain;

  var deployHTML = '';
  var retainHTML = '';

  if (isBlocked) {
    deployHTML = '<button class="detail-deploy-btn blocked" disabled>休息中，无法出战</button>';
  } else if (isSelected) {
    deployHTML = '<button class="detail-deploy-btn deployed" id="detailDeployBtn">已出战（点击取消）</button>';
  } else {
    deployHTML = '<button class="detail-deploy-btn" id="detailDeployBtn">出战</button>';
  }

  if (isResting && isRetain) {
    retainHTML = '<div class="detail-retain">该角色拥有<strong>保留</strong>效果，休息状态下仍可出战！</div>';
  } else if (isRetain && !isResting) {
    retainHTML = '<div class="detail-retain">该角色拥有<strong>保留</strong>效果，出战后仍可在下回合继续出战</div>';
  }

  var card = document.getElementById('detailCard');
  card.innerHTML =
    '<div class="detail-header">' +
      avatarHTML +
      '<div class="detail-title">' +
        '<div class="detail-faction">' + Utils.escHTML(c.faction || '无阵营') + '</div>' +
        '<div class="detail-name">' + Utils.escHTML(c.name) + '</div>' +
        '<div class="detail-tier">Tier ' + Utils.escHTML(c.tier || '?') + '</div>' +
      '</div>' +
      '<button class="detail-close" onclick="closeFullscreen()">✕</button>' +
    '</div>' +
    '<div class="detail-body">' + skillsHTML + '</div>' +
    '<div class="detail-footer">' + retainHTML + deployHTML + '</div>';

  // 绑定出战按钮
  var deployBtn = document.getElementById('detailDeployBtn');
  if (deployBtn && !isBlocked) {
    (function(i, sel) {
      deployBtn.onclick = function () {
        if (sel) { cancelDeploy(i); } else { deployChar(i); }
      };
    })(idx, isSelected);
  }

  document.getElementById('detailOverlay').classList.add('show');
}

function closeFullscreen() {
  document.getElementById('detailOverlay').classList.remove('show');
}

document.getElementById('detailOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeFullscreen();
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && document.getElementById('detailOverlay').classList.contains('show')) {
    closeFullscreen();
  }
});

// ══════════ 进度UI ══════════
function updateSelectionUI() {
  var selectedCount = readyPlayerNames.length;
  var total = totalPlayers || 4;
  var percent = total > 0 ? (selectedCount / total) * 100 : 0;

  document.getElementById('progressText').innerText = '已准备 ' + selectedCount + '/' + total + ' 人';
  document.getElementById('progressBar').style.width = percent + '%';

  var names = readyPlayerNames.map(function (p) {
    var prof = playerProfiles[p];
    return '<span>' + Utils.escHTML(prof ? prof.nickname : p) + '</span>';
  });
  var waitingCount = total - selectedCount;
  if (waitingCount > 0) {
    names.push('<span style="color:var(--ink-muted);">等待 ' + waitingCount + ' 人...</span>');
  }
  document.getElementById('selectionList').innerHTML = names.length > 0 ? names.join(' | ') : '等待所有人准备...';
}

// ══════════ 投票 ══════════
document.getElementById('btnEndGame').addEventListener('click', function () {
  if (!confirm('确定要投票结束本局游戏吗？所有玩家同意后将结束对局。')) return;
  var btn = document.getElementById('btnEndGame');
  btn.disabled = true;
  btn.innerText = '已投票结束对局';
  socket.emit('voteEndGame', roomId);
});

// ══════════ 退出对局 ══════════
document.getElementById('btnExitGame').addEventListener('click', function () {
  if (!confirm('确定要强制退出对局吗？退出后需要重新加入房间。')) return;
  Nav.exitGame();
  location.href = '/lobby.html';
});

loadChars();

gsap.from('.navbar', { y: -60, opacity: 0, duration: 0.5, ease: 'power3.out' });
gsap.from('.page-header', { opacity: 0, y: -15, duration: 0.4, delay: 0.15, ease: 'power2.out' });
gsap.from('.selection-progress, .section', { opacity: 0, y: 20, stagger: 0.1, duration: 0.5, delay: 0.3, ease: 'power3.out' });
</script>
