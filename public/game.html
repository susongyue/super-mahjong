<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>选择出战 - 超能力立直麻将</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { padding-top: 56px; }
    .container { max-width: 960px; }

    .page-header {
      text-align: center;
      margin-bottom: 20px;
    }
    .page-header h1 {
      font-size: 28px;
      color: var(--accent);
      font-weight: 800;
      margin-bottom: 6px;
    }
    .page-header .info {
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.6;
    }

    .selection-progress {
      background: var(--card);
      border-radius: 14px;
      padding: 16px 20px;
      margin-bottom: 18px;
      box-shadow: var(--shadow);
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }
    .progress-text {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }
    .progress-bar-wrap {
      flex: 1;
      min-width: 150px;
      height: 10px;
      background: var(--card-secondary);
      border-radius: 5px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--green), #2ecc71);
      transition: width .3s;
      border-radius: 5px;
    }
    .selection-list {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 4px;
    }
    .selection-list span {
      color: var(--green);
      font-weight: 600;
    }

    .char-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .char-card {
      background: var(--card-secondary);
      border-radius: 14px;
      padding: 16px;
      border: 2px solid var(--border);
      cursor: pointer;
      transition: all .25s;
      position: relative;
    }
    .char-card:hover:not(.resting) {
      box-shadow: 0 6px 24px rgba(0,0,0,.1);
      transform: translateY(-2px);
      border-color: var(--accent);
    }
    .char-card.selected {
      border-color: var(--accent);
      background: #fff5f5;
      box-shadow: 0 0 0 3px rgba(231,76,60,.25);
    }
    .char-card.resting {
      opacity: 0.45;
      cursor: not-allowed;
      background: #eee;
      border-color: #ddd;
    }
    .char-card.resting-retain {
      opacity: 0.8;
      cursor: pointer;
      border-color: var(--gold);
      border-style: dashed;
      background: linear-gradient(135deg, #fff8e1, var(--card-secondary));
    }
    .char-card .resting-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      background: #999;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 10px;
    }
    .char-card .retain-badge {
      position: absolute;
      top: 8px;
      left: 8px;
      background: var(--gold);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 10px;
    }
    .char-card .faction-badge {
      display: inline-block;
      color: var(--gold);
      font-size: 11px;
      font-weight: 700;
      background: var(--gold-bg);
      padding: 3px 10px;
      border-radius: 12px;
      margin-bottom: 8px;
      border: 1px solid #f0d78c;
    }
    .char-card .char-name {
      font-size: 17px;
      font-weight: 800;
      margin-bottom: 4px;
      color: var(--text);
    }
    .char-card .char-meta {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .char-card .char-meta .tier {
      color: var(--accent);
      font-weight: 600;
    }
    .char-card .skill-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .char-card .skill-tag {
      font-size: 10px;
      padding: 3px 8px;
    }
    .char-card .card-hint {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 8px;
      text-align: center;
    }

    .vote-section {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 14px;
    }
    .vote-btn {
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
      border: 2px solid transparent;
      outline: none;
      white-space: nowrap;
    }
    .vote-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .vote-btn-round { background:#fff3e0; color:var(--skill-innate); border-color:#ffb74d; }
    .vote-btn-round:hover:not(:disabled) { background:#ffe0b2; border-color:var(--skill-innate); }
    .vote-btn-game { background:#fce4ec; color:var(--accent); border-color:#ef9a9a; }
    .vote-btn-game:hover:not(:disabled) { background:#ffcdd2; border-color:var(--accent); }
    .vote-count {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 12px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 13px;
    }
    .vote-count.round { background:#fff3e0; color:var(--skill-innate); border:1.5px solid #ffcc80; }
    .vote-count.game  { background:#fce4ec; color:var(--accent); border:1.5px solid #ef9a9a; }
    .vote-count.done  { background:var(--green-bg); color:var(--green); border:1.5px solid var(--green); }
    .vote-info { display:flex; align-items:center; gap:8px; font-size:13px; color:var(--text-secondary); font-weight:600; }

    .redirect-overlay {
      position: fixed;
      top:0;left:0;right:0;bottom:0;
      background: rgba(0,0,0,.6);
      z-index: 400;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: #fff;
      font-size: 24px;
      font-weight: 700;
    }

    @media (max-width: 900px) { .char-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; } }
    @media (max-width: 540px) { .char-grid { grid-template-columns: 1fr; gap: 8px; } }
  </style>
</head>
<body>

<nav class="navbar">
  <a class="logo" href="/lobby.html">🀄 超能力立直麻将</a>
  <div class="nav-links">
    <a href="/lobby.html">大厅</a>
    <a href="#" class="active">选择出战</a>
  </div>
  <span class="nav-user" id="navUser"></span>
</nav>

<div class="container">
  <div class="page-header">
    <h1>⚔️ 选择出战角色</h1>
    <div class="info">
      房间：<strong id="roomDisplay"></strong> |
      玩家：<strong id="nameDisplay"></strong> |
      🏁 第 <strong id="roundNum">1</strong> 回合
    </div>
  </div>

  <!-- 选择进度 -->
  <div class="selection-progress">
    <div>
      <div class="progress-text" id="progressText">等待选择... 0/0</div>
      <div class="selection-list" id="selectionList"></div>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
    </div>
  </div>

  <!-- 角色选择区 -->
  <div class="section">
    <div class="section-header-row" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h2 style="margin-bottom:0;">🎯 你的角色</h2>
      <span id="mySelectionBadge" style="font-size:13px;color:var(--text-secondary);"></span>
    </div>
    <div class="char-grid" id="charGrid">
      <div class="no-data">加载中...</div>
    </div>
  </div>

  <!-- 投票区 -->
  <div class="section">
    <div class="section-header-row" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <h2 style="margin-bottom:0;">📊 对局投票</h2>
    </div>
    <div class="vote-section">
      <button class="vote-btn vote-btn-game" id="btnEndGame" onclick="voteEndGame()">
        🏁 投票结束对局
      </button>
      <div class="vote-info">
        <span id="gameVoteInfo" class="vote-count game">对局投票 0/0</span>
      </div>
    </div>
    <div id="voteNames" style="margin-top:10px;font-size:12px;color:var(--text-secondary);"></div>
  </div>
</div>

<div class="redirect-overlay hidden" id="redirectOverlay">
  <div style="font-size:18px;text-align:center;" id="redirectText"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const username = localStorage.user;
const roomId = localStorage.roomId;
if (!username) location.href = '/login.html';
if (!roomId) location.href = '/lobby.html';

document.getElementById('navUser').innerText = '👤 ' + username;
document.getElementById('roomDisplay').innerText = roomId;
document.getElementById('nameDisplay').innerText = username;

// 全局状态
let myChars = [];
let charStates = {};      // { charName: {resting:bool} }
let battleSelections = {}; // { playerName: charName }
let mySelection = null;
let totalPlayers = 0;

// ══════════ Socket ══════════
const socket = io({ transports: ['polling', 'websocket'] });

socket.on('connect', () => {
  socket.emit('joinRoom', { roomId, playerName: username });
  socket.emit('getRoomState', roomId);
  socket.emit('getBattleState', roomId);
});

// 房间状态
socket.on('roomState', (data) => {
  document.getElementById('roundNum').innerText = data.round || 1;
  totalPlayers = data.totalPlayers || 0;
  if (data.battleSelections) {
    battleSelections = data.battleSelections;
    updateSelectionUI();
  }
});

// 玩家列表更新
socket.on('roomPlayersUpdate', (data) => {
  totalPlayers = data.players ? data.players.length : totalPlayers;
  if (data.battleSelections) {
    battleSelections = data.battleSelections;
    if (battleSelections[username] && !mySelection) {
      mySelection = battleSelections[username];
      document.getElementById('mySelectionBadge').innerHTML = '✅ 已选择：<strong>' + escHTML(mySelection) + '</strong>';
      renderCharGrid();
    }
    updateSelectionUI();
  }
});

// 作战选将状态
socket.on('battleState', (data) => {
  document.getElementById('roundNum').innerText = data.round || 1;
  totalPlayers = data.totalPlayers || 0;
  if (data.selections) {
    battleSelections = data.selections;
    // 恢复已选状态
    if (battleSelections[username]) {
      mySelection = battleSelections[username];
      document.getElementById('mySelectionBadge').innerHTML = '✅ 已选择：<strong>' + escHTML(mySelection) + '</strong>';
    }
    updateSelectionUI();
  }
});

// 作战选将更新
socket.on('battleSelectionUpdate', (data) => {
  battleSelections = data.selections || {};
  totalPlayers = data.totalPlayers || totalPlayers;
  // 恢复已选状态（如果页面刷新）
  if (battleSelections[username] && mySelection !== battleSelections[username]) {
    mySelection = battleSelections[username];
    document.getElementById('mySelectionBadge').innerHTML = '✅ 已选择：<strong>' + escHTML(mySelection) + '</strong>';
    renderCharGrid();
  }
  updateSelectionUI();
});

// 所有人选完 → 跳转到回合界面
socket.on('allBattleSelected', (data) => {
  showRedirectOverlay('所有玩家已选择出战角色！即将进入回合界面...');
  setTimeout(() => { location.href = '/battle_round.html'; }, 2000);
});

// 回合推进
socket.on('roundAdvanced', (data) => {
  document.getElementById('roundNum').innerText = data.round;
  battleSelections = {};
  mySelection = null;
  document.getElementById('mySelectionBadge').innerText = '';
  loadChars(); // 重新加载角色状态
  updateSelectionUI();
  showToast('🎉 第 ' + data.round + ' 回合开始！请选择出战角色');
});

// 对局投票更新
socket.on('gameEndVoteUpdate', (data) => {
  document.getElementById('gameVoteInfo').innerText = '对局投票 ' + data.voted + '/' + data.total;
  document.getElementById('gameVoteInfo').className = data.voted >= data.total ? 'vote-count done' : 'vote-count game';
});

// 对局结束
socket.on('gameEnded', (data) => {
  showRedirectOverlay(data.msg);
  setTimeout(() => { location.href = '/lobby.html'; }, 2500);
});

socket.on('error', (msg) => {
  showToast('⚠️ ' + msg);
});

function showRedirectOverlay(msg) {
  const overlay = document.getElementById('redirectOverlay');
  document.getElementById('redirectText').innerText = msg;
  overlay.classList.remove('hidden');
}

// ══════════ 角色加载 ══════════
async function loadChars() {
  const chars = await fetch(`/api/my-draft?roomId=${roomId}&username=${encodeURIComponent(username)}`).then(r => r.json());
  const states = await fetch(`/api/character-states?roomId=${roomId}&username=${encodeURIComponent(username)}`).then(r => r.json());

  myChars = chars;
  charStates = states;

  if (!chars || chars.length === 0) {
    document.getElementById('charGrid').innerHTML = '<div class="no-data">暂无角色数据</div>';
    return;
  }

  renderCharGrid();
}

const SKILL_TYPES = {
  limit:   { label:'限定', icon:'🔥', cls:'limit' },
  innate:  { label:'固有', icon:'⚡', cls:'innate' },
  passive: { label:'被动', icon:'🛡️', cls:'passive' },
  extra:   { label:'附加', icon:'✨', cls:'extra' }
};

function escHTML(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderCharGrid() {
  const grid = document.getElementById('charGrid');

  grid.innerHTML = myChars.map((c, idx) => {
    const state = charStates[c.name] || { resting: false };
    const isResting = state.resting;
    const isRetain = c.retain === true;
    const isSelected = mySelection === c.name;
    const isBlocked = isResting && !isRetain; // 休息且非保留 → 不可选
    const isRestingRetain = isResting && isRetain; // 休息但保留 → 仍然可选

    let extraClasses = '';
    if (isSelected) extraClasses += ' selected';
    if (isBlocked) extraClasses += ' resting';
    if (isRestingRetain) extraClasses += ' resting-retain';

    const badges = [];
    if (isRestingRetain) badges.push('<div class="resting-badge" style="background:var(--gold);">🛡️ 轮休·可出战</div>');
    else if (isResting) badges.push('<div class="resting-badge">😴 休息中</div>');
    if (isRetain) badges.push('<div class="retain-badge">🛡️ 保留</div>');

    const skills = [];
    if (c.limit)   skills.push({ key:'limit', text:c.limit });
    if (c.innate)  skills.push({ key:'innate', text:c.innate });
    if (c.passive) skills.push({ key:'passive', text:c.passive });
    if (c.extra)   skills.push({ key:'extra', text:c.extra });

    const skillTags = skills.map(s => {
      const st = SKILL_TYPES[s.key];
      const preview = s.text.length > 10 ? s.text.substring(0,10)+'…' : s.text;
      return `<span class="skill-tag ${st.cls}"><span class="tag-icon">${st.icon}</span>${st.label}<span class="tag-preview">${escHTML(preview)}</span></span>`;
    }).join('');

    let hintText = '👆 点击选择出战';
    if (isSelected) hintText = '✅ 已选择（再次点击取消）';
    else if (isBlocked) hintText = '🔒 休息中，等待其他角色都出战过后恢复';
    else if (isRestingRetain) hintText = '🛡️ 保留效果：休息中也可出战！';

    return `<div class="char-card${extraClasses}" onclick="${isBlocked ? '' : 'selectChar('+idx+')'}">
      ${badges.join('')}
      <div class="faction-badge">${escHTML(c.faction||'无阵营')}</div>
      <div class="char-name">${escHTML(c.name)}</div>
      <div class="char-meta"><span class="tier">Tier ${escHTML(c.tier)}</span></div>
      <div class="skill-tags">${skillTags}</div>
      <div class="card-hint">${hintText}</div>
    </div>`;
  }).join('');
}

function selectChar(idx) {
  const c = myChars[idx];
  if (!c) return;

  // 检查是否在休息且没有保留效果
  const isResting = charStates[c.name] && charStates[c.name].resting;
  const isRetain = c.retain === true;
  if (isResting && !isRetain) {
    showToast('⚠️ 该角色正在休息中，等待全部角色出战过后即可恢复');
    return;
  }
  if (isResting && isRetain) {
    showToast('🛡️ 保留效果发动！该角色不受休息限制');
  }

  // 如果已经选择了同一个角色，取消选择
  if (mySelection === c.name) {
    mySelection = null;
    socket.emit('resetBattleSelection', { roomId, playerName: username });
    document.getElementById('mySelectionBadge').innerText = '';
    renderCharGrid();
    updateSelectionUI();
    return;
  }

  // 选择新角色
  mySelection = c.name;
  socket.emit('selectBattleCharacter', { roomId, characterName: c.name, playerName: username });
  document.getElementById('mySelectionBadge').innerHTML = '✅ 已选择：<strong>' + escHTML(c.name) + '</strong>';
  renderCharGrid();
}

function updateSelectionUI() {
  const selectedCount = Object.keys(battleSelections).length;
  const total = totalPlayers || 4;
  const percent = total > 0 ? (selectedCount / total) * 100 : 0;

  document.getElementById('progressText').innerText = '已选择 ' + selectedCount + '/' + total;
  document.getElementById('progressBar').style.width = percent + '%';

  // 显示已选择的玩家
  const names = Object.entries(battleSelections).map(([p, c]) => '<span>' + p + ' → ' + c + '</span>');
  document.getElementById('selectionList').innerHTML = names.length > 0 ? names.join(' | ') : '等待选择...';

  // 高亮已经被其他玩家选择的角色（如果同一个角色被选了，可能需要提示）
  // 这里不做限制，允许多个玩家选同一个角色
}

// ══════════ 投票 ══════════
function voteEndGame() {
  if (!confirm('确定要投票结束本局游戏吗？所有玩家同意后将结束对局。')) return;
  const btn = document.getElementById('btnEndGame');
  btn.disabled = true;
  btn.innerText = '🏁 已投票结束对局';
  socket.emit('voteEndGame', roomId);
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

loadChars();
</script>
</body>
</html>
