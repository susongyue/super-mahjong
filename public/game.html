<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>对局中 - 超能力立直麻将</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { padding-top: 56px; }

    .container { max-width: 960px; }

    .page-header {
      text-align: center;
      margin-bottom: 28px;
    }
    .page-header h1 {
      font-size: 30px;
      color: var(--accent);
      font-weight: 800;
      margin-bottom: 6px;
    }
    .page-header .info {
      color: var(--text-secondary);
      font-size: 15px;
      line-height: 1.6;
    }
    .page-header .info strong { color: var(--text); }

    /* 手机适配 */
    @media (max-width: 768px) {
      .page-header h1 { font-size: 24px; }
    }
    @media (max-width: 540px) {
      .page-header h1 { font-size: 22px; }
      .page-header .info { font-size: 13px; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a class="logo" href="/lobby.html">🀄 超能力立直麻将</a>
  <div class="nav-links">
    <a href="/lobby.html">大厅</a>
    <a href="#" class="active">对局中</a>
  </div>
  <span class="nav-user" id="navUser"></span>
</nav>

<div class="container">
  <div class="page-header">
    <h1>🎴 对局进行中</h1>
    <div class="info">房间：<strong id="roomDisplay"></strong> | 玩家：<strong id="nameDisplay"></strong></div>
  </div>

  <div class="section">
    <h2>🎯 你的角色（6选1出战）</h2>
    <div class="char-grid" id="charGrid">
      <div class="no-data">加载中...</div>
    </div>
  </div>
</div>

<!-- 技能放大弹窗 -->
<div class="modal-overlay hidden" id="skillOverlay" onclick="closeSkillOverlay(event)">
  <div class="modal-dialog" id="skillDialog" onclick="event.stopPropagation()">
    <div class="dialog-header">
      <div>
        <div class="dialog-title" id="skillDialogTitle"></div>
        <div class="dialog-char" id="skillDialogChar"></div>
      </div>
      <button class="dialog-close" onclick="closeSkillOverlay()">✕</button>
    </div>
    <div class="dialog-body">
      <span class="dialog-skill-type" id="skillDialogType"></span>
      <div class="dialog-desc" id="skillDialogDesc"></div>
      <div class="dialog-faction" id="skillDialogFaction"></div>
    </div>
  </div>
</div>

<script>
const username = localStorage.user;
const roomId = localStorage.roomId;
if (!username) location.href = '/login.html';

document.getElementById('navUser').innerText = '👤 ' + username;
document.getElementById('roomDisplay').innerText = roomId || '未知';
document.getElementById('nameDisplay').innerText = username;

const SKILL_TYPES = {
  passive: { label: '被动', icon: '🛡️', cls: 'passive' },
  innate:  { label: '天赋', icon: '⚡', cls: 'innate' },
  extra:   { label: '额外', icon: '✨', cls: 'extra' }
};

function escHTML(s) {
  if (!s) return '';
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

async function loadChars() {
  const chars = await fetch(`/api/my-draft?roomId=${roomId}&username=${encodeURIComponent(username)}`).then(r => r.json());
  const grid = document.getElementById('charGrid');
  if (!chars || chars.length === 0) {
    grid.innerHTML = '<div class="no-data">暂无角色数据，请先在房间内完成选角</div>';
    return;
  }

  grid.innerHTML = chars.map(c => {
    const skills = [];
    if (c.passive) skills.push({ key: 'passive', text: c.passive });
    if (c.innate)  skills.push({ key: 'innate', text: c.innate });
    if (c.extra)   skills.push({ key: 'extra', text: c.extra });

    const skillTags = skills.map(s => {
      const st = SKILL_TYPES[s.key];
      const preview = s.text.length > 8 ? s.text.substring(0, 8) + '…' : s.text;
      return `<button class="skill-tag ${st.cls}"
        data-char="${escHTML(c.name)}"
        data-faction="${escHTML(c.faction || '')}"
        data-label="${escHTML(st.label)}"
        data-desc="${escHTML(s.text)}"
        data-cls="${st.cls}"
        onclick="openSkill(this)"
        title="点击放大查看详情"
      ><span class="tag-icon">${st.icon}</span>${st.label}<span class="tag-preview">${escHTML(preview)}</span></button>`;
    }).join('');

    return `<div class="char-card">
      <div class="faction-badge">${escHTML(c.faction || '无阵营')}</div>
      <div class="char-name">${escHTML(c.name)}</div>
      <div class="char-meta">
        <span class="tier">Tier ${escHTML(c.tier)}</span>
        ${c.limit ? '<span class="limit-tag"> · 限' + escHTML(c.limit) + '</span>' : ''}
      </div>
      <div class="skill-tags">${skillTags}</div>
    </div>`;
  }).join('');
}

// 打开技能放大弹窗
function openSkill(btn) {
  document.getElementById('skillDialogTitle').innerText = btn.dataset.label + '技能';
  document.getElementById('skillDialogChar').innerText = '角色：' + btn.dataset.char;
  const typeEl = document.getElementById('skillDialogType');
  typeEl.textContent = btn.dataset.label;
  typeEl.className = 'dialog-skill-type ' + btn.dataset.cls;
  document.getElementById('skillDialogDesc').innerText = btn.dataset.desc;
  document.getElementById('skillDialogFaction').innerText = btn.dataset.faction ? '阵营：' + btn.dataset.faction : '';
  document.getElementById('skillOverlay').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}

// 关闭弹窗
function closeSkillOverlay(e) {
  // 如果传入了事件对象且点击的不是遮罩本身，则不关闭
  if (e && e.target !== document.getElementById('skillOverlay')) return;
  document.getElementById('skillOverlay').classList.add('hidden');
  document.body.style.overflow = '';
}

// ESC 关闭
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && !document.getElementById('skillOverlay').classList.contains('hidden')) {
    closeSkillOverlay();
  }
});

loadChars();
</script>
</body>
</html>
